<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendarz | FC Dynamo Wrocław</title>
    <style>
        :root {
            --rm-navy: #001C58;
            --rm-accent: #0055ff;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: white; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b1324 0%, #001C58 100%);
            background-attachment: fixed;
            position: relative;
        }

        /* Efekt szkła na całe tło */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: -1;
        }

        .header-mini {
            background: rgba(255, 255, 255, 0.1); padding: 10px 30px; 
            display: flex; justify-content: flex-end; backdrop-filter: blur(5px);
        }

        /* Menu Języków */
        .lang-container { position: relative; cursor: pointer; }
        .lang-active { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.8rem; padding: 6px 15px; border-radius: 4px; background: rgba(255,255,255,0.1); }
        .lang-list { 
            display: none; position: absolute; right: 0; top: 100%; 
            background: white; border-radius: 8px; min-width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lang-container:hover .lang-list { display: block; }
        .lang-item { padding: 12px; display: flex; align-items: center; gap: 10px; color: var(--rm-navy); font-size: 0.8rem; font-weight: 600; text-decoration: none; }

        .calendar-header { padding: 50px 20px 20px; text-align: center; }
        .calendar-header h1 { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; margin: 0; }

        /* Pasek Miesięcy */
        .month-picker {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 6px; display: flex; gap: 5px;
            overflow-x: auto; max-width: 900px; margin: 20px auto 50px auto;
            scrollbar-width: none;
        }
        .month-btn {
            padding: 12px 25px; border-radius: 25px; border: none;
            background: transparent; color: rgba(255, 255, 255, 0.4);
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .month-btn.active { background: var(--rm-accent); color: white; }
        .month-btn:disabled { opacity: 0.1; cursor: default; }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px; max-width: 1200px; margin: 0 auto; padding: 0 20px 80px 20px;
        }

        .match-card {
            background: var(--glass-white); border-radius: 20px;
            color: var(--rm-navy); transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .match-card:hover { transform: translateY(-10px); }
        .card-header { padding: 18px 25px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; color: #999; }
        .card-body { padding: 30px 25px; }
        .match-title { font-size: 1.4rem; font-weight: 900; margin: 0 0 15px 0; }
        .match-info { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #444; }
        
        .no-matches { text-align: center; grid-column: 1 / -1; padding: 100px; opacity: 0.4; font-size: 1.5rem; }
    </style>
</head>
<body>

    <nav class="header-mini">
        <div class="lang-container">
            <div class="lang-active" id="active-lang">
                <img src="https://flagcdn.com/w20/pl.png" width="20"> PL
            </div>
            <div class="lang-list">
                <div class="lang-item" onclick="changeLang('pl', 'PL', 'pl')">POLSKI</div>
                <div class="lang-item" onclick="changeLang('en', 'EN', 'gb')">ENGLISH</div>
                <div class="lang-item" onclick="changeLang('ru', 'RU', 'ru')">РОССИЙСКИЙ</div>
            </div>
        </div>
    </nav>

    <header class="calendar-header">
        <h1 data-key="cal_title">Kalendarz</h1>
    </header>

    <div class="month-picker" id="month-picker"></div>
    <main class="calendar-grid" id="calendar-content"></main>

    <script>
        const translations = {
            pl: { cal_title: "Kalendarz", sport: "Piłka Nożna", liga: "Czwarta Liga", empty: "Brak nadchodzących meczów" },
            en: { cal_title: "Calendar", sport: "Football", liga: "Fourth League", empty: "No upcoming matches" }
        };

        const matches = [
            { date: new Date('2026-04-13T20:00:00'), home: "FC Dynamo Wrocław", away: "Klimech PRO", venue: "Boisko nr 3" },
            { date: new Date('2026-04-21T21:00:00'), home: "RunnersHeads", away: "FC Dynamo Wrocław", venue: "Boisko nr 1" },
            { date: new Date('2026-04-27T20:00:00'), home: "FC Dynamo Wrocław", away: "PC Outsiders", venue: "Boisko nr 1" },
            { date: new Date('2026-05-07T22:00:00'), home: "Piorun Zawozy", away: "FC Dynamo Wrocław", venue: "Kłokoczyce" },
            { date: new Date('2026-05-14T21:00:00'), home: "FC Dynamo Wrocław", away: "Nic Się Nie Stało", venue: "Kłokoczyce" }
        ];

        let selectedMonth = new Date().getMonth();
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function initMonths() {
            const picker = document.getElementById('month-picker');
            picker.innerHTML = monthNames.map((name, index) => {
                const hasMatches = matches.some(m => m.date.getMonth() === index);
                return `<button class="month-btn ${index === selectedMonth ? 'active' : ''}" onclick="selectMonth(${index})" ${!hasMatches ? 'disabled' : ''}>${name}</button>`;
            }).join('');
        }

        function selectMonth(i) { selectedMonth = i; initMonths(); renderCalendar(); }

        function renderCalendar() {
            const grid = document.getElementById('calendar-content');
            const now = new Date();
            const filtered = matches.filter(m => m.date.getMonth() === selectedMonth && m.date >= now);
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-matches">${translations['pl'].empty}</div>`;
                return;
            }

            grid.innerHTML = filtered.map(m => `
                <div class="match-card">
                    <div class="card-header">Piłka Nożna • Czwarta Liga</div>
                    <div class="card-body">
                        <h2 class="match-title">${m.home} vs ${m.away}</h2>
                        <div class="match-info">📅 ${m.date.toLocaleString('pl-PL', {day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'})}</div>
                        <div class="match-info">📍 ${m.venue}</div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => { initMonths(); renderCalendar(); };
    </script>
</body>
</html>
