<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Głęboki niebieski gradient */
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%;
            padding: 10px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo-img {
            height: 60px; /* Rozmiar Twojego logo */
            width: auto;
            border-radius: 8px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00a2ff;
        }

        /* --- DROPDOWN DLA JĘZYKÓW --- */
        .lang-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .dropbtn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: #0a1525;
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            overflow: hidden;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #003366;
        }

        .lang-dropdown:hover .dropdown-content {
            display: block;
        }

        /* --- TREŚĆ GŁÓWNA --- */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 160px auto 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 50px;
        }

        .hero { flex: 1.5; }

        h1 {
            font-size: clamp(40px, 7vw, 90px);
            line-height: 0.95;
            color: #ffffff;
            letter-spacing: -3px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* --- STATYSTYKI --- */
        .control-room {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 40px;
            border-radius: 32px;
            backdrop-filter: blur(20px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px 20px;
            border-radius: 20px;
        }

        .stat-label { font-size: 10px; color: #6a7c78; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .stat-value { font-size: 34px; font-weight: 700; color: #ffffff; }

        @media (max-width: 1024px) {
            nav { padding: 10px 20px; }
            .container { flex-direction: column; text-align: center; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3.jpg" alt="Logo Dynamo" class="logo-img">
            
            <div class="nav-links">
                <a href="#">Klub</a>
                <a href="#">Terminarz</a>
                <a href="#">Bilety</a>
                <a href="#">Sklep</a>
            </div>
        </div>
        
        <div class="lang-dropdown">
            <button class="dropbtn">
                <span>🇵🇱</span> Język ▼
            </button>
            <div class="dropdown-content">
                <a href="#" onclick="alert('Zmieniono na Polski')"><span>🇵🇱</span> Polski</a>
                <a href="#" onclick="alert('Cambiado a Español')"><span>🇪🇸</span> Hiszpański</a>
                <a href="#" onclick="alert('Изменено na Русский')"><span>🇷🇺</span> Rosyjski</a>
                <a href="#" onclick="alert('Змінено на Українську')"><span>🇺🇦</span> Ukraiński</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="hero">
            <h1>Silesian heart, global vision.</h1>
        </main>

        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">🏃 Zawodnicy</p>
                    <span class="stat-value">24</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">🏆 Miejsce</p>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">📅 Mecze</p>
                    <span class="stat-value">12</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">⚡ Status</p>
                    <span class="stat-value" style="color: #00a2ff; font-size: 22px;">PRO</span>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
