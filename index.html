<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 2000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 30px; margin-right: auto; }
        .logo-img { height: 65px; width: auto; transition: transform 0.3s; }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { 
            color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: #00a2ff; }

        /* JĘZYKI */
        .lang-dropdown { position: relative; padding: 10px 0; }
        .dropbtn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; font-size: 13px;
        }

        .dropdown-content { 
            display: none; position: absolute; right: 0; top: 100%; 
            background: rgba(10, 21, 37, 0.98); backdrop-filter: blur(20px);
            min-width: 160px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); 
            z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lang-dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { 
            color: white; padding: 10px 15px; text-decoration: none; 
            display: flex; align-items: center; gap: 12px; font-size: 13px; transition: 0.2s;
        }
        .dropdown-content a:hover { background: rgba(0, 162, 255, 0.2); color: #00a2ff; }
        .flag-icon { width: 20px; height: 14px; object-fit: cover; border-radius: 2px; }

        /* --- MATCH CENTRE --- */
        .match-centre-hero {
            width: 100%; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            margin-top: 85px; padding: 30px 40px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center;
        }

        .match-meta {
            display: flex; align-items: center; gap: 15px; justify-self: start; 
            border-left: 2px solid #00a2ff; padding-left: 15px;
        }

        .meta-text { display: flex; flex-direction: column; }
        .meta-league { font-size: 10px; font-weight: 900; color: #00a2ff; text-transform: uppercase; letter-spacing: 2px; }
        .meta-round { font-size: 15px; font-weight: 700; color: #ffffff; }
        .meta-date { font-size: 11px; color: #8899a6; font-family: monospace; }

        .match-main-content { grid-column: 2; display: flex; flex-direction: column; align-items: center; }
        .team-badge-label { 
            font-size: 10px; font-weight: 900; letter-spacing: 5px; color: #ffffff; 
            margin-bottom: 12px; background: rgba(0, 162, 255, 0.2); 
            padding: 5px 30px; border-radius: 20px; border: 1px solid rgba(0, 162, 255, 0.3);
        }

        .main-match-display { display: flex; align-items: center; gap: 40px; }
        .team-name { font-size: 26px; font-weight: 800; text-transform: uppercase; width: 250px; }
        .team-left { text-align: right; }
        .team-right { text-align: left; }

        .score-box { 
            background: rgba(255, 255, 255, 0.05); color: white; padding: 12px 30px; 
            border-radius: 12px; font-size: 34px; font-weight: 900; 
            border: 1px solid rgba(255, 255, 255, 0.1); min-width: 120px; text-align: center;
        }

        /* --- CONTENT --- */
        .container {
            width: 90%; max-width: 1400px; margin: 80px auto;
            display: flex; justify-content: space-between; align-items: center;
        }

        .hero h1 { font-size: clamp(40px, 8vw, 90px); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
        
        .control-room { 
            flex: 0.8; background: rgba(255, 255, 255, 0.03); padding: 40px; 
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px);
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-card { background: rgba(0, 0, 0, 0.2); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.03); }
        .stat-label { font-size: 10px; color: #6a7c78; font-weight: 800; }
        .stat-value { font-size: 40px; font-weight: 700; color: #fff; }

        @media (max-width: 1100px) {
            .nav-links { display: none; }
            .match-centre-hero { display: flex; flex-direction: column; text-align: center; gap: 30px; }
            .match-meta { border-left: none; border-bottom: 2px solid #00a2ff; padding: 0 0 10px 0; justify-content: center; }
            .container { flex-direction: column; text-align: center; }
            .team-name { width: auto; font-size: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html">
                <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" alt="Logo" class="logo-img">
            </a>
            <div class="nav-links">
                <a href="#" data-t="nav_club">Klub</a>
                <a href="#" data-t="nav_academy">Akademia</a>
                <a href="#" data-t="nav_stadium">Stadion</a>
                <a href="#" data-t="nav_tickets">Bilety</a>
                <a href="#" data-t="nav_shop">Sklep</a>
                <a href="#" data-t="nav_contact">Kontakt</a>
            </div>
        </div>
        
        <div class="lang-dropdown">
            <button class="dropbtn">
                <i class="fas fa-globe" style="color:#00a2ff"></i> <span id="current-lang-label">PL</span>
            </button>
            <div class="dropdown-content">
                <a href="#" onclick="translatePage('PL')"><img src="https://flagcdn.com/w40/pl.png" class="flag-icon"> Polski</a>
                <a href="#" onclick="translatePage('UA')"><img src="https://flagcdn.com/w40/ua.png" class="flag-icon"> Українська</a>
                <a href="#" onclick="translatePage('ES')"><img src="https://flagcdn.com/w40/es.png" class="flag-icon"> Español</a>
                <a href="#" onclick="translatePage('RU')"><img src="https://flagcdn.com/w40/ru.png" class="flag-icon"> Русский</a>
            </div>
        </div>
    </nav>

    <div class="match-centre-hero">
        <div class="match-meta">
            <div class="meta-text">
                <span class="meta-league" data-t="m_league">Czwarta Liga</span>
                <span class="meta-round" data-t="m_round">Kolejka 3</span>
                <span class="meta-date">13/04/2026 | 20:00</span>
            </div>
        </div>

        <div class="match-main-content">
            <div class="team-badge-label" data-t="team_label">I ZESPÓŁ</div>
            <div class="main-match-display">
                <span class="team-name team-left">FC Dynamo Wrocław</span>
                <div class="score-box">VS</div>
                <span class="team-name team-right">Klimek PRO</span>
            </div>
        </div>
        <div></div>
    </div>

    <div class="container">
        <main class="hero">
            <h1 id="hero-title" data-t="hero_txt">Silesian heart,<br>global vision.</h1>
        </main>
        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card"><p class="stat-label" data-t="s_players">ZAWODNICY</p><span class="stat-value">24</span></div>
                <div class="stat-card"><p class="stat-label" data-t="s_place">MIEJSCE</p><span class="stat-value">1</span></div>
                <div class="stat-card"><p class="stat-label" data-t="s_matches">MECZE</p><span class="stat-value">12</span></div>
                <div class="stat-card"><p class="stat-label">STATUS</p><span class="stat-value" style="color:#00a2ff">PRIME</span></div>
            </div>
        </aside>
    </div>

    <script>
        const translations = {
            'PL': {
                nav_club: 'Klub', nav_academy: 'Akademia', nav_stadium: 'Stadion', nav_tickets: 'Bilety', nav_shop: 'Sklep', nav_contact: 'Kontakt',
                m_league: 'Czwarta Liga', m_round: 'Kolejka 3', team_label: 'I ZESPÓŁ',
                hero_txt: 'Silesian heart,<br>global vision.', s_players: 'ZAWODNICY', s_place: 'MIEJSCE', s_matches: 'MECZE'
            },
            'UA': {
                nav_club: 'Клуб', nav_academy: 'Академія', nav_stadium: 'Стадіон', nav_tickets: 'Квитки', nav_shop: 'Магазин', nav_contact: 'Контакт',
                m_league: 'Четверта Ліга', m_round: 'Тур 3', team_label: 'I КОМАНДА',
                hero_txt: 'Сілезьке серце,<br>глобальне бачення.', s_players: 'ГРАВЦІ', s_place: 'МІСЦЕ', s_matches: 'МАТЧІ'
            },
            'ES': {
                nav_club: 'Club', nav_academy: 'Academia', nav_stadium: 'Estadio', nav_tickets: 'Entradas', nav_shop: 'Tienda', nav_contact: 'Contacto',
                m_league: 'Cuarta Liga', m_round: 'Jornada 3', team_label: 'I EQUIPO',
                hero_txt: 'Corazón silesiano,<br>visión global.', s_players: 'JUGADORES', s_place: 'POSICIÓN', s_matches: 'PARTIDOS'
            },
            'RU': {
                nav_club: 'Клуб', nav_academy: 'Академия', nav_stadium: 'Стадион', nav_tickets: 'Билеты', nav_shop: 'Магазин', nav_contact: 'Контакт',
                m_league: 'Четвертая Лига', m_round: 'Тур 3', team_label: 'I СОСТАВ',
                hero_txt: 'Силезское сердце,<br>глобальное видение.', s_players: 'ИГРОКИ', s_place: 'МЕСТО', s_matches: 'МАТЧИ'
            }
        };

        function translatePage(lang) {
            // Zmiana etykiety w przycisku
            document.getElementById('current-lang-label').innerText = lang;
            
            // Tłumaczenie elementów z atrybutem data-t
            const elements = document.querySelectorAll('[data-t]');
            elements.forEach(el => {
                const key = el.getAttribute('data-t');
                if (translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
        }
    </script>
</body>
</html>
