<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* NAWIGACJA Z EFEKTEM SZKŁA */
        .club-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            
            padding: 10px 20px; /* Margines od krawędzi bocznych */
            display: flex;
            justify-content: flex-end; /* Cała zawartość do prawej */
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Kontener na przyciski - teraz przed logo */
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            margin-right: 15px; /* Odstęp między przyciskami a logo */
        }

        .nav-links li {
            margin: 0 10px;
        }

        .nav-links li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .nav-links li a:hover {
            color: #00ff00;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }

        /* LOGO NA MAXA PO PRAWEJ */
        .logo-wrapper {
            display: flex;
            align-items: center;
        }

        .club-logo {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            object-fit: contain;
            background: white; /* Logo Dynamo jest ciemne, więc białe tło je wyróżni */
            transition: transform 0.3s ease;
        }

        .club-logo:hover {
            transform: rotate(10deg) scale(1.1);
        }

        .hero {
            text-align: center;
            padding: 150px 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .hero span {
            color: #00ff00;
        }
    </style>
</head>
<body>

    <nav class="club-nav">
        <ul class="nav-links">
            <li><a href="#">Start</a></li>
            <li><a href="#">Terminarz</a></li>
            <li><a href="#">Tabela</a></li>
            <li><a href="#">Drużyna</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>

        <div class="logo-wrapper">
            <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="club-logo">
        </div>
    </nav>

    <div class="hero">
        <h1><span>DYNAMO</span> WROCŁAW</h1>
        <p style="color: rgba(255,255,255,0.4); letter-spacing: 3px; font-size: 0.9rem;">W BUDOWIE</p>
    </div>

</body>
</html>
