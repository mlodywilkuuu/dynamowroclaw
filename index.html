<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Dynamo Wrocław | Oficjalna Strona</title>
    <style>
        :root {
            --rm-navy: #001C58;
            --rm-darker: #081633;
            --rm-white: #FFFFFF;
            --rm-gold: #FEBE10;
        }

        body {
            margin: 0;
            background-color: var(--rm-white);
            color: var(--rm-navy);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* --- PRELOADER (3 SEKUNDY) --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #0055ff 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease;
        }
        .loader-logo {
            height: 120px; width: auto; border-radius: 50%;
            background: white; padding: 10px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.9); } 50% { transform: scale(1.05); } 100% { transform: scale(0.9); } }

        /* --- MENU (MAX LEWO, BEZ #) --- */
        .header-main { 
            background: var(--rm-white); 
            border-bottom: 1px solid #EEE; 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-container { 
            display: flex; 
            justify-content: flex-start; /* Wszystko do lewej */
            align-items: center; 
            padding: 10px 15px; 
        }
        .logo-nav { height: 55px; width: auto; margin-right: 30px; }
        .nav-links { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        .nav-links li { 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            cursor: pointer; 
            letter-spacing: 0.5px;
        }
        .nav-links li:hover { color: #0055ff; }

        /* --- MATCH CENTRE (STYL REAL MADRYT) --- */
        .match-centre { 
            background-color: var(--rm-darker); 
            color: white; 
            padding: 20px 40px; 
            min-height: 80px;
            display: flex;
            align-items: center;
        }
        .mc-layout { 
            display: flex; 
            align-items: center; 
            gap: 50px; 
            width: 100%; 
        }
        .mc-competition { 
            border-left: 3px solid var(--rm-gold); 
            padding-left: 15px; 
        }
        .mc-comp-name { display: block; font-weight: 800; font-size: 1rem; text-transform: uppercase; }
        .mc-score-box { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 5px 25px; 
            border-radius: 4px; 
            font-weight: 900; 
            font-size: 1.4rem;
        }
        .mc-teams {
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* --- HERO --- */
        .hero {
            padding: 150px 20px;
            text-align: center;
            background: radial-gradient(circle, #ffffff 0%, #f0f2f5 100%);
        }
        .hero h1 { font-size: 4.5rem; font-weight: 900; margin: 0; color: var(--rm-navy); }
        .hero h1 span { color: #0055ff; }
        .hero p { font-weight: 700; letter-spacing: 5px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="preloader">
        <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="loader-logo">
    </div>

    <header class="header-main">
        <nav class="nav-container">
            <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="logo-nav">
            <ul class="nav-links">
                <li onclick="location.reload()">Start</li>
                <li onclick="window.open('https://proligawroclaw.pl/team/fc-dinamo-wroclaw/schedule/')">Terminarz</li>
                <li>Tabela</li>
                <li>Drużyna</li>
            </ul>
        </nav>
    </header>

    <div class="match-centre">
        <div id="match-content" class="mc-layout">
            </div>
    </div>

    <section class="hero">
        <h1><span>DYNAMO</span> WROCŁAW</h1>
        <p>Oficjalna Strona Klubu</p>
    </section>

    <script>
        // Dane meczowe
        const matches = [
            { 
                date: new Date('2026-04-02T20:00:00'), 
                home: "FC Dinamo Wrocław", 
                away: "NDR", 
                score: "2 - 3", 
                comp: "Czwarta Liga", 
                venue: "Boisko nr 3" 
            },
            { 
                date: new Date('2026-04-07T19:00:00'), 
                home: "Mocne Chłopy", 
                away: "FC Dinamo Wrocław", 
                score: null, 
                comp: "Czwarta Liga", 
                venue: "Boisko nr 1" 
            }
        ];

        function renderMatchCentre() {
            const now = new Date();
            const display = document.getElementById('match-content');
            
            // Szukamy ostatniego meczu
            const lastPlayed = [...matches].reverse().find(m => m.date < now);
            const isWithin48h = lastPlayed && (now - lastPlayed.date) < (48 * 60 * 60 * 1000);

            if (isWithin48h) {
                // Wyświetlaj wynik przez 48h
                display.innerHTML = `
                    <div class="mc-competition">
                        <span class="mc-comp-name">${lastPlayed.comp}</span>
                        <span style="font-size:0.7rem; opacity:0.6;">OSTATNI WYNIK</span>
                    </div>
                    <div class="mc-teams">
                        ${lastPlayed.home} <span class="mc-score-box">${lastPlayed.score}</span> ${lastPlayed.away}
                    </div>
                    <div style="margin-left:auto; opacity:0.5; font-size:0.8rem;">${lastPlayed.venue}</div>
                `;
            } else {
                // Wyświetlaj następny mecz
                const next = matches.find(m => m.date > now);
                if (next) {
                    display.innerHTML = `
                        <div class="mc-competition">
                            <span class="mc-comp-name">${next.comp}</span>
                            <span style="font-size:0.7rem; opacity:0.6;">NASTĘPNY MECZ</span>
                        </div>
                        <div class="mc-teams">
                            ${next.home} <span class="mc-score-box" style="background:white; color:black;">VS</span> ${next.away}
                        </div>
                        <div style="margin-left:auto; opacity:0.5; font-size:0.8rem;">
                            ${next.date.toLocaleDateString()} | ${next.venue}
                        </div>
                    `;
                }
            }
        }

        window.addEventListener('load', () => {
            renderMatchCentre();
            setTimeout(() => { 
                const preloader = document.getElementById('preloader');
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 1000);
            }, 3000);
        });
    </script>
</body>
</html>
