<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Control Room</title>
    <style>
        /* Cały styl CSS wewnątrz pliku HTML */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top right, #0a1f1a, #040d0b);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 50px;
            padding: 20px;
        }

        /* LEWA SEKTCJA */
        .hero {
            flex: 1.5;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 150, 0.1);
            color: #00ff96;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid rgba(0, 255, 150, 0.3);
            margin-bottom: 40px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #00ff96;
            border-radius: 50%;
            box-shadow: 0 0 12px #00ff96;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .brand {
            color: #6a7c78;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(45px, 7vw, 90px);
            line-height: 0.95;
            color: #ffffff;
            max-width: 700px;
            letter-spacing: -3px;
            font-weight: 800;
        }

        /* PRAWA SEKTCJA */
        .control-room {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-title {
            color: #6a7c78;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 25px 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(0, 255, 150, 0.05);
            border-color: rgba(0, 255, 150, 0.2);
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 9px;
            color: #6a7c78;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            display: block;
        }

        .stat-value.small {
            font-size: 22px;
            color: #00ff96;
        }

        /* RESPONSYWNOŚĆ */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                text-align: left;
                margin-top: 50px;
                margin-bottom: 50px;
            }
            .hero {
                width: 100%;
            }
            .control-room {
                width: 100%;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <main class="hero">
            <div class="badge">
                <span class="dot"></span> Dynamo Live
            </div>
            <p class="brand">Dynamo Wrocław</p>
            <h1>Modern club management with instant squad switching.</h1>
        </main>

        <aside class="control-room">
            <p class="section-title">Control Room</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">👥 Listeners</p>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">📊 Peak Today</p>
                    <span class="stat-value">2</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">🌐 Channels</p>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">⚡ Selected</p>
                    <span class="stat-value small">Club</span>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
