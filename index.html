<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed; top: 0; z-index: 2000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        
        /* ROZWIJANE MENU KLUB */
        .dropdown { position: relative; display: inline-block; }
        .drop-link { 
            color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s;
            cursor: pointer;
        }
        .dropdown-menu {
            display: none; position: absolute; top: 100%; left: 0;
            background: rgba(10, 21, 37, 0.95); min-width: 160px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 0; margin-top: 10px;
        }
        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu a {
            color: white; padding: 10px 20px; text-decoration: none; display: block;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .dropdown-menu a:hover { background: rgba(0, 162, 255, 0.2); color: #00a2ff; }

        .nav-links a:not(.drop-link) { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: #00a2ff; }

        .match-centre-hero {
            width: 100%; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            margin-top: 85px; padding: 30px 40px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center;
        }
        .match-meta { border-left: 2px solid #00a2ff; padding-left: 15px; }
        .meta-league { font-size: 10px; font-weight: 900; color: #00a2ff; text-transform: uppercase; }
        .score-box { background: rgba(255, 255, 255, 0.05); padding: 12px 30px; border-radius: 12px; font-size: 34px; font-weight: 900; }
        .team-name { font-size: 26px; font-weight: 800; text-transform: uppercase; width: 250px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content-left">
            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img">
            <div class="nav-links">
                <div class="dropdown">
                    <span class="drop-link">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html">I Zespół</a>
                        <a href="#">Zarząd</a>
                        <a href="#">Historia</a>
                    </div>
                </div>
                <a href="#">Terminarz</a>
                <a href="#">Bilety</a>
                <a href="#">Sklep</a>
            </div>
        </div>
    </nav>

    <div class="match-centre-hero">
        <div class="match-meta">
            <span class="meta-league">Czwarta Liga</span>
            <div style="font-size: 15px; font-weight: 700;">Kolejka 3</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score-box">VS</div>
            <div style="margin-top: 10px; font-weight: 800;">FC DYNAMO vs KLIMEK PRO</div>
        </div>
    </div>
</body>
</html>
