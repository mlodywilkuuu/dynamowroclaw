<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Główne style bez zmian dla spójności */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo-img { height: 80px; width: auto; }

        /* --- POWIĘKSZONE MATCH CENTRE --- */
        .match-centre-hero {
            width: 100%;
            background: linear-gradient(90deg, rgba(0, 162, 255, 0.1), rgba(0, 0, 0, 0.4));
            margin-top: 90px;
            padding: 25px 50px;
            border-bottom: 1px solid rgba(0, 162, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .match-status {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #00a2ff;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .main-match-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 10px 0;
        }

        .team-name {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .score-box {
            background: #00a2ff;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.4);
        }

        .vs-circle {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
        }

        .match-info-sub {
            font-size: 13px;
            color: #6a7c78;
            margin-top: 10px;
        }

        /* --- RESZTA STRONY --- */
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 50px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .hero h1 { font-size: clamp(35px, 7vw, 90px); font-weight: 800; text-transform: uppercase; }

        .control-room { flex: 1; background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-card { background: rgba(0, 0, 0, 0.4); padding: 30px 20px; border-radius: 25px; }
        .stat-label { font-size: 10px; color: #6a7c78; font-weight: 800; }
        .stat-value { font-size: 36px; font-weight: 700; color: #ffffff; }

        @media (max-width: 1024px) {
            .container { flex-direction: column; text-align: center; }
            .main-match-display { gap: 15px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
        </div>
        <div class="lang-dropdown">
            <button class="dropbtn"><i class="fas fa-globe"></i> Polski</button>
        </div>
    </nav>

    <div class="match-centre-hero" id="match-display">
        <div class="match-status" id="status-text">Ładowanie danych...</div>
        <div class="main-match-display">
            <span class="team-name">FC Dynamo Wrocław</span>
            <div id="score-container" class="score-box">? : ?</div>
            <span class="team-name" id="opponent-name">Klimek PRO</span>
        </div>
        <div class="match-info-sub" id="match-details">
            Czwarta Liga | 13/04/2026 20:00 | Boisko nr. 2
        </div>
    </div>

    <div class="container">
        <main class="hero">
            <h1 id="hero-title">Silesian heart, global vision.</h1>
        </main>

        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card"><p class="stat-label">ZAWODNICY</p><span class="stat-value">24</span></div>
                <div class="stat-card"><p class="stat-label">MIEJSCE</p><span class="stat-value">1</span></div>
                <div class="stat-card"><p class="stat-label">MECZE</p><span class="stat-value">12</span></div>
                <div class="stat-card"><p class="stat-label">STATUS</p><span class="stat-value" style="color: #00a2ff;">PRIME</span></div>
            </div>
        </aside>
    </div>

    <script>
        // Logika Match Centre
        const schedule = [
            { date: "2026-04-13T20:00:00", opponent: "Klimek PRO", score: "3:1", location: "Boisko nr. 2" },
            { date: "2026-04-21T21:00:00", opponent: "RunnersHood", score: null, location: "Boisko nr. 1" },
            { date: "2026-04-27T20:00:00", opponent: "FC Outsiders", score: null, location: "Boisko nr. 1" }
        ];

        function updateMatchCentre() {
            const now = new Date();
            const statusText = document.getElementById('status-text');
            const scoreContainer = document.getElementById('score-container');
            const opponentName = document.getElementById('opponent-name');
            const matchDetails = document.getElementById('match-details');

            // Znajdź mecz, który był ostatnio (do 48h wstecz) lub jest następny
            let activeMatch = null;

            for (let match of schedule) {
                const matchDate = new Date(match.date);
                const diffHours = (now - matchDate) / (1000 * 60 * 60);

                // Jeśli mecz był niedawno (mniej niż 48h temu) i ma wynik
                if (diffHours >= 0 && diffHours <= 48 && match.score) {
                    activeMatch = { ...match, type: 'RECENT' };
                    break;
                }
                // Jeśli mecz jest w przyszłości
                if (matchDate > now) {
                    activeMatch = { ...match, type: 'UPCOMING' };
                    break;
                }
            }

            if (activeMatch) {
                opponentName.innerText = activeMatch.opponent;
                matchDetails.innerText = `Czwarta Liga | ${new Date(activeMatch.date).toLocaleString()} | ${activeMatch.location}`;

                if (activeMatch.type === 'RECENT') {
                    statusText.innerText = "Ostatni Wynik (48H)";
                    scoreContainer.innerText = activeMatch.score;
                    scoreContainer.style.background = "#00a2ff";
                } else {
                    statusText.innerText = "Nadchodzący Mecz";
                    scoreContainer.innerText = "VS";
                    scoreContainer.style.background = "rgba(255,255,255,0.1)";
                }
            }
        }

        // Uruchom przy starcie
        updateMatchCentre();
    </script>
</body>
</html>
