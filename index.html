<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; transition: transform 0.3s; }
        .logo-img:hover { transform: scale(1.05); }

        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: #00a2ff; }

        .dropbtn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* --- MATCH CENTRE HERO (POPRAWIONY UKŁAD) --- */
        .match-centre-hero {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            margin-top: 85px;
            padding: 30px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid; /* Użycie siatki dla lepszej kontroli lewo-środek */
            grid-template-columns: 1fr 2fr 1fr; 
            align-items: center;
        }

        /* Lewa strona - informacje pod sobą przy kresce */
        .match-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-self: start; /* Przyciąganie do lewej krawędzi */
        }

        .meta-text {
            display: flex;
            flex-direction: column;
            border-right: 2px solid #00a2ff; /* Kreska po prawej stronie napisów */
            padding-right: 15px;
            text-align: right;
        }

        .meta-league { font-size: 10px; font-weight: 900; color: #00a2ff; text-transform: uppercase; letter-spacing: 2px; }
        .meta-round { font-size: 15px; font-weight: 700; color: #ffffff; }
        .meta-date { font-size: 11px; color: #8899a6; font-family: monospace; }

        /* Środek - Wyśrodkowany zespół i drużyny */
        .match-main-content {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-badge-label { 
            font-size: 10px; 
            font-weight: 900; 
            letter-spacing: 5px; 
            color: #ffffff; 
            margin-bottom: 12px; 
            background: rgba(0, 162, 255, 0.2); 
            padding: 5px 30px; 
            border-radius: 20px;
            border: 1px solid rgba(0, 162, 255, 0.3);
        }

        .main-match-display { display: flex; align-items: center; gap: 40px; }
        .team-name { font-size: 26px; font-weight: 800; text-transform: uppercase; width: 250px; }
        .team-left { text-align: right; }
        .team-right { text-align: left; }

        .score-box { 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 12px; 
            font-size: 34px; 
            font-weight: 900; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 120px; 
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.1);
        }

        /* --- CONTENT --- */
        .container {
            width: 90%;
            max-width: 1400px;
            margin: 80px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero h1 { font-size: clamp(40px, 8vw, 90px); font-weight: 900; text-transform: uppercase; line-height: 0.9; letter-spacing: -3px; }
        
        .control-room { 
            flex: 0.8; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 40px; 
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(30px);
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-card { background: rgba(0, 0, 0, 0.2); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.03); }
        .stat-label { font-size: 10px; color: #6a7c78; font-weight: 800; }
        .stat-value { font-size: 40px; font-weight: 700; color: #fff; }

        @media (max-width: 1100px) {
            .match-centre-hero { display: flex; flex-direction: column; text-align: center; gap: 30px; }
            .match-meta { justify-content: center; border-right: none; }
            .meta-text { border-right: none; border-bottom: 2px solid #00a2ff; padding: 0 0 10px 0; text-align: center; }
            .container { flex-direction: column; text-align: center; }
            .team-name { width: auto; font-size: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html">
                <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" alt="Logo" class="logo-img">
            </a>
            <div class="nav-links">
                <a href="#">Klub</a>
                <a href="#">Terminarz</a>
                <a href="#">Bilety</a>
                <a href="#">Sklep</a>
            </div>
        </div>
        <div class="lang-dropdown">
            <button class="dropbtn"><i class="fas fa-globe" style="color:#00a2ff"></i> PL</button>
        </div>
    </nav>

    <div class="match-centre-hero">
        <div class="match-meta">
            <div class="meta-text">
                <span class="meta-league" id="m-league">Czwarta Liga</span>
                <span class="meta-round" id="m-round">Kolejka 3</span>
                <span class="meta-date" id="m-date">13/04/2026 | 20:00</span>
            </div>
        </div>

        <div class="match-main-content">
            <div class="team-badge-label">I ZESPÓŁ</div>
            <div class="main-match-display">
                <span class="team-name team-left">FC Dynamo Wrocław</span>
                <div id="score-container" class="score-box">VS</div>
                <span class="team-name team-right" id="opponent-name">Klimek PRO</span>
            </div>
        </div>
        
        <div></div>
    </div>

    <div class="container">
        <main class="hero">
            <h1 id="hero-title">Silesian heart,<br>global vision.</h1>
        </main>
        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card"><p class="stat-label">ZAWODNICY</p><span class="stat-value">24</span></div>
                <div class="stat-card"><p class="stat-label">MIEJSCE</p><span class="stat-value">1</span></div>
                <div class="stat-card"><p class="stat-label">MECZE</p><span class="stat-value">12</span></div>
                <div class="stat-card"><p class="stat-label">STATUS</p><span class="stat-value" style="color:#00a2ff">PRIME</span></div>
            </div>
        </aside>
    </div>

    <script>
        // Terminarz z Twojego zdjęcia
        const schedule = [
            { date: "2026-04-13T20:00:00", opponent: "Klimek PRO", score: null, league: "Czwarta Liga", round: "Kolejka 3" },
            { date: "2026-04-21T21:00:00", opponent: "RunnersHood", score: null, league: "Czwarta Liga", round: "Kolejka 4" }
        ];

        function updateMatch() {
            const now = new Date();
            const match = schedule[0]; // Na razie pierwszy mecz z listy

            document.getElementById('opponent-name').innerText = match.opponent;
            document.getElementById('m-league').innerText = match.league;
            document.getElementById('m-round').innerText = match.round;
            document.getElementById('m-date').innerText = new Date(match.date).toLocaleString('pl-PL', {
                day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
            }).replace(',', ' |');
        }
        updateMatch();
    </script>
</body>
</html>
