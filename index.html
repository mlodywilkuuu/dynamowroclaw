<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Dynamo Wrocław | Official Website</title>
    <style>
        :root {
            --rm-navy: #001C58;
            --rm-white: #FFFFFF;
            --rm-gold: #FEBE10;
        }

        body {
            margin: 0;
            background-color: #f4f4f4;
            color: var(--rm-navy);
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- MENU --- */
        .header-main { 
            background: var(--rm-white); 
            border-bottom: 1px solid #EEE; 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-container { 
            display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; 
        }
        .nav-left { display: flex; align-items: center; }
        .logo-nav { height: 50px; width: auto; margin-right: 25px; }
        .nav-links { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .nav-links li { font-weight: 700; text-transform: uppercase; font-size: 0.85rem; cursor: pointer; }

        /* JĘZYKI */
        .lang-container { position: relative; cursor: pointer; font-weight: 700; font-size: 0.8rem; }
        .lang-list { 
            display: none; position: absolute; right: 0; top: 100%; 
            background: white; border: 1px solid #eee; min-width: 120px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .lang-container:hover .lang-list { display: block; }
        .lang-item { padding: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        /* --- MATCH CENTRE: EFEKT SZKŁA I GRADIENT NA CAŁEJ STREFIE --- */
        .match-centre-zone {
            /* Gradient niebiesko-biały z efektem szkła */
            background: linear-gradient(135deg, rgba(0, 28, 88, 0.95) 0%, rgba(255, 255, 255, 0.9) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 25px 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--rm-navy); /* Ciemny tekst dla kontrastu na jasnym fragmencie gradientu */
        }

        .mc-content-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            width: 95%;
        }

        /* LEWA STRONA: KRESKA + INFO */
        .mc-info-block {
            border-left: 4px solid var(--rm-gold);
            padding-left: 20px;
            display: flex;
            flex-direction: column;
        }

        .mc-comp-line {
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mc-date-line {
            font-size: 0.85rem;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ŚRODEK: MECZ W JEDNEJ LINII */
        .mc-match-line {
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .mc-score-pill {
            background: var(--rm-navy);
            color: white;
            padding: 6px 25px;
            border-radius: 4px;
            font-size: 1.4rem;
        }

        /* --- HERO --- */
        .hero { padding: 100px 20px; text-align: center; }
        .hero h1 { font-size: 4.5rem; font-weight: 900; margin: 0; color: var(--rm-navy); }
        .hero h1 span { color: #0055ff; }
    </style>
</head>
<body>

    <header class="header-main">
        <nav class="nav-container">
            <div class="nav-left">
                <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="logo-nav">
                <ul class="nav-links">
                    <li onclick="location.reload()">Start</li>
                    <li onclick="window.open('https://proligawroclaw.pl/team/fc-dinamo-wroclaw/schedule/')">Terminarz</li>
                    <li>Tabela</li>
                    <li>Drużyna</li>
                </ul>
            </div>
            <div class="lang-container">
                🌐 <span id="current-lang">PL</span>
                <div class="lang-list">
                    <div class="lang-item" onclick="setLang('pl')">POLSKI</div>
                    <div class="lang-item" onclick="setLang('en')">ENGLISH</div>
                    <div class="lang-item" onclick="setLang('ru')">PUSSKIY</div>
                </div>
            </div>
        </nav>
    </header>

    <div class="match-centre-zone">
        <div class="mc-content-row" id="mc-data">
            </div>
    </div>

    <section class="hero">
        <h1><span>DYNAMO</span> WROCŁAW</h1>
        <p style="font-weight: 800; opacity: 0.4; letter-spacing: 4px;">OFFICIAL WEBSITE</p>
    </section>

    <script>
        const matches = [
            { 
                date: new Date('2026-04-02T20:00:00'), 
                home: "FC Dinamo Wrocław", 
                away: "NDR", 
                score: "2 - 3", 
                comp: "Czwarta Liga", 
                kolejka: "Kolejka 1",
                venue: "Boisko nr 3" 
            },
            { 
                date: new Date('2026-04-07T19:00:00'), 
                home: "Mocne Chłopy", 
                away: "FC Dinamo Wrocław", 
                score: "19:00", 
                comp: "Czwarta Liga", 
                kolejka: "Kolejka 2",
                venue: "Boisko nr 1" 
            }
        ];

        function renderMatch() {
            const now = new Date();
            const last = [...matches].reverse().find(m => m.date < now);
            const isWithin48h = last && (now - last.date) < (48 * 60 * 60 * 1000);
            const active = isWithin48h ? last : matches.find(m => m.date > now);
            
            const mc = document.getElementById('mc-data');
            const dateStr = active.date.toLocaleDateString('pl-PL');
            
            mc.innerHTML = `
                <div class="mc-info-block">
                    <div class="mc-comp-line">${active.comp} • ${active.kolejka}</div>
                    <div class="mc-date-line">${dateStr} • ${active.venue}</div>
                </div>
                
                <div class="mc-match-line">
                    <span>${active.home}</span>
                    <div class="mc-score-pill">${active.score}</div>
                    <span>${active.away}</span>
                </div>
            `;
        }

        function setLang(l) {
            document.getElementById('current-lang').innerText = l.toUpperCase();
        }

        window.onload = renderMatch;
    </script>
</body>
</html>
