<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* NAWIGACJA SZKLANA */
        .club-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between; /* Logo/Przyciski lewo, Języki prawo */
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* LEWA STRONA: LOGO + PRZYCISKI */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .club-logo {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            object-fit: contain;
            background: white;
            flex-shrink: 0;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-links li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .nav-links li a:hover {
            color: #00ff00;
        }

        /* PRAWA STRONA: JĘZYKI */
        .lang-dropdown {
            position: relative;
            display: inline-block;
            padding-bottom: 10px; /* Bufor, żeby menu nie znikało */
            margin-bottom: -10px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%; /* Pojawia się zaraz pod przyciskiem */
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(20px);
            min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .lang-content a {
            color: white;
            padding: 12px 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .lang-content a:hover {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }

        /* Pokazywanie menu */
        .lang-dropdown:hover .lang-content {
            display: block;
        }

        .hero {
            text-align: center;
            padding: 150px 20px;
        }

        .hero h1 span {
            color: #00ff00;
        }
    </style>
</head>
<body>

    <nav class="club-nav">
        <div class="nav-left">
            <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="club-logo">
            
            <ul class="nav-links">
                <li><a href="index.html">Start</a></li>
                <li><a href="#">Terminarz</a></li>
                <li><a href="#">Tabela</a></li>
                <li><a href="#">Drużyna</a></li>
                <li><a href="#">Kontakt</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">🌐 Język</button>
            <div class="lang-content">
                <a href="#"><img src="https://flagcdn.com/w20/pl.png" alt="PL"> Polski</a>
                <a href="#"><img src="https://flagcdn.com/w20/gb.png" alt="EN"> English</a>
                <a href="#"><img src="https://flagcdn.com/w20/ru.png" alt="RU"> Pусский</a>
                <a href="#"><img src="https://flagcdn.com/w20/es.png" alt="ES"> Español</a>
                <a href="#"><img src="https://flagcdn.com/w20/fr.png" alt="FR"> Français</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1><span>DYNAMO</span> WROCŁAW</h1>
        <p style="color: rgba(255,255,255,0.4); letter-spacing: 3px;">OFICJALNA STRONA KLUBU</p>
    </div>

</body>
</html>
