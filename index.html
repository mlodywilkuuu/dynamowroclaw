<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Oficjalna Strona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STYLI EKRANU ŁADOWANIA (PRELOADER) --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050b14;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-content {
            text-align: center;
        }

        .loader-logo {
            width: 150px;
            height: auto;
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: #007bff;
            position: absolute;
            animation: loading 2.5s forwards cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .preloader-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* --- TWOJE ORYGINALNE STYLE STRONY --- */
        body { 
            background: #050b14; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #0a1525; border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            position: fixed; top: 0; left: 0; z-index: 1000;
        }

        .logo-img { height: 55px; width: auto; }

        .nav-links { display: flex; gap: 20px; }

        .nav-item { 
            color: #ffffff; text-decoration: none; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px; 
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(5, 11, 20, 0.7), rgba(5, 11, 20, 0.7)), url('TWOJE-ZDJECIE-TLA.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 60px;
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
            letter-spacing: -2px;
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="loader-logo" alt="Dynamo Wrocław">
            <div class="loader-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="index.html" class="nav-item" style="color:#007bff">Główna</a>
                <a href="zespol.html" class="nav-item">Zespół</a>
                <a href="aktualnosci.html" class="nav-item">Aktualności</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>Dynamo Wrocław</h1>
        <p style="text-transform: uppercase; letter-spacing: 5px; opacity: 0.7;">Oficjalna strona klubu</p>
    </div>

    <script>
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            
            // Czekamy 2 sekundy na animację paska
            setTimeout(() => {
                preloader.classList.add('preloader-hidden');
                
                // Całkowite usunięcie z widoku po zaniknięciu
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 800);
            }, 2000); 
        });
    </script>

</body>
</html>
