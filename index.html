<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Oficjalna Strona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- NAVBAR: PRZYCISKI OBOK LOGO, JĘZYKI PO PRAWEJ --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 21, 37, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 9999;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo-img { height: 60px; width: auto; display: block; }
        .nav-links { display: flex; gap: 10px; }
        
        .nav-right { display: flex; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 10px; transition: 0.3s; }
        .nav-btn:hover { color: #00a2ff; }

        /* --- LANG MENU --- */
        .lang-container { position: relative; }
        .lang-menu { 
            display: none; position: absolute; right: 0; top: 120%; 
            background: #0a1525; border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; min-width: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .lang-menu.active { display: block; }
        .lang-option { padding: 10px 15px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .lang-option:hover { background: #00a2ff; }

        /* --- HERO SECTION --- */
        .hero { 
            height: 80vh; background: linear-gradient(to bottom, transparent, #050b14), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018'); 
            background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 10%; 
        }
        .hero-title { font-size: clamp(40px, 8vw, 90px); font-weight: 900; text-transform: uppercase; font-style: italic; line-height: 0.9; }

        /* --- MATCH CENTER --- */
        .match-section { padding: 60px 10%; background: #050b14; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 30px; }
        .match-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; transition: 0.3s; }
        .match-card.next { border: 2px solid #00a2ff; background: #0a1525; }
        
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; text-align: center; }
        .score { font-size: 35px; font-weight: 900; font-style: italic; color: #fff; }
        .vs { font-size: 20px; font-weight: 900; color: rgba(255,255,255,0.2); }
        .team-name { font-size: 12px; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .mini-logo { height: 50px; width: auto; }
        .dummy-logo { height: 50px; width: 50px; background: #222; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="aktualnosci.html" class="nav-btn">Aktualności</a>
                <a href="zespol.html" class="nav-btn">Zespół</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="lang-container">
                <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe"></i> <span id="curr-lang">PL</span></div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="setLang('PL')">🇵🇱 PL</div>
                    <div class="lang-option" onclick="setLang('EN')">🇬🇧 EN</div>
                    <div class="lang-option" onclick="setLang('UA')">🇺🇦 UA</div>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div>
            <p style="color: #00a2ff; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px;">Wrocławski Styl</p>
            <h1 class="hero-title">DYNAMO<br>WROCŁAW</h1>
        </div>
    </header>

    <section class="match-section">
        <h2 style="font-size: 10px; color: #00a2ff; letter-spacing: 2px; text-transform: uppercase; font-weight: 900;">Match Center</h2>
        <div class="match-grid">
            
            <div class="match-card">
                <p style="font-size: 10px; font-weight: 800; opacity: 0.5;">ZAKOŃCZONY | 12.04.2026</p>
                <div class="team-row">
                    <div style="flex:1">
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="mini-logo">
                        <p class="team-name">Dynamo</p>
                    </div>
                    <div style="flex:1" class="score">3 : 1</div>
                    <div style="flex:1">
                        <div class="dummy-logo">R</div>
                        <p class="team-name">Rywal A</p>
                    </div>
                </div>
                <button onclick="location.href='aktualnosci.html'" style="width:100%; padding:10px; background:rgba(255,255,255,0.05); border:1px solid #333; color:#fff; font-size:10px; font-weight:800; cursor:pointer; border-radius:5px;">RAPORT MECZOWY</button>
            </div>

            <div class="match-card next">
                <p style="font-size: 10px; font-weight: 800; color: #00a2ff;">NASTĘPNY | 19.04.2026 - 18:00</p>
                <div class="team-row">
                    <div style="flex:1">
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="mini-logo">
                        <p class="team-name">Dynamo</p>
                    </div>
                    <div style="flex:1" class="vs">VS</div>
                    <div style="flex:1">
                        <div class="dummy-logo">R</div>
                        <p class="team-name">Rywal B</p>
                    </div>
                </div>
                <p style="text-align:center; font-size:11px; opacity:0.7;"><i class="fas fa-map-marker-alt"></i> Stadion Miejski</p>
            </div>

        </div>
    </section>

    <script>
        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }
        function setLang(lang) {
            document.getElementById('curr-lang').innerText = lang;
            document.getElementById('lang-menu').classList.remove('active');
            // Tutaj można dodać logikę zmiany języka dla strony głównej
        }
        window.onclick = function(event) {
            if (!event.target.matches('.nav-btn') && !event.target.matches('.fa-globe')) {
                document.getElementById('lang-menu').classList.remove('active');
            }
        }
    </script>
</body>
</html>
