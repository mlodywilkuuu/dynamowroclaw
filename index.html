<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%;
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            height: 80px; /* Nieco większe logo */
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- DROPDOWN JĘZYKÓW --- */
        .lang-dropdown {
            position: relative;
            padding: 15px 0; /* Większy margines, żeby menu nie znikało */
        }

        .dropbtn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background-color: #0a1525;
            min-width: 160px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.8);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1001;
        }

        .lang-dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #004080;
        }

        /* Ikony flag (zastępcze obrazy PNG, jeśli emoji u Ciebie nie działają) */
        .flag-icon {
            width: 20px;
            height: 15px;
            object-fit: cover;
        }

        /* --- TREŚĆ --- */
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 180px auto 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .hero { flex: 1.5; }

        h1 {
            font-size: clamp(35px, 7vw, 90px);
            line-height: 0.9;
            color: #ffffff;
            letter-spacing: -3px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .control-room {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 40px;
            backdrop-filter: blur(25px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px 20px;
            border-radius: 25px;
        }

        .stat-label { font-size: 10px; color: #6a7c78; font-weight: 800; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: 700; color: #ffffff; }

        @media (max-width: 1024px) {
            .container { flex-direction: column; text-align: center; margin-top: 120px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" alt="Dynamo Logo" class="logo-img">
            <div class="nav-links">
                <a href="#" data-key="nav_club">Klub</a>
                <a href="#" data-key="nav_schedule">Terminarz</a>
                <a href="#" data-key="nav_tickets">Bilety</a>
                <a href="#" data-key="nav_shop">Sklep</a>
            </div>
        </div>
        
        <div class="lang-dropdown">
            <button class="dropbtn">🌐 <span id="current-lang">Język</span></button>
            <div class="dropdown-content">
                <a href="#" onclick="translatePage('pl')">🇵🇱 Polski</a>
                <a href="#" onclick="translatePage('es')">🇪🇸 Español</a>
                <a href="#" onclick="translatePage('ru')">🇷🇺 Русский</a>
                <a href="#" onclick="translatePage('ua')">🇺🇦 Українська</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="hero">
            <h1 id="hero-title">Silesian heart, global vision.</h1>
        </main>

        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label" data-key="stat_players">ZAWODNICY</p>
                    <span class="stat-value">24</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label" data-key="stat_rank">MIEJSCE</p>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label" data-key="stat_matches">MECZE</p>
                    <span class="stat-value">12</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">STATUS</p>
                    <span class="stat-value" style="color: #00a2ff; font-size: 24px;">PRIME</span>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Słownik tłumaczeń
        const translations = {
            pl: {
                nav_club: "Klub",
                nav_schedule: "Terminarz",
                nav_tickets: "Bilety",
                nav_shop: "Sklep",
                hero_title: "Śląskie serce, globalna wizja.",
                stat_players: "ZAWODNICY",
                stat_rank: "MIEJSCE",
                stat_matches: "MECZE"
            },
            es: {
                nav_club: "Club",
                nav_schedule: "Calendario",
                nav_tickets: "Entradas",
                nav_shop: "Tienda",
                hero_title: "Corazón silesiano, visión global.",
                stat_players: "JUGADORES",
                stat_rank: "POSICIÓN",
                stat_matches: "PARTIDOS"
            },
            ru: {
                nav_club: "Клуб",
                nav_schedule: "Расписание",
                nav_tickets: "Билеты",
                nav_shop: "Магазин",
                hero_title: "Силезское сердце, глобальное видение.",
                stat_players: "ИГРОКИ",
                stat_rank: "МЕСТО",
                stat_matches: "МАТЧИ"
            },
            ua: {
                nav_club: "Клуб",
                nav_schedule: "Розклад",
                nav_tickets: "Квитки",
                nav_shop: "Магазин",
                hero_title: "Сілезьке серце, глобальне бачення.",
                stat_players: "ГРАВЦІ",
                stat_rank: "МІСЦЕ",
                stat_matches: "МАТЧІ"
            }
        };

        function translatePage(lang) {
            // Tłumaczenie nagłówka
            document.getElementById('hero-title').innerText = translations[lang].hero_title;
            
            // Tłumaczenie elementów z atrybutem data-key
            document.querySelectorAll('[data-key]').forEach(elem => {
                const key = elem.getAttribute('data-key');
                elem.innerText = translations[lang][key];
            });

            // Aktualizacja tekstu przycisku
            const flags = { pl: '🇵🇱 Polski', es: '🇪🇸 Español', ru: '🇷🇺 Русский', ua: '🇺🇦 Українська' };
            document.getElementById('current-lang').innerText = flags[lang];
        }
    </script>

</body>
</html>
