<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR DOPRACOWANY --- */
        nav {
            width: 100%;
            padding: 10px 20px; /* Zmniejszony padding, by było max do lewej/prawej */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px; /* Mniejszy odstęp od logo */
        }

        .logo-img {
            height: 70px;
            width: auto;
            /* Usunięcie białego tła (działa na czyste białe tło) */
            mix-blend-mode: lighten; 
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00a2ff;
        }

        /* --- DROPDOWN JĘZYKÓW (POPRAWIONY) --- */
        .lang-dropdown {
            position: relative;
            padding: 10px 0; /* "Most" ułatwiający najechanie myszką */
        }

        .dropbtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%; /* Pojawia się zaraz pod przyciskiem */
            background-color: #0a1525;
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.8);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            font-size: 14px;
            transition: 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #004080;
        }

        /* Aby menu nie znikało za szybko */
        .lang-dropdown:hover .dropdown-content {
            display: block;
        }

        /* --- TREŚĆ --- */
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 180px auto 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .hero { flex: 1.5; }

        h1 {
            font-size: clamp(40px, 8vw, 100px);
            line-height: 0.9;
            color: #ffffff;
            letter-spacing: -4px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .control-room {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 40px;
            backdrop-filter: blur(25px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .stat-label { font-size: 10px; color: #6a7c78; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-value { font-size: 40px; font-weight: 700; color: #ffffff; }

        @media (max-width: 1024px) {
            .container { flex-direction: column; text-align: center; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3.jpg" alt="Dynamo Logo" class="logo-img">
            <div class="nav-links">
                <a href="#">Klub</a>
                <a href="#">Terminarz</a>
                <a href="#">Bilety</a>
                <a href="#">Sklep</a>
            </div>
        </div>
        
        <div class="lang-dropdown">
            <button class="dropbtn">🌐 Wybierz Język</button>
            <div class="dropdown-content">
                <a href="#"><span>🇵🇱</span> Polski</a>
                <a href="#"><span>🇪🇸</span> Español</a>
                <a href="#"><span>🇷🇺</span> Русский</a>
                <a href="#"><span>🇺🇦</span> Українська</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="hero">
            <h1>Silesian heart, global vision.</h1>
        </main>

        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">ZAWODNICY</p>
                    <span class="stat-value">24</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">MIEJSCE</p>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">MECZE</p>
                    <span class="stat-value">12</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">STATUS</p>
                    <span class="stat-value" style="color: #00a2ff; font-size: 24px;">PRIME</span>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
