<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* PASEK NAWIGACJI */
        .club-nav {
            background-color: #1a1a1a;
            padding: 10px 30px;
            display: flex;
            /* To przesuwa cały zestaw (linki + logo) na prawą stronę */
            justify-content: flex-end; 
            align-items: center;
            border-bottom: 3px solid #00ff00;
        }

        /* Kontener na przyciski */
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            margin-right: 20px; /* Odstęp między ostatnim przyciskiem a logo */
        }

        .nav-links li {
            margin: 0 15px;
        }

        .nav-links li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links li a:hover {
            color: #00ff00;
        }

        /* LOGO */
        .club-logo {
            height: 60px;
            width: 60px;
            border-radius: 50%;
            border: 2px solid #00ff00;
            object-fit: contain;
            background-color: white; /* Białe tło pod logo, jeśli jest przezroczyste */
            display: block;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 4rem;
            color: #00ff00;
            margin: 0;
        }
    </style>
</head>
<body>

    <nav class="club-nav">
        <ul class="nav-links">
            <li><a href="#">Start</a></li>
            <li><a href="#">Terminarz</a></li>
            <li><a href="#">Tabela</a></li>
            <li><a href="#">Drużyna</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>

        <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="club-logo">
    </nav>

    <div class="hero">
        <h1>DYNAMO WROCŁAW</h1>
        <p>Strona w budowie</p>
    </div>

</body>
</html>
