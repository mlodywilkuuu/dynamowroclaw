<style>
    /* --- POWIĘKSZONE MATCH CENTRE --- */
    .match-centre-hero {
        width: 100%;
        background: linear-gradient(90deg, rgba(0, 162, 255, 0.05) 0%, rgba(0, 0, 0, 0.6) 50%, rgba(0, 162, 255, 0.05) 100%);
        margin-top: 90px;
        padding: 30px 20px;
        border-bottom: 1px solid rgba(0, 162, 255, 0.2);
        display: flex;
        justify-content: center; /* Wyśrodkowanie całej zawartości */
        align-items: center;
        gap: 40px;
    }

    /* Lewa kolumna z separatorem | */
    .match-meta {
        display: flex;
        align-items: center;
        gap: 20px;
        border-right: 2px solid #00a2ff; /* Niebieska kreska | */
        padding-right: 20px;
        text-align: right;
    }

    .meta-text {
        display: flex;
        flex-direction: column;
    }

    .meta-league { font-size: 11px; font-weight: 900; color: #00a2ff; text-transform: uppercase; letter-spacing: 1px; }
    .meta-round { font-size: 14px; font-weight: 700; color: #ffffff; }
    .meta-date { font-size: 12px; color: #6a7c78; }

    /* Środkowa sekcja meczu */
    .match-main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .team-badge-label {
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 4px;
        color: #ffffff;
        text-transform: uppercase;
        margin-bottom: 15px;
        background: rgba(0, 162, 255, 0.2);
        padding: 4px 20px;
        border-radius: 20px;
    }

    .main-match-display {
        display: flex;
        align-items: center;
        gap: 30px;
    }

    .team-name {
        font-size: 26px;
        font-weight: 800;
        text-transform: uppercase;
        color: #ffffff;
        width: 250px;
    }

    .team-left { text-align: right; }
    .team-right { text-align: left; }

    .score-box {
        background: #00a2ff;
        color: white;
        padding: 12px 30px;
        border-radius: 12px;
        font-size: 36px;
        font-weight: 900;
        box-shadow: 0 0 30px rgba(0, 162, 255, 0.3);
        min-width: 120px;
        text-align: center;
    }

    @media (max-width: 1024px) {
        .match-centre-hero { flex-direction: column; gap: 20px; }
        .match-meta { border-right: none; border-bottom: 2px solid #00a2ff; padding-right: 0; padding-bottom: 15px; text-align: center; }
        .team-name { width: auto; font-size: 20px; }
    }
</style>

<div class="match-centre-hero">
    <div class="match-meta">
        <div class="meta-text">
            <span class="meta-league" id="m-league">Czwarta Liga</span>
            <span class="meta-round" id="m-round">Kolejka 3</span>
            <span class="meta-date" id="m-date">13/04/2026 | 20:00</span>
        </div>
    </div>

    <div class="match-main-content">
        <div class="team-badge-label">I ZESPÓŁ</div>
        <div class="main-match-display">
            <span class="team-name team-left">FC Dynamo Wrocław</span>
            <div id="score-container" class="score-box">? : ?</div>
            <span class="team-name team-right" id="opponent-name">Klimek PRO</span>
        </div>
    </div>
</div>

<script>
    // Pełny terminarz z Twojego zdjęcia
    const schedule = [
        { date: "2026-04-13T20:00:00", opponent: "Klimek PRO", score: "3:1", league: "Czwarta Liga", round: "Kolejka 3" },
        { date: "2026-04-21T21:00:00", opponent: "RunnersHood", score: null, league: "Czwarta Liga", round: "Kolejka 4" },
        { date: "2026-04-27T20:00:00", opponent: "FC Outsiders", score: null, league: "Czwarta Liga", round: "Kolejka 5" },
        { date: "2026-05-07T22:00:00", opponent: "Piorun Zaodrze", score: null, league: "Czwarta Liga", round: "Kolejka 6" }
    ];

    function updateMatchCentre() {
        const now = new Date();
        const scoreContainer = document.getElementById('score-container');
        const opponentName = document.getElementById('opponent-name');
        
        const mLeague = document.getElementById('m-league');
        const mRound = document.getElementById('m-round');
        const mDate = document.getElementById('m-date');

        let activeMatch = null;

        for (let i = 0; i < schedule.length; i++) {
            const matchDate = new Date(schedule[i].date);
            const diffHours = (now - matchDate) / (1000 * 60 * 60);

            // Jeśli mecz był niedawno (do 48h)
            if (diffHours >= 0 && diffHours <= 48) {
                activeMatch = schedule[i];
                break;
            }
            // Jeśli to kolejny nadchodzący mecz
            if (matchDate > now) {
                activeMatch = schedule[i];
                break;
            }
        }

        if (activeMatch) {
            opponentName.innerText = activeMatch.opponent;
            mLeague.innerText = activeMatch.league;
            mRound.innerText = activeMatch.round;
            
            const d = new Date(activeMatch.date);
            mDate.innerText = `${d.toLocaleDateString('pl-PL')} | ${d.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'})}`;

            if (activeMatch.score) {
                scoreContainer.innerText = activeMatch.score;
                scoreContainer.style.background = "#00a2ff";
            } else {
                scoreContainer.innerText = "VS";
                scoreContainer.style.background = "rgba(255,255,255,0.1)";
            }
        }
    }

    updateMatchCentre();
</script>
