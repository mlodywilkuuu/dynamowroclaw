<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed; top: 0; z-index: 2000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        
        .nav-btn { 
            color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; 
            cursor: pointer; padding: 10px; 
        }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }

        /* DROPDOWN */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu {
            display: block; visibility: hidden; opacity: 0; position: absolute; top: 100%; left: 0;
            background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; 
            transition: all 0.3s ease; transform: translateY(10px);
        }
        .dropdown:hover .dropdown-menu { visibility: visible; opacity: 1; transform: translateY(0); }

        /* NAV RIGHT */
        .nav-right-container { display: flex; align-items: center; gap: 25px; }
        .partner-section { display: flex; align-items: center; gap: 12px; padding-right: 20px; border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .partner-logo { height: 35px; width: auto; }
        .insta-link { color: #fff; font-size: 18px; transition: 0.3s; opacity: 0.8; }
        .insta-link:hover { color: #00a2ff; opacity: 1; }

        /* --- CONTENT --- */
        .main-content { margin-top: 85px; display: flex; flex-direction: column; align-items: center; }

        .match-centre-container {
            width: 100%; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            padding: 30px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: center;
        }

        .match-wrapper { 
            width: 95%; max-width: 1100px; display: flex; 
            justify-content: space-between; align-items: center; gap: 20px;
        }

        .match-info-box { border-left: 2px solid #00a2ff; padding-left: 15px; }
        .league-name { font-size: 10px; font-weight: 900; color:#00a2ff; letter-spacing: 2px; text-transform: uppercase; }
        .match-round { font-size: 16px; font-weight: 700; }
        .match-date { font-size: 11px; color:#8899a6; margin-top: 3px; }

        .match-teams-display { display: flex; align-items: center; gap: 30px; flex-grow: 1; justify-content: center; }
        .team-name { font-size: 22px; font-weight: 900; width: 250px; text-transform: uppercase; }
        .score-vs { 
            background: rgba(0, 162, 255, 0.15); border: 1px solid rgba(0, 162, 255, 0.4); 
            padding: 12px 28px; border-radius: 12px; font-size: 26px; font-weight: 900; color: #00a2ff;
        }

        /* --- DOPASOWANIE ZDJĘCIA NA SZEROKOŚĆ --- */
        .match-photo-container {
            width: 100%; /* Pełna szerokość kontenera */
            max-width: 1200px; 
            margin: 0 auto;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .match-photo {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .match-wrapper { flex-direction: column; text-align: center; }
            .match-info-box { border-left: none; border-bottom: 2px solid #00a2ff; padding: 0 0 10px 0; }
            .match-teams-display { flex-direction: column; gap: 15px; }
            .team-name { width: auto; font-size: 18px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="nav-btn">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html" class="nav-btn">I Zespół</a>
                        <a href="historia.html" class="nav-btn">Historia</a>
                    </div>
                </div>
                <a href="#" class="nav-btn">Bilety</a>
                <a href="#" class="nav-btn">Kontakt</a>
            </div>
        </div>
        
        <div class="nav-right-container">
            <div class="partner-section">
                <img src="657223629_1253635633558394_588577037858878449_n-removebg-preview.png" class="partner-logo">
            </div>
            <a href="https://www.instagram.com/ks_dinamo_wroclaw_/" target="_blank" class="insta-link">
                <i class="fab fa-instagram"></i>
            </a>
            <div class="nav-btn" style="opacity: 1;"><i class="fas fa-globe" style="color:#00a2ff"></i> PL</div>
        </div>
    </nav>

    <div class="main-content">
        <div class="match-centre-container">
            <div class="match-wrapper">
                <div class="match-info-box">
                    <div class="league-name">Czwarta Liga</div>
                    <div class="match-round">Kolejka 3</div>
                    <div class="match-date">13/04/2026 | 20:00</div>
                </div>

                <div class="match-teams-display">
                    <span class="team-name" style="text-align: right;">FC Dinamo Wrocław</span>
                    <div class="score-vs">VS</div>
                    <span class="team-name" style="text-align: left;">Klimek PRO</span>
                </div>
                
                <div style="min-width: 150px; text-align: right;">
                    <div style="font-size: 10px; color:#00a2ff; font-weight: 700;">LOKALIZACJA</div>
                    <div style="font-size: 12px;">Boisko nr. 2</div>
                </div>
            </div>
        </div>

        <div class="match-photo-container">
            <img src="658155111_122283653516242616_1155403226176925021_n.jpg" class="match-photo" alt="FC Dinamo Wrocław">
        </div>
    </div>

</body>
</html>
