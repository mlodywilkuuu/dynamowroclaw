<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Dynamo Wrocław | Official Website</title>
    <style>
        :root {
            --rm-navy: #001C58;
            --rm-white: #FFFFFF;
            --rm-gold: #FEBE10;
        }

        body {
            margin: 0;
            background-color: #f8f9fb;
            color: var(--rm-navy);
            font-family: 'Segoe UI', sans-serif;
            background-image: url('https://www.realmadrid.com/StaticFiles/RealMadridResponsive/images/header/pattern.png');
        }

        /* --- NAWIGACJA --- */
        .header-main { 
            background: var(--rm-white); 
            border-bottom: 1px solid #EEE; 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-container { 
            display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; 
        }
        .nav-left { display: flex; align-items: center; }
        .logo-nav { height: 50px; width: auto; margin-right: 25px; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links li { font-weight: 700; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; }

        /* MENU JĘZYKÓW */
        .lang-container { position: relative; cursor: pointer; z-index: 1001; }
        .lang-active { display: flex; align-items: center; gap: 5px; font-weight: 700; font-size: 0.8rem; padding: 5px 10px; border-radius: 4px; background: #f4f4f4; }
        .lang-list { 
            display: none; position: absolute; right: 0; top: 100%; 
            background: white; border: 1px solid #eee; min-width: 150px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden;
        }
        .lang-container:hover .lang-list { display: block; }
        .lang-item { padding: 10px 15px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: 600; transition: 0.2s; }
        .lang-item:hover { background: var(--rm-navy); color: white; }
        .lang-item img { width: 20px; height: auto; border-radius: 2px; }

        /* --- MATCH CENTRE: FULL GLASS --- */
        .match-centre-bar {
            width: 100%;
            background: linear-gradient(90deg, rgba(0, 28, 88, 0.9) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 0;
            display: flex;
            align-items: center;
        }

        .mc-wrapper { width: 100%; padding: 0 30px; display: flex; align-items: center; }

        .mc-info-left { border-left: 3px solid var(--rm-gold); padding-left: 15px; flex: 1; }
        .mc-info-left span { display: block; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
        .mc-comp { font-weight: 800; font-size: 0.85rem; margin-bottom: 2px; }
        .mc-meta { font-weight: 600; font-size: 0.75rem; opacity: 0.8; }

        .mc-match-center {
            display: flex; align-items: center; justify-content: center; gap: 25px; 
            font-size: 1.5rem; font-weight: 800; text-transform: uppercase; flex: 2;
        }
        .mc-score {
            background: var(--rm-navy); color: white; padding: 5px 25px; border-radius: 4px;
            font-size: 1.3rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .mc-spacer-right { flex: 1; }

        /* --- HERO --- */
        .hero { padding: 120px 20px; text-align: center; }
        .hero h1 { font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .hero h1 span { color: #0055ff; }
    </style>
</head>
<body>

    <header class="header-main">
        <nav class="nav-container">
            <div class="nav-left">
                <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="logo-nav">
                <ul class="nav-links">
                    <li onclick="location.href='index.html'" data-key="nav_start">Start</li>
                    <li onclick="location.href='mecze.html'" data-key="nav_sched">Terminarz</li>
                    <li data-key="nav_table">Tabela</li>
                    <li data-key="nav_team">Drużyna</li>
                </ul>
            </div>

            <div class="lang-container">
                <div class="lang-active" id="active-lang">
                    <img src="https://flagcdn.com/w20/pl.png" width="20"> PL
                </div>
                <div class="lang-list">
                    <div class="lang-item" onclick="changeLang('pl', 'PL', 'pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</div>
                    <div class="lang-item" onclick="changeLang('en', 'EN', 'gb')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</div>
                    <div class="lang-item" onclick="changeLang('ru', 'RU', 'ru')"><img src="https://flagcdn.com/w20/ru.png"> РОССИЙСКИЙ</div>
                    <div class="lang-item" onclick="changeLang('es', 'ES', 'es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</div>
                </div>
            </div>
        </nav>
    </header>

    <div class="match-centre-bar">
        <div class="mc-wrapper" id="mc-content"></div>
    </div>

    <section class="hero">
        <h1><span data-key="hero_dyn">DYNAMO</span> <span data-key="hero_wro">WROCŁAW</span></h1>
        <p style="font-weight: 800; opacity: 0.4; letter-spacing: 5px;" data-key="hero_sub">OFFICIAL WEBSITE</p>
    </section>

    <script>
        // SŁOWNIK TŁUMACZEŃ
        const translations = {
            pl: {
                nav_start: "Start", nav_sched: "Terminarz", nav_table: "Tabela", nav_team: "Drużyna",
                hero_sub: "STRONA OFICJALNA", hero_dyn: "DYNAMO", hero_wro: "WROCŁAW",
                mc_kolejka: "Kolejka", mc_boisko: "Boisko", mc_liga: "Czwarta Liga"
            },
            en: {
                nav_start: "Home", nav_sched: "Schedule", nav_table: "Standings", nav_team: "Team",
                hero_sub: "OFFICIAL WEBSITE", hero_dyn: "DYNAMO", hero_wro: "WROCŁAW",
                mc_kolejka: "Round", mc_boisko: "Pitch", mc_liga: "Fourth League"
            },
            ru: {
                nav_start: "Главная", nav_sched: "Расписание", nav_table: "Таблица", nav_team: "Команда",
                hero_sub: "ОФИЦИАЛЬНЫЙ САЙТ", hero_dyn: "ДИНАМО", hero_wro: "ВРОЦЛАВ",
                mc_kolejka: "Тур", mc_boisko: "Поле", mc_liga: "Четвертая Лига"
            },
            es: {
                nav_start: "Inicio", nav_sched: "Calendario", nav_table: "Clasificación", nav_team: "Equipo",
                hero_sub: "SITIO OFICIAL", hero_dyn: "DYNAMO", hero_wro: "WROCŁAW",
                mc_kolejka: "Jornada", mc_boisko: "Campo", mc_liga: "Cuarta Liga"
            }
        };

        let currentLang = 'pl';

        const matches = [
            { 
                date: new Date('2026-04-02T20:00:00'), home: "FC Dinamo Wrocław", away: "NDR", 
                score: "2 - 3", comp: "mc_liga", kolejka: 1, venue: 3 
            },
            { 
                date: new Date('2026-04-07T19:00:00'), home: "Mocne Chłopy", away: "FC Dinamo Wrocław", 
                score: "19:00", comp: "mc_liga", kolejka: 2, venue: 1 
            }
        ];

        function renderMatch() {
            const now = new Date();
            const last = [...matches].reverse().find(m => m.date < now);
            const isWithin48h = last && (now - last.date) < (48 * 60 * 60 * 1000);
            const active = isWithin48h ? last : matches.find(m => m.date > now);
            
            const mc = document.getElementById('mc-content');
            const dateStr = active.date.toLocaleDateString(currentLang === 'en' ? 'en-GB' : 'pl-PL');
            const t = translations[currentLang];
            
            mc.innerHTML = `
                <div class="mc-info-left">
                    <span class="mc-comp">${t[active.comp]} • ${t.mc_kolejka} ${active.kolejka}</span>
                    <span class="mc-meta">${dateStr} • ${t.mc_boisko} nr ${active.venue}</span>
                </div>
                <div class="mc-match-center">
                    <span>${active.home}</span>
                    <div class="mc-score">${active.score}</div>
                    <span>${active.away}</span>
                </div>
                <div class="mc-spacer-right"></div>
            `;
        }

        function changeLang(lang, label, flag) {
            currentLang = lang;
            document.getElementById('active-lang').innerHTML = `<img src="https://flagcdn.com/w20/${flag}.png" width="20"> ${label}`;
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = translations[lang][key];
            });

            renderMatch();
        }

        window.onload = renderMatch;
    </script>
</body>
</html>
