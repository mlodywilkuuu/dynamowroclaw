<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Dynamo Wrocław | Official Website</title>
    <style>
        :root {
            --rm-navy: #001C58;
            --rm-white: #FFFFFF;
            --rm-gray: #F4F4F4;
            --rm-gold: #FEBE10;
        }

        body {
            margin: 0;
            background-color: var(--rm-white);
            color: var(--rm-navy);
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- MENU NA MAXA DO LEWEJ --- */
        .header-main {
            background: var(--rm-white);
            border-bottom: 1px solid #EEE;
            width: 100%;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px; /* Minimalny margines boczny */
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-nav {
            height: 50px;
            width: auto;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--rm-navy);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* --- MATCH CENTRE STYL REAL MADRYT (FOTO 1) --- */
        .match-centre {
            background-color: #0c1c38; /* Bardzo ciemny granat ze zdjęcia */
            color: white;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            min-height: 80px;
        }

        .mc-layout {
            display: flex;
            align-items: center;
            gap: 60px;
            width: 100%;
        }

        .mc-competition {
            border-left: 2px solid var(--rm-gold);
            padding-left: 15px;
        }

        .mc-comp-name {
            display: block;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .mc-matchday {
            display: block;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 2px;
        }

        .mc-main-display {
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .mc-score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 4px;
            font-weight: 900;
            min-width: 60px;
            text-align: center;
        }

        .mc-next-time {
            background: var(--rm-white);
            color: var(--rm-navy);
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .mc-location {
            font-size: 0.8rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="header-main">
        <nav class="nav-container">
            <div class="nav-left">
                <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="logo-nav">
                <ul class="nav-links">
                    <li><a href="#">Start</a></li>
                    <li><a href="#">Terminarz</a></li>
                    <li><a href="#">Tabela</a></li>
                    <li><a href="#">Drużyna</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="match-centre">
        <div id="match-content" class="mc-layout">
            </div>
    </div>

    <script>
        // Dane z proligawroclaw.pl
        const matches = [
            {
                date: new Date('2026-04-02T20:00:00'),
                home: "FC Dinamo Wrocław",
                away: "NDR",
                score: "2 - 3",
                competition: "Czwarta Liga",
                matchday: "Kolejka 1",
                venue: "Boisko nr 3"
            },
            {
                date: new Date('2026-04-07T19:00:00'),
                home: "Mocne Chłopy",
                away: "FC Dinamo Wrocław",
                score: null,
                competition: "Czwarta Liga",
                matchday: "Kolejka 2",
                venue: "Boisko nr 1"
            }
        ];

        function renderMatchCentre() {
            const now = new Date();
            const display = document.getElementById('match-content');
            
            // Szukamy ostatniego meczu, który się odbył
            const lastPlayed = [...matches].reverse().find(m => m.date < now);
            
            // Sprawdzamy czy od ostatniego meczu minęło mniej niż 48h
            const isWithin48h = lastPlayed && (now - lastPlayed.date) < (48 * 60 * 60 * 1000);

            if (isWithin48h) {
                // POKAZUJ WYNIK ZAKOŃCZONEGO MECZU
                display.innerHTML = `
                    <div class="mc-competition">
                        <span class="mc-comp-name">${lastPlayed.competition}</span>
                        <span class="mc-matchday">${lastPlayed.matchday}</span>
                    </div>
                    <div class="mc-main-display">
                        <span>${lastPlayed.home}</span>
                        <div class="mc-score-box">${lastPlayed.score}</div>
                        <span>${lastPlayed.away}</span>
                    </div>
                    <div class="mc-location">${lastPlayed.venue}</div>
                `;
            } else {
                // POKAZUJ NADCHODZĄCY MECZ
                const nextMatch = matches.find(m => m.date > now);
                if (nextMatch) {
                    const timeStr = nextMatch.date.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'});
                    display.innerHTML = `
                        <div class="mc-competition">
                            <span class="mc-comp-name">${nextMatch.competition}</span>
                            <span class="mc-matchday">${nextMatch.matchday}</span>
                        </div>
                        <div class="mc-main-display">
                            <span>${nextMatch.home}</span>
                            <div class="mc-next-time">${timeStr}</div>
                            <span>${nextMatch.away}</span>
                        </div>
                        <div class="mc-location">${nextMatch.date.toLocaleDateString('pl-PL')} | ${nextMatch.venue}</div>
                    `;
                }
            }
        }

        renderMatchCentre();
    </script>
</body>
</html>
