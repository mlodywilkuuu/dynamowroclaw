<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendarz | FC Dynamo Wrocław</title>
    <style>
        :root {
            --rm-navy: #001C58;
            --rm-dark: #081633;
            --rm-white: #FFFFFF;
            --rm-accent: #0055ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--rm-white); font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b1324 0%, #001C58 100%);
            background-attachment: fixed; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); z-index: -1;
        }

        .header-mini {
            background: rgba(255, 255, 255, 0.1); border-bottom: 1px solid var(--glass-border);
            padding: 10px 30px; display: flex; justify-content: flex-end; backdrop-filter: blur(5px);
        }

        /* MENU JĘZYKÓW */
        .lang-container { position: relative; cursor: pointer; z-index: 1001; }
        .lang-active { display: flex; align-items: center; gap: 5px; font-weight: 700; font-size: 0.8rem; padding: 5px 12px; border-radius: 4px; background: rgba(255,255,255,0.1); }
        .lang-list { 
            display: none; position: absolute; right: 0; top: 100%; 
            background: white; border-radius: 8px; overflow: hidden; min-width: 150px;
        }
        .lang-container:hover .lang-list { display: block; }
        .lang-item { padding: 10px; display: flex; align-items: center; gap: 10px; color: var(--rm-navy); font-size: 0.8rem; font-weight: 600; }
        .lang-item:hover { background: #eee; }
        .lang-item img { width: 20px; }

        .calendar-header { padding: 40px 20px 20px; text-align: center; }
        .calendar-header h1 { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin: 0; }

        /* PASEK MIESIĘCY */
        .month-picker {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 5px; display: flex; gap: 5px;
            overflow-x: auto; max-width: 1000px; margin: 0 auto 40px auto;
            scrollbar-width: none;
        }
        .month-btn {
            padding: 10px 25px; border-radius: 25px; border: none;
            background: transparent; color: rgba(255, 255, 255, 0.4);
            font-weight: 700; cursor: pointer; transition: 0.3s; white-space: nowrap;
        }
        .month-btn.active { background: var(--rm-accent); color: white; }
        .month-btn:disabled { opacity: 0.2; cursor: default; }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto; padding: 0 20px 60px 20px;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.95); border-radius: 16px;
            color: var(--rm-navy); transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .match-card:hover { transform: translateY(-5px); }
        .card-header { padding: 15px 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; color: #888; }
        .card-body { padding: 25px 20px; }
        .match-title { font-size: 1.3rem; font-weight: 900; margin: 0 0 15px 0; }
        .match-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; }
        
        .no-matches { text-align: center; grid-column: 1 / -1; padding: 50px; opacity: 0.5; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav class="header-mini">
        <div class="lang-container">
            <div class="lang-active" id="active-lang">
                <img src="https://flagcdn.com/w20/pl.png" width="20"> PL
            </div>
            <div class="lang-list">
                <div class="lang-item" onclick="changeLang('pl', 'PL', 'pl')"><img src="https://flagcdn.com/w20/pl.png"> POLSKI</div>
                <div class="lang-item" onclick="changeLang('en', 'EN', 'gb')"><img src="https://flagcdn.com/w20/gb.png"> ENGLISH</div>
                <div class="lang-item" onclick="changeLang('ru', 'RU', 'ru')"><img src="https://flagcdn.com/w20/ru.png"> РОССИЙСКИЙ</div>
                <div class="lang-item" onclick="changeLang('es', 'ES', 'es')"><img src="https://flagcdn.com/w20/es.png"> ESPAÑOL</div>
            </div>
        </div>
    </nav>

    <header class="calendar-header">
        <h1 data-key="cal_title">Kalendarz</h1>
    </header>

    <div class="month-picker" id="month-picker">
        </div>

    <main class="calendar-grid" id="calendar-content">
        </main>

    <script>
        const translations = {
            pl: { cal_title: "Kalendarz", sport: "Piłka Nożna", liga: "Czwarta Liga", pitch: "Boisko nr", empty: "Brak meczów w tym miesiącu" },
            en: { cal_title: "Calendar", sport: "Football", liga: "Fourth League", pitch: "Pitch no.", empty: "No matches this month" },
            ru: { cal_title: "Календарь", sport: "Футбол", liga: "Четвертая Лига", pitch: "Поле №", empty: "Нет матчей в этом месяце" },
            es: { cal_title: "Calendario", sport: "Fútbol", liga: "Cuarta Liga", pitch: "Campo nº", empty: "No hay partidos este mes" }
        };

        const matches = [
            { date: new Date('2026-04-02T20:00:00'), home: "FC Dynamo Wrocław", away: "NDR", venue: "3" },
            { date: new Date('2026-04-07T19:00:00'), home: "Mocne Chłopy", away: "FC Dynamo Wrocław", venue: "1" },
            { date: new Date('2026-04-13T20:00:00'), home: "FC Dynamo Wrocław", away: "Klimech PRO", venue: "3" },
            { date: new Date('2026-04-21T21:00:00'), home: "RunnersHeads", away: "FC Dynamo Wrocław", venue: "1" },
            { date: new Date('2026-05-05T20:00:00'), home: "FC Dynamo Wrocław", away: "Przykładowy Rywal", venue: "2" }
        ];

        let currentLang = 'pl';
        let selectedMonth = new Date().getMonth(); // Domyślnie obecny miesiąc

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function initMonths() {
            const picker = document.getElementById('month-picker');
            picker.innerHTML = monthNames.map((name, index) => {
                const hasMatches = matches.some(m => m.date.getMonth() === index && m.date >= new Date().setHours(0,0,0,0));
                return `
                    <button class="month-btn ${index === selectedMonth ? 'active' : ''}" 
                            onclick="selectMonth(${index})" 
                            ${!hasMatches && index !== selectedMonth ? 'disabled' : ''}>
                        ${name}
                    </button>
                `;
            }).join('');
        }

        function selectMonth(index) {
            selectedMonth = index;
            initMonths();
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-content');
            const now = new Date();
            now.setHours(0,0,0,0); // Reset godziny do porównania dni
            const t = translations[currentLang];
            
            // Filtruj: Tylko wybrany miesiąc ORAZ data >= dzisiaj
            const filtered = matches.filter(m => m.date.getMonth() === selectedMonth && m.date >= now);
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-matches">${t.empty}</div>`;
                return;
            }

            grid.innerHTML = filtered.map(m => `
                <div class="match-card">
                    <div class="card-header">${t.sport} • ${t.liga}</div>
                    <div class="card-body">
                        <h2 class="match-title">${m.home} vs ${m.away}</h2>
                        <div class="match-info">📅 ${m.date.toLocaleDateString(currentLang == 'en' ? 'en-GB' : 'pl-PL', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })}</div>
                        <div class="match-info">📍 ${t.pitch} ${m.venue}</div>
                    </div>
                </div>
            `).join('');
        }

        function changeLang(lang, label, flag) {
            currentLang = lang;
            document.getElementById('active-lang').innerHTML = `<img src="https://flagcdn.com/w20/${flag}.png" width="20"> ${label}`;
            document.querySelectorAll('[data-key]').forEach(el => {
                el.innerText = translations[lang][el.getAttribute('data-key')];
            });
            renderCalendar();
        }

        window.onload = () => {
            initMonths();
            renderCalendar();
        };
    </script>
</body>
</html>
