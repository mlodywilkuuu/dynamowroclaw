<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Oficjalna Strona</title>
    <style>
        :root {
            --club-blue: #0055ff;
            --club-white: #ffffff;
            --club-black: #050505;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #001a4d 0%, var(--club-black) 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden; /* Blokuje przewijanie podczas ładowania */
        }

        /* --- EKRAN ŁADOWANIA (PRELOADER) --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            /* Biało-niebieski gradient klubowy */
            background: linear-gradient(135deg, #ffffff 0%, #0055ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s ease;
        }

        .loader-logo {
            height: 150px; /* Nieco większe logo na starcie */
            width: 150px;
            border-radius: 50%;
            background: white;
            padding: 15px;
            border: 5px solid white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: pulseLogo 2s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.8); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 30px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        #preloader.fade-out { 
            opacity: 0; 
            visibility: hidden; 
        }

        /* --- NAWIGACJA SZKLANA --- */
        .club-nav {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }

        .club-logo-nav {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: white;
        }

        .nav-links { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--club-blue); }

        /* --- DROPDOWN JĘZYKÓW --- */
        .lang-dropdown {
            position: relative;
            padding: 10px 0;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-content {
            display: block;
            position: absolute;
            right: 0;
            top: 100%;
            background: #111;
            border: 1px solid var(--club-blue);
            min-width: 160px;
            border-radius: 4px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
            transition-delay: 0.1s;
        }

        .lang-dropdown:hover .lang-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            transition-delay: 0s;
        }

        .lang-content a {
            color: white;
            padding: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
        }

        .lang-content a:hover { background: var(--club-blue); }

        /* --- TREŚĆ --- */
        .hero { text-align: center; padding: 150px 20px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 6rem); margin: 0; letter-spacing: 5px; }
        .hero h1 span { color: var(--club-blue); text-shadow: 0 0 30px rgba(0, 85, 255, 0.3); }
        .status-tag { display: inline-block; margin-top: 25px; padding: 6px 20px; border: 1px solid white; text-transform: uppercase; letter-spacing: 3px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="preloader">
        <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Dynamo Wrocław" class="loader-logo">
    </div>

    <nav class="club-nav">
        <div class="nav-left">
            <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="club-logo-nav">
            <ul class="nav-links">
                <li><a href="#" id="link-start">Start</a></li>
                <li><a href="#" id="link-schedule">Terminarz</a></li>
                <li><a href="#" id="link-table">Tabela</a></li>
                <li><a href="#" id="link-team">Drużyna</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">🌐 <span id="current-lang">Język</span></button>
            <div class="lang-content">
                <a href="javascript:void(0)" onclick="changeLang('pl')"><img src="https://flagcdn.com/w20/pl.png"> Polski</a>
                <a href="javascript:void(0)" onclick="changeLang('en')"><img src="https://flagcdn.com/w20/gb.png"> English</a>
                <a href="javascript:void(0)" onclick="changeLang('ru')"><img src="https://flagcdn.com/w20/ru.png"> Pусский</a>
                <a href="javascript:void(0)" onclick="changeLang('es')"><img src="https://flagcdn.com/w20/es.png"> Español</a>
                <a href="javascript:void(0)" onclick="changeLang('fr')"><img src="https://flagcdn.com/w20/fr.png"> Français</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1 id="hero-title"><span>DYNAMO</span> WROCŁAW</h1>
        <div class="status-tag" id="hero-sub">Strona w budowie</div>
    </div>

    <script>
        // TŁUMACZENIA
        const translations = {
            pl: { start: "Start", schedule: "Terminarz", table: "Tabela", team: "Drużyna", title: "<span>DYNAMO</span> WROCŁAW", sub: "Strona w budowie" },
            en: { start: "Home", schedule: "Schedule", table: "Table", team: "Team", title: "<span>DYNAMO</span> WROCŁAW", sub: "Website under construction" },
            ru: { start: "Главная", schedule: "Расписание", table: "Таблица", team: "Команда", title: "<span>ДИНАМО</span> ВРОЦЛАВ", sub: "Сайт в разработке" },
            es: { start: "Inicio", schedule: "Horario", table: "Tabla", team: "Equipo", title: "<span>DYNAMO</span> WROCŁAW", sub: "Sitio en construcción" },
            fr: { start: "Accueil", schedule: "Calendrier", table: "Classement", team: "Équipe", title: "<span>DYNAMO</span> WROCŁAW", sub: "Site en construction" }
        };

        function changeLang(lang) {
            document.getElementById('link-start').innerText = translations[lang].start;
            document.getElementById('link-schedule').innerText = translations[lang].schedule;
            document.getElementById('link-table').innerText = translations[lang].table;
            document.getElementById('link-team').innerText = translations[lang].team;
            document.getElementById('hero-title').innerHTML = translations[lang].title;
            document.getElementById('hero-sub').innerText = translations[lang].sub;
            document.getElementById('current-lang').innerText = lang.toUpperCase();
        }

        // KONTROLA PRELOADERA
        window.addEventListener('load', function() {
            // Ekran ładowania zniknie po 3 sekundach (3000ms)
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                preloader.classList.add('fade-out');
                
                // Odblokowanie przewijania strony po zniknięciu loadera
                document.body.style.overflow = 'auto';
            }, 3000); 
        });
    </script>
</body>
</html>
