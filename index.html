<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław</title>
    <style>
        body {
            margin: 0;
            /* Ciemne tło z lekkim gradientem, żeby efekt szkła był lepiej widoczny */
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* NAWIGACJA Z EFEKTEM SZKŁA */
        .club-nav {
            /* Efekt Glassmorphism */
            background: rgba(255, 255, 255, 0.05); /* Bardzo delikatne białe tło */
            backdrop-filter: blur(10px); /* Rozmycie tła pod menu */
            -webkit-backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* Delikatna biała linia zamiast zielonej */
            
            padding: 10px 40px;
            display: flex;
            justify-content: flex-end; /* Przyciski i logo do prawej */
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Kontener na przyciski */
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            margin-right: 30px;
        }

        .nav-links li {
            margin: 0 15px;
        }

        .nav-links li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8); /* Lekko przezroczysty biały */
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .nav-links li a:hover {
            color: #00ff00; /* Zielony akcent tylko przy najechaniu */
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        /* LOGO */
        .club-logo {
            height: 55px;
            width: 55px;
            border-radius: 50%;
            /* Delikatna obwódka pasująca do efektu szkła */
            border: 1px solid rgba(255, 255, 255, 0.2);
            object-fit: contain;
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .club-logo:hover {
            transform: scale(1.1); /* Logo delikatnie rośnie po najechaniu */
        }

        /* TREŚĆ STRONY */
        .hero {
            text-align: center;
            padding: 150px 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: white;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .hero span {
            color: #00ff00; /* Zielone Dynamo */
        }
    </style>
</head>
<body>

    <nav class="club-nav">
        <ul class="nav-links">
            <li><a href="#">Start</a></li>
            <li><a href="#">Terminarz</a></li>
            <li><a href="#">Tabela</a></li>
            <li><a href="#">Drużyna</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>

        <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="Logo" class="club-logo">
    </nav>

    <div class="hero">
        <h1><span>DYNAMO</span> WROCŁAW</h1>
        <p style="color: rgba(255,255,255,0.5); letter-spacing: 2px;">W BUDOWIE</p>
    </div>

</body>
</html>
