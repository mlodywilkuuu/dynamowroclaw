<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Oficjalny Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Nowy niebieski gradient */
            background: radial-gradient(circle at top right, #1a3a5f, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MENU GÓRNE (NAVBAR) --- */
        nav {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 1px;
            color: #ffffff;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #b0b8c1;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00a2ff; /* Jasnoniebieski akcent */
        }

        .nav-right-lang {
            display: flex;
            gap: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .lang-btn {
            color: #6a7c78;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lang-btn:hover, .lang-btn.active {
            color: #00a2ff;
        }

        /* --- GŁÓWNA TREŚĆ --- */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 150px auto 50px; /* Miejsce na fixed navbar */
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 50px;
        }

        .hero {
            flex: 1.5;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 162, 255, 0.1);
            color: #00a2ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid rgba(0, 162, 255, 0.3);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #00a2ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #00a2ff;
        }

        h1 {
            font-size: clamp(40px, 6vw, 85px);
            line-height: 0.95;
            color: #ffffff;
            letter-spacing: -3px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* --- PANEL BOCZNY --- */
        .control-room {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 40px;
            border-radius: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px 20px;
            border-radius: 20px;
        }

        .stat-label {
            font-size: 9px;
            color: #6a7c78;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
        }

        @media (max-width: 1024px) {
            nav { padding: 20px; }
            .nav-links { display: none; } /* Ukrywamy linki na mobile dla czytelności */
            .container { flex-direction: column; margin-top: 100px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="#" class="logo">DYNAMO</a>
            <div class="nav-links">
                <a href="#">Klub</a>
                <a href="#">Terminarz</a>
                <a href="#">Bilety</a>
                <a href="#">Sklep</a>
            </div>
        </div>
        
        <div class="nav-right-lang">
            <span class="lang-btn active">PL</span>
            <span class="lang-btn">ES</span>
            <span class="lang-btn">RU</span>
            <span class="lang-btn">UA</span>
        </div>
    </nav>

    <div class="container">
        <main class="hero">
            <div class="badge">
                <span class="dot"></span> Sezon 2026
            </div>
            <h1>The power of Dynamo Wrocław.</h1>
        </main>

        <aside class="control-room">
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">🏃 Zawodnicy</p>
                    <span class="stat-value">24</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">🏆 Miejsce</p>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">📅 Treningi</p>
                    <span class="stat-value">5</span>
                </div>
                <div class="stat-card">
                    <p class="stat-label">⚡ Status</p>
                    <span class="stat-value" style="font-size: 18px; color: #00a2ff;">LIVE</span>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
