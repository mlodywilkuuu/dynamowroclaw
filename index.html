<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | www.dynamowroclaw.pl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 21, 37, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 9999;
        }
        .nav-left { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 60px; width: auto; display: block; }
        .nav-links { display: flex; gap: 5px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 10px; transition: 0.3s; }
        .nav-btn:hover { color: #00a2ff; }

        /* --- LANG MENU --- */
        .lang-container { position: relative; }
        .lang-menu { 
            display: none; position: absolute; right: 0; top: 120%; 
            background: #0a1525; border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; min-width: 130px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .lang-menu.active { display: block; }
        .lang-option { padding: 12px 15px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .lang-option:hover { background: #00a2ff; }

        /* --- HERO --- */
        .hero { 
            height: 70vh; background: linear-gradient(to bottom, transparent, #050b14), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018') center/cover; 
            display: flex; align-items: center; padding: 0 10%; 
        }
        .hero-title { font-size: clamp(40px, 8vw, 85px); font-weight: 900; text-transform: uppercase; font-style: italic; line-height: 0.9; }

        /* --- MATCH CENTER --- */
        .section-padding { padding: 60px 10%; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 25px; }
        .match-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; }
        .match-card.next { border: 2px solid #00a2ff; background: #0a1525; }
        .score-row { display: flex; justify-content: space-around; align-items: center; margin: 20px 0; }
        .score-val { font-size: 32px; font-weight: 900; font-style: italic; }
        .mini-logo { height: 45px; width: auto; }
        .dummy-logo { height: 45px; width: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* --- NEWS CAROUSEL --- */
        .carousel-container { display: flex; gap: 20px; overflow-x: auto; scroll-behavior: smooth; padding: 10px 0; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        .news-card-mini { min-width: 300px; background: #0a1525; border-radius: 12px; overflow: hidden; border: 1px solid #1a2635; cursor: pointer; }
        .scroll-btn { background: #162130; border: 1px solid #333; color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .scroll-btn:hover { background: #00a2ff; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="aktualnosci.html" class="nav-btn" data-key="nav_news">Aktualności</a>
                <a href="zespol.html" class="nav-btn" data-key="nav_team">Zespół</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="lang-container">
                <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe"></i> <span id="curr-lang">PL</span></div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="setLang('PL')">🇵🇱 PL</div>
                    <div class="lang-option" onclick="setLang('EN')">🇬🇧 EN</div>
                    <div class="lang-option" onclick="setLang('UA')">🇺🇦 UA</div>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div>
            <p style="color: #00a2ff; font-weight: 900; letter-spacing: 3px; text-transform: uppercase;" data-key="hero_sub">Oficjalny serwis</p>
            <h1 class="hero-title">DYNAMO<br>WROCŁAW</h1>
        </div>
    </header>

    <section class="section-padding">
        <h2 style="font-size: 10px; color: #00a2ff; letter-spacing: 2px; text-transform: uppercase;" data-key="match_center_title">Match Center</h2>
        <h1 style="font-size: 32px; text-transform: uppercase; font-style: italic;" data-key="schedule">Terminarz</h1>

        <div class="match-grid">
            <div class="match-card">
                <p style="font-size: 10px; opacity: 0.5;"><span data-key="finished">ZAKOŃCZONY</span> | 12.04.2026</p>
                <div class="score-row">
                    <div style="text-align:center;"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="mini-logo"><p style="font-size:10px; font-weight:900;">DYNAMO WROCŁAW</p></div>
                    <div class="score-val">3 : 1</div>
                    <div style="text-align:center;"><div class="dummy-logo" style="color:#00a2ff">TRH</div><p style="font-size:10px; font-weight:900;">THE RUNNERSHOOD</p></div>
                </div>
            </div>
            <div class="match-card next">
                <p style="font-size: 10px; color: #00a2ff;"><span data-key="next_match">NASTĘPNY</span> | 19.04.2026 - 18:00</p>
                <div class="score-row">
                    <div style="text-align:center;"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="mini-logo"><p style="font-size:10px; font-weight:900;">DYNAMO WROCŁAW</p></div>
                    <div class="score-val" style="opacity:0.2">VS</div>
                    <div style="text-align:center;"><div class="dummy-logo">?</div><p style="font-size:10px; font-weight:900;" data-key="opponent">RYWAL B</p></div>
                </div>
            </div>
        </div>
    </section>

    <section class="section-padding" style="padding-top:0;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="font-size: 28px; text-transform: uppercase; font-style: italic;" data-key="latest_news">Najnowsze Artykuły</h1>
            <div style="display: flex; gap: 10px;">
                <button class="scroll-btn" onclick="scrollN(-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="scroll-btn" onclick="scrollN(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div id="news-carousel" class="carousel-container"></div>
    </section>

    <script>
        const translations = {
            'PL': { nav_news: 'Aktualności', nav_team: 'Zespół', hero_sub: 'Oficjalny serwis', match_center_title: 'Match Center', schedule: 'Terminarz', finished: 'ZAKOŃCZONY', next_match: 'NASTĘPNY', opponent: 'RYWAL B', latest_news: 'Najnowsze Artykuły' },
            'EN': { nav_news: 'News', nav_team: 'Team', hero_sub: 'Official Service', match_center_title: 'Match Center', schedule: 'Schedule', finished: 'FINISHED', next_match: 'NEXT MATCH', opponent: 'OPPONENT B', latest_news: 'Latest News' },
            'UA': { nav_news: 'Новини', nav_team: 'Команда', hero_sub: 'Офіційний сервіс', match_center_title: 'Матч-центр', schedule: 'Розклад', finished: 'ЗАВЕРШЕНО', next_match: 'НАСТУПНИЙ', opponent: 'СУПЕРНИК Б', latest_news: 'Останні новини' }
        };

        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }
        
        function setLang(lang) {
            document.getElementById('curr-lang').innerText = lang;
            document.getElementById('lang-menu').classList.remove('active');
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = translations[lang][key];
            });
            loadHomeNews(); // Przeładowuje newsy (jeśli mają tłumaczenia)
        }

        function scrollN(dir) { document.getElementById('news-carousel').scrollLeft += dir * 320; }

        function loadHomeNews() {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const container = document.getElementById('news-carousel');
            if(posts.length === 0) { container.innerHTML = "<p style='opacity:0.3'>Brak artykułów.</p>"; return; }
            container.innerHTML = posts.map(p => `
                <div class="news-card-mini" onclick="location.href='aktualnosci.html'">
                    <div style="height:160px; background:url('${p.image}') center/cover"></div>
                    <div style="padding:20px;">
                        <small style="color:#00a2ff; font-weight:800; font-size:10px;">${p.date}</small>
                        <h3 style="font-size:15px; text-transform:uppercase; margin-top:8px; font-style:italic;">${p.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadHomeNews;
        window.onclick = (e) => { if (!e.target.closest('.lang-container')) document.getElementById('lang-menu').classList.remove('active'); };
    </script>
</body>
</html>
