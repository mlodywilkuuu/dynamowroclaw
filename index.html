<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Official Panel</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed; top: 0; z-index: 2000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        
        .nav-btn { 
            color: #fff; 
            text-decoration: none; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            opacity: 0.7; 
            transition: 0.3s; 
            cursor: pointer; 
            padding: 10px; 
        }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }

        /* DROPDOWN KLUB */
        .dropdown { position: relative; display: inline-block; }
        
        .dropdown-menu {
            display: block; visibility: hidden; opacity: 0; position: absolute; top: 100%; left: 0;
            background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; 
            transition: all 0.3s ease; transform: translateY(10px);
        }
        
        .dropdown::after { 
            content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 15px; 
        }
        
        .dropdown:hover .dropdown-menu { 
            visibility: visible; opacity: 1; transform: translateY(0); 
            transition-delay: 0s; 
        }
        .dropdown .dropdown-menu { transition-delay: 0.2s; }

        .dropdown-menu a { 
            color: white; padding: 12px 20px; text-decoration: none; 
            display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; 
        }
        .dropdown-menu a:hover { background: rgba(0, 162, 255, 0.2); color: #00a2ff; }

        /* --- NOWA SEKCJA PARTNERA --- */
        .nav-right-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .partner-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-right: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .partner-text {
            text-align: right;
            text-transform: uppercase;
            line-height: 1;
        }

        .partner-text .official {
            display: block;
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #8899a6;
        }

        .partner-text .partner-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
            margin-top: 2px;
        }

        .partner-logo {
            height: 40px;
            width: auto;
        }

        /* --- MENU JĘZYKÓW --- */
        .lang-dropdown { position: relative; }
        
        .lang-content {
            display: block; visibility: hidden; opacity: 0; position: absolute; right: 0; top: 100%;
            background: rgba(10, 21, 37, 0.98); min-width: 160px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15); margin-top: 5px;
            transition: all 0.3s ease; transform: translateY(10px);
        }

        .lang-dropdown::after { 
            content: ""; position: absolute; top: 100%; right: 0; width: 100%; height: 15px; 
        }

        .lang-dropdown:hover .lang-content {
            visibility: visible; opacity: 1; transform: translateY(0);
            transition-delay: 0s;
        }
        .lang-dropdown .lang-content { transition-delay: 0.2s; }

        .lang-content a {
            color: white; padding: 10px 20px; text-decoration: none; display: flex; 
            align-items: center; font-size: 12px; font-weight: 600;
        }
        .lang-content a:hover { background: rgba(255, 255, 255, 0.05); color: #00a2ff; }
        .lang-flag { width: 18px; margin-right: 12px; border-radius: 2px; }

        /* --- MATCH CENTRE & FOTO --- */
        .main-content {
            margin-top: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .match-centre-container {
            width: 100%; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            padding: 40px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: center;
        }

        .match-wrapper {
            width: 90%; max-width: 1200px; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center;
        }

        .score-vs {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 35px; border-radius: 15px; font-size: 32px; font-weight: 900;
        }

        /* STYL DLA ZDJĘCIA POD MATCH CENTRE */
        .match-photo-container {
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .match-photo {
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="nav-btn">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html">I Zespół</a>
                        <a href="historia.html">Historia</a>
                    </div>
                </div>
                <a href="#" class="nav-btn">Bilety</a>
                <a href="#" class="nav-btn">Kontakt</a>
            </div>
        </div>
        
        <div class="nav-right-container">
            <div class="partner-section">
                <div class="partner-text">
                    <span class="official">Oficjalny</span>
                    <span class="partner-label">Partner</span>
                </div>
                <img src="657223629_1253635633558394_588577037858878449_n-removebg-preview.png" class="partner-logo">
            </div>

            <div class="lang-dropdown">
                <div class="nav-btn" style="display: flex; align-items: center; gap: 8px; opacity: 1;">
                    <i class="fas fa-globe" style="color:#00a2ff"></i> PL
                </div>
                <div class="lang-content">
                    <a href="#"><img src="https://flagcdn.com/w40/pl.png" class="lang-flag"> PL</a>
                    <a href="#"><img src="https://flagcdn.com/w40/ua.png" class="lang-flag"> UA</a>
                    <a href="#"><img src="https://flagcdn.com/w40/gb.png" class="lang-flag"> EN</a>
                    <a href="#"><img src="https://flagcdn.com/w40/de.png" class="lang-flag"> DE</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="match-centre-container">
            <div class="match-wrapper">
                <div style="border-left: 2px solid #00a2ff; padding-left: 20px;">
                    <div style="font-size: 10px; font-weight: 900; color:#00a2ff; letter-spacing: 2px;">CZWARTA LIGA</div>
                    <div style="font-size: 18px; font-weight: 700;">Kolejka 3</div>
                    <div style="font-size: 12px; color:#8899a6; margin-top: 5px;">13/04/2026 | 20:00</div>
                </div>

                <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
                    <div style="display: flex; align-items: center; gap: 30px;">
                        <span style="font-size: 24px; font-weight: 900; text-align: right; width: 250px;">FC Dynamo Wrocław</span>
                        <div class="score-vs">VS</div>
                        <span style="font-size: 24px; font-weight: 900; text-align: left; width: 250px;">Klimek PRO</span>
                    </div>
                </div>
                
                <div></div>
            </div>
        </div>

        <div class="match-photo-container">
            <img src="658155111_122283653516242616_1155403226176925021_n.jpg" class="match-photo">
        </div>
    </div>

</body>
</html>
