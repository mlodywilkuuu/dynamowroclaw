<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo Wrocław | Oficjalna Strona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STYLE EKRANU ŁADOWANIA --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050b14;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-content {
            text-align: center;
        }

        .loader-logo {
            width: 150px;
            height: auto;
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: #007bff;
            position: absolute;
            animation: loading 2.5s forwards cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .preloader-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* --- RESZTA STYLI STRONY (Uproszczone dla przykładu) --- */
        body { background: #050b14; color: #fff; font-family: sans-serif; margin: 0; }
        nav { padding: 20px; background: #0a1525; display: flex; gap: 20px; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 30px; text-transform: uppercase; font-style: italic; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="loader-logo" alt="Dynamo Wrocław">
            <div class="loader-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <nav>
        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" style="height: 40px;">
        <a href="index.html" style="color: #fff; text-decoration: none;">Główna</a>
        <a href="aktualnosci.html" style="color: #fff; text-decoration: none;">Aktualności</a>
    </nav>

    <div class="hero">
        <h1>Witamy w Dynamo Wrocław</h1>
    </div>

    <script>
        // LOGIKA WYŁĄCZANIA PRELOADERA
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            
            // Czekamy 2 sekundy (aby animacja paska postępu była widoczna)
            setTimeout(() => {
                preloader.classList.add('preloader-hidden');
                
                // Po animacji zanikania całkowicie usuwamy element
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 800);
            }, 2000); 
        });
    </script>
</body>
</html>
