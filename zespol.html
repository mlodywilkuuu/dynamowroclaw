<header class="team-header">
    <h1 data-key="page-title">Pierwszy Zespół</h1>
</header>

<script>
    // Słownik tłumaczeń
    const translations = {
        'PL': {
            'menu-club': 'Klub',
            'menu-team': 'I Zespół',
            'menu-history': 'Historia',
            'menu-tickets': 'Bilety',
            'menu-shop': 'Sklep',
            'page-title': 'Pierwszy Zespół'
        },
        'UA': {
            'menu-club': 'Клуб',
            'menu-team': 'I Команда',
            'menu-history': 'Історія',
            'menu-tickets': 'Квитки',
            'menu-shop': 'Магазин',
            'page-title': 'Перша команда'
        },
        'EN': {
            'menu-club': 'Club',
            'menu-team': 'First Team',
            'menu-history': 'History',
            'menu-tickets': 'Tickets',
            'menu-shop': 'Shop',
            'page-title': 'First Team'
        }
    };

    function translatePage(lang, countryCode) {
        // 1. Aktualizacja paska nawigacji
        document.getElementById('lang-text').innerText = lang;
        document.getElementById('current-flag').src = `https://flagcdn.com/w40/${countryCode}.png`;

        // 2. Logika tłumaczenia elementów
        const elements = document.querySelectorAll('[data-key]');
        elements.forEach(el => {
            const key = el.getAttribute('data-key');
            if (translations[lang][key]) {
                // Jeśli element ma ikonkę (jak menu Klub), musimy ją zachować
                if (el.querySelector('i')) {
                    const icon = el.querySelector('i').outerHTML;
                    el.innerHTML = translations[lang][key] + ' ' + icon;
                } else {
                    el.innerText = translations[lang][key];
                }
            }
        });
    }
</script>
