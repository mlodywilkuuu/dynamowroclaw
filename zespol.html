<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Zespół | Dynamo Wrocław</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-top: 100px; /* Miejsce na navbar */
        }

        /* --- NAVBAR (ZGODNY Z INDEX) --- */
        nav {
            width: 100%;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed; top: 0; z-index: 2000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        
        .dropdown { position: relative; display: inline-block; }
        .drop-link { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        
        .dropdown-menu {
            display: block; visibility: hidden; opacity: 0; position: absolute; top: 100%; left: 0;
            background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 0; margin-top: 5px; transition: all 0.3s ease; transform: translateY(10px); transition-delay: 0.2s;
        }
        .dropdown::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 20px; }
        .dropdown:hover .dropdown-menu { visibility: visible; opacity: 1; transform: translateY(0); transition-delay: 0s; }
        .dropdown-menu a { color: white; padding: 12px 20px; text-decoration: none; display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; }

        /* --- NAGŁÓWEK SEKCJI --- */
        .team-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .team-header h1 {
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
        }
        .team-header span {
            color: #00a2ff;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 5px;
        }

        /* --- SIATKA KAFELKÓW --- */
        .team-grid {
            width: 90%;
            max-width: 1400px;
            margin: 0 auto 100px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: 0.4s;
            text-align: center;
            padding-bottom: 20px;
        }

        .player-card:hover {
            transform: translateY(-10px);
            border-color: #00a2ff;
            background: rgba(0, 162, 255, 0.05);
        }

        .player-img-box {
            width: 100%;
            height: 320px;
            background: linear-gradient(to bottom, transparent, rgba(5, 11, 20, 0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .player-img-box i {
            font-size: 150px;
            color: rgba(255, 255, 255, 0.1);
        }

        .player-number {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 48px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            font-style: italic;
        }

        .player-info { padding: 10px; }
        .player-name { font-size: 20px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .player-pos { font-size: 12px; color: #00a2ff; font-weight: 700; text-transform: uppercase; margin-top: 5px; }
        
        .flag-icon { width: 25px; margin-top: 10px; border-radius: 3px; }

    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="drop-link">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html">I Zespół</a>
                        <a href="#">Zarząd</a>
                        <a href="#">Historia</a>
                    </div>
                </div>
                <a href="#" class="drop-link">Bilety</a>
                <a href="#" class="drop-link">Sklep</a>

        </div>
    </nav>

    <main class="team-grid">

            <div class="player-info">
                <div class="player-name">Artem Moruh</div>
                <div class="player-pos">Bramkarz</div>
                <img src="https://flagcdn.com/w40/ua.png" class="flag-icon">
            </div>
        </div>

        <div class="player-card">
            <div class="player-number">3</div>
            <div class="player-img-box"><i class="fas fa-user-ninja"></i></div>
            <div class="player-info">
                <div class="player-name">Vadym Malko</div>
                <div class="player-pos">Zawodnik</div>
                <img src="https://flagcdn.com/w40/ua.png" class="flag-icon">
            </div>
        </div>

        <div class="player-card">
            <div class="player-number">4</div>
            <div class="player-img-box"><i class="fas fa-user-ninja"></i></div>
            <div class="player-info">
                <div class="player-name">Vladislav Grynyuk</div>
                <div class="player-pos">Zawodnik</div>
                <img src="https://flagcdn.com/w40/ua.png" class="flag-icon">
            </div>
        </div>

        <div class="player-card">
            <div class="player-number">8</div>
            <div class="player-img-box"><i class="fas fa-user-ninja"></i></div>
            <div class="player-info">

            <div class="player-info">

    </main>

</body>
</html>
