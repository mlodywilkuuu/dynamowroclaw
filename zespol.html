<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Zespół | Dynamo Wrocław</title>
    
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-top: 100px;
        }

        /* --- NAVBAR (ZGODNY Z INDEX, BEZ ZARZĄDU) --- */
        nav {
            width: 100%;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed; top: 0; z-index: 2000;
        }

        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        
        .nav-btn { 
            color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; 
            transition: 0.3s; cursor: pointer; padding: 10px; 
        }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }

        /* DROPDOWN KLUB */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu {
            display: block; visibility: hidden; opacity: 0; position: absolute; top: 100%; left: 0;
            background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; 
            transition: all 0.3s ease; transform: translateY(10px);
        }
        /* Mostek */
        .dropdown::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 15px; }
        .dropdown:hover .dropdown-menu { visibility: visible; opacity: 1; transform: translateY(0); }
        .dropdown-menu a { color: white; padding: 12px 20px; text-decoration: none; display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .dropdown-menu a:hover { background: rgba(0, 162, 255, 0.2); color: #00a2ff; }

        /* JĘZYKI PO PRAWEJ */
        .lang-dropdown { position: relative; margin-right: 20px; }
        .lang-content {
            display: block; visibility: hidden; opacity: 0; position: absolute; right: 0; top: 100%;
            background: rgba(10, 21, 37, 0.98); min-width: 160px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15); margin-top: 5px;
            transition: all 0.3s ease; transform: translateY(10px);
        }
        .lang-dropdown::after { content: ""; position: absolute; top: 100%; right: 0; width: 100%; height: 15px; }
        .lang-dropdown:hover .lang-content { visibility: visible; opacity: 1; transform: translateY(0); }
        .lang-content a { color: white; padding: 10px 20px; text-decoration: none; display: flex; align-items: center; font-size: 12px; font-weight: 600; }
        .lang-flag { width: 18px; margin-right: 12px; border-radius: 2px; }

        /* --- NAGŁÓWEK --- */
        .team-header { text-align: center; margin: 40px 0 60px 0; }
        .team-header h1 { font-size: 36px; text-transform: uppercase; letter-spacing: 3px; color: #fff; }
        .team-header span { color: #00a2ff; font-size: 14px; font-weight: 900; letter-spacing: 5px; }

        /* --- KAFELKI ZAWODNIKÓW BEZ ZDJĘĆ --- */
        .team-grid {
            width: 90%; max-width: 1400px; margin: 0 auto 100px auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            position: relative;
            transition: 0.3s ease-in-out;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 160px;
            overflow: hidden;
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: #00a2ff;
            background: rgba(0, 162, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Numer w tle */
        .player-card-number {
            position: absolute; top: 10px; right: 15px;
            font-size: 80px; font-weight: 900; color: rgba(0, 162, 255, 0.05);
            font-style: italic; line-height: 1; z-index: 1;
        }

        .player-card-info { position: relative; z-index: 2; }
        .player-card-name { font-size: 22px; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        .player-card-pos { font-size: 11px; color: #8899a6; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .player-card-flag { width: 32px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }

    </style>
</head>
