<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Managera | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px 5%; }
        .admin-grid { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 40px; }
        .card { background: #0a1525; padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-transform: uppercase; font-style: italic; color: #007bff; margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 800; opacity: 0.6; margin-bottom: 8px; }
        
        input, .editor { width: 100%; background: #050b14; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 6px; margin-bottom: 20px; outline: none; }
        input[type="datetime-local"] { color-scheme: dark; } /* Poprawka widoczności kalendarza */

        .toolbar { background: #162130; padding: 10px; border-radius: 6px 6px 0 0; display: flex; gap: 8px; border: 1px solid #333; border-bottom: none; }
        .tool-btn { background: #0a1525; border: 1px solid #444; color: #fff; width: 35px; height: 35px; cursor: pointer; border-radius: 4px; }
        .editor { min-height: 300px; border-top: none; border-radius: 0 0 6px 6px; overflow-y: auto; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn { border: none; padding: 18px; border-radius: 6px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-now { background: #4caf50; color: #fff; }
        .btn-plan { background: #007bff; color: #fff; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .post-item { background: #0a1525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-future { background: #fdd835; color: #000; }
        .badge-now { background: #4caf50; color: #fff; }
    </style>
</head>
<body>

<div class="admin-grid">
    <div class="card">
        <h2 id="form-title">Panel Publikacji</h2>
        <input type="hidden" id="edit-index" value="-1">
        
        <label>Tytuł</label>
        <input type="text" id="postTitle" placeholder="Nagłówek artykułu...">
        
        <label>Planowana Data i Godzina (użyj tylko jeśli planujesz na później)</label>
        <input type="datetime-local" id="postDateTime">
        
        <label>Zdjęcie (URL)</label>
        <input type="text" id="postImage" placeholder="https://...">
        
        <label>Treść</label>
        <div class="toolbar">
            <button class="tool-btn" onclick="document.execCommand('bold')">B</button>
            <button class="tool-btn" onclick="document.execCommand('italic')">I</button>
            <button class="tool-btn" onclick="var link=prompt('Link:'); document.execCommand('createLink', false, link)">Link</button>
        </div>
        <div id="editor" class="editor" contenteditable="true"></div>
        
        <div class="button-group">
            <button class="btn btn-now" onclick="savePost(true)">Opublikuj Teraz</button>
            <button class="btn btn-plan" onclick="savePost(false)">Zaplanuj Post</button>
        </div>
        <center><a href="aktualnosci.html" style="display:block; color:#666; margin-top:20px; text-decoration:none; font-size:12px;">Wróć do strony głównej</a></center>
    </div>

    <div>
        <h2>Zarządzanie Artykułami</h2>
        <div id="manager-list"></div>
    </div>
</div>

<script>
    // Ustawia kalendarz na aktualny czas przy starcie
    function resetDateTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('postDateTime').value = now.toISOString().slice(0, 16);
    }

    function renderList() {
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        // Sortowanie: od najnowszego (uwzględnia milisekundy)
        posts.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
        localStorage.setItem('dynamo_posts', JSON.stringify(posts));

        const now = new Date().getTime();
        document.getElementById('manager-list').innerHTML = posts.map((p, i) => {
            const isFuture = new Date(p.date).getTime() > now;
            return `
            <div class="post-item">
                <div>
                    <div style="font-weight:bold;">${p.title}</div>
                    <div style="font-size:11px; opacity:0.6;">${p.date.replace('T', ' ')} 
                        <span class="badge ${isFuture ? 'badge-future' : 'badge-now'}">
                            ${isFuture ? 'ZAPLANOWANY' : 'LIVE'}
                        </span>
                    </div>
                </div>
                <div>
                    <button style="color:#fdd835; background:none; border:none; cursor:pointer;" onclick="editPost(${i})"><i class="fas fa-edit"></i></button>
                    <button style="color:#ff4444; background:none; border:none; cursor:pointer;" onclick="deletePost(${i})"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function savePost(isImmediate) {
        const title = document.getElementById('postTitle').value;
        const image = document.getElementById('postImage').value;
        const content = document.getElementById('editor').innerHTML;
        const editIdx = parseInt(document.getElementById('edit-index').value);
        
        let finalDate;
        if(isImmediate) {
            // Jeśli "Opublikuj Teraz", bierzemy aktualny czas systemowy
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            finalDate = now.toISOString().slice(0, 16);
        } else {
            // Jeśli "Zaplanuj", bierzemy to co ustawione w kalendarzu
            finalDate = document.getElementById('postDateTime').value;
        }

        if(!title || !finalDate || content.trim() === "") {
            alert("Uzupełnij tytuł i treść posta!");
            return;
        }

        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        const postData = { title, date: finalDate, image: image || 'https://via.placeholder.com/800', content };

        if(editIdx === -1) {
            posts.push(postData);
        } else {
            posts[editIdx] = postData;
        }

        localStorage.setItem('dynamo_posts', JSON.stringify(posts));
        alert(isImmediate ? "Opublikowano pomyślnie!" : "Post został zaplanowany!");
        location.reload();
    }

    function editPost(i) {
        const posts = JSON.parse(localStorage.getItem('dynamo_posts'));
        const p = posts[i];
        document.getElementById('postTitle').value = p.title;
        document.getElementById('postDateTime').value = p.date;
        document.getElementById('postImage').value = p.image;
        document.getElementById('editor').innerHTML = p.content;
        document.getElementById('edit-index').value = i;
        document.getElementById('form-title').innerText = "Tryb Edycji";
        window.scrollTo(0,0);
    }

    function deletePost(i) {
        if(confirm("Usunąć ten wpis?")) {
            let posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            posts.splice(i, 1);
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            renderList();
        }
    }

    window.onload = () => { resetDateTime(); renderList(); };
</script>
</body>
</html>
