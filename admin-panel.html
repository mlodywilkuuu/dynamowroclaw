<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Managera | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px 5%; }
        .admin-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 40px; }
        .card { background: #0a1525; padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-transform: uppercase; font-style: italic; color: #007bff; margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 800; opacity: 0.6; margin-bottom: 8px; }
        
        input, .editor { width: 100%; background: #050b14; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 6px; margin-bottom: 20px; outline: none; }
        input[type="datetime-local"] { color-scheme: dark; }

        /* ROZBUDOWANY TOOLBAR */
        .toolbar { 
            background: #162130; 
            padding: 12px; 
            border-radius: 8px 8px 0 0; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            border: 1px solid #333; 
            border-bottom: none; 
        }
        .tool-group { display: flex; gap: 4px; border-right: 1px solid #333; padding-right: 8px; margin-right: 4px; }
        .tool-group:last-child { border-right: none; }
        
        .tool-btn { 
            background: #0a1525; border: 1px solid #444; color: #fff; 
            width: 36px; height: 36px; cursor: pointer; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .tool-btn:hover { background: #007bff; border-color: #007bff; }
        .tool-btn i { font-size: 14px; }
        
        select.tool-select { 
            background: #0a1525; color: #fff; border: 1px solid #444; 
            border-radius: 4px; padding: 0 5px; font-size: 12px; cursor: pointer; height: 36px;
        }

        .editor { 
            min-height: 400px; border-top: none; border-radius: 0 0 8px 8px; 
            overflow-y: auto; line-height: 1.6; background: #050b14; padding: 20px;
        }
        .editor:focus { border-color: #007bff; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn { border: none; padding: 18px; border-radius: 6px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-now { background: #4caf50; color: #fff; }
        .btn-plan { background: #007bff; color: #fff; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .post-item { background: #0a1525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-future { background: #fdd835; color: #000; }
        .badge-now { background: #4caf50; color: #fff; }
    </style>
</head>
<body>

<div class="admin-grid">
    <div class="card">
        <h2 id="form-title">Edytor Artykułów</h2>
        <input type="hidden" id="edit-index" value="-1">
        
        <label>Tytuł Artykułu</label>
        <input type="text" id="postTitle">
        
        <label>Data i Godzina (tylko dla planowania)</label>
        <input type="datetime-local" id="postDateTime">
        
        <label>Główne Zdjęcie (URL)</label>
        <input type="text" id="postImage">
        
        <label>Treść Artykułu</label>
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" title="Pogrubienie" onclick="exec('bold')"><i class="fas fa-bold"></i></button>
                <button class="tool-btn" title="Kursywa" onclick="exec('italic')"><i class="fas fa-italic"></i></button>
                <button class="tool-btn" title="Podkreślenie" onclick="exec('underline')"><i class="fas fa-underline"></i></button>
            </div>
            
            <div class="tool-group">
                <select class="tool-select" onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
                    <option value="" selected disabled>Format</option>
                    <option value="H2">Nagłówek Duży</option>
                    <option value="H3">Nagłówek Średni</option>
                    <option value="P">Zwykły Tekst</option>
                </select>
            </div>

            <div class="tool-group">
                <button class="tool-btn" onclick="exec('insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
                <button class="tool-btn" onclick="exec('justifyLeft')"><i class="fas fa-align-left"></i></button>
                <button class="tool-btn" onclick="exec('justifyCenter')"><i class="fas fa-align-center"></i></button>
            </div>

            <div class="tool-group">
                <input type="color" onchange="exec('foreColor', this.value)" title="Kolor tekstu" style="width:36px; height:36px; cursor:pointer; background:none; border:none;">
                <button class="tool-btn" title="Link" onclick="addLink()"><i class="fas fa-link"></i></button>
                <button class="tool-btn" title="Dodaj zdjęcie do treści" onclick="addImage()"><i class="fas fa-image"></i></button>
                <button class="tool-btn" title="Usuń formatowanie" onclick="exec('removeFormat')"><i class="fas fa-eraser"></i></button>
            </div>
        </div>
        <div id="editor" class="editor" contenteditable="true"></div>
        
        <div class="button-group">
            <button class="btn btn-now" onclick="savePost(true)">Opublikuj Teraz</button>
            <button class="btn btn-plan" onclick="savePost(false)">Zaplanuj Post</button>
        </div>
    </div>

    <div>
        <h2>Zarządzanie</h2>
        <div id="manager-list"></div>
    </div>
</div>

<script>
    function resetTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('postDateTime').value = now.toISOString().slice(0, 16);
    }

    function exec(cmd, val = null) {
        document.execCommand(cmd, false, val);
        document.getElementById('editor').focus();
    }

    function addLink() {
        const url = prompt("Podaj URL:");
        if(url) exec('createLink', url);
    }

    function addImage() {
        const url = prompt("Podaj URL zdjęcia:");
        if(url) exec('insertImage', url);
    }

    function renderList() {
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        posts.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
        localStorage.setItem('dynamo_posts', JSON.stringify(posts));

        const now = new Date().getTime();
        document.getElementById('manager-list').innerHTML = posts.map((p, i) => {
            const isFuture = new Date(p.date).getTime() > now;
            return `
            <div class="post-item">
                <div>
                    <div style="font-weight:bold; font-size:14px;">${p.title}</div>
                    <div style="font-size:11px; opacity:0.6;">${p.date.replace('T', ' ')} 
                        <span class="badge ${isFuture ? 'badge-future' : 'badge-now'}">
                            ${isFuture ? 'ZAPLANOWANY' : 'LIVE'}
                        </span>
                    </div>
                </div>
                <div>
                    <button style="color:#fdd835; background:none; border:none; cursor:pointer; margin-right:10px;" onclick="editPost(${i})"><i class="fas fa-edit"></i></button>
                    <button style="color:#ff4444; background:none; border:none; cursor:pointer;" onclick="deletePost(${i})"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function savePost(isImmediate) {
        const title = document.getElementById('postTitle').value;
        const image = document.getElementById('postImage').value;
        const content = document.getElementById('editor').innerHTML;
        const editIdx = parseInt(document.getElementById('edit-index').value);
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        
        let finalDate;
        if(isImmediate) {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            finalDate = now.toISOString().slice(0, 16);
        } else {
            finalDate = document.getElementById('postDateTime').value;
        }

        if(!title || !finalDate) { alert("Tytuł i data są wymagane!"); return; }

        const postData = { 
            id: editIdx === -1 ? Date.now() : posts[editIdx].id, 
            title, date: finalDate, image: image || 'https://via.placeholder.com/800', content 
        };

        if(editIdx === -1) posts.push(postData);
        else posts[editIdx] = postData;

        localStorage.setItem('dynamo_posts', JSON.stringify(posts));
        location.reload();
    }

    function editPost(i) {
        let posts = JSON.parse(localStorage.getItem('dynamo_posts'));
        const p = posts[i];
        document.getElementById('postTitle').value = p.title;
        document.getElementById('postDateTime').value = p.date;
        document.getElementById('postImage').value = p.image;
        document.getElementById('editor').innerHTML = p.content;
        document.getElementById('edit-index').value = i;
        document.getElementById('form-title').innerText = "Tryb Edycji";
        window.scrollTo(0,0);
    }

    function deletePost(i) {
        if(confirm("Usunąć?")) {
            let posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            posts.splice(i, 1);
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            renderList();
        }
    }

    window.onload = () => { resetTime(); renderList(); };
</script>
</body>
</html>
