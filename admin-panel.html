<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Publikacji | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 100px 5% 50px; }

        .admin-container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        
        /* Sekcja Formularza */
        .card { background: #0a1525; border-radius: 12px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-style: italic; text-transform: uppercase; margin-bottom: 25px; color: #007bff; font-size: 20px; }

        label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 800; color: #fff; opacity: 0.6; margin-bottom: 8px; }
        input, .editor { width: 100%; background: #050b14; border: 1px solid #1a2635; padding: 12px; color: #fff; border-radius: 6px; margin-bottom: 20px; outline: none; }
        
        /* Edytor */
        .toolbar { background: #162130; padding: 8px; border-radius: 6px 6px 0 0; display: flex; gap: 5px; border: 1px solid #1a2635; border-bottom: none; }
        .tool-btn { background: #0a1525; border: 1px solid #333; color: #fff; width: 32px; height: 32px; cursor: pointer; border-radius: 4px; }
        .editor { min-height: 250px; border-top: none; border-radius: 0 0 6px 6px; overflow-y: auto; }

        .btn-save { width: 100%; background: #007bff; color: #fff; border: none; padding: 15px; border-radius: 6px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #0056b3; }

        /* Lista artykułów */
        .post-list { max-height: 700px; overflow-y: auto; }
        .post-item { background: #0a1525; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .post-item-info h4 { font-size: 14px; text-transform: uppercase; margin-bottom: 4px; }
        .post-item-info span { font-size: 11px; opacity: 0.5; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-edit { color: #fdd835; background: none; border: none; cursor: pointer; }
        .btn-delete { color: #ff4444; background: none; border: none; cursor: pointer; }

        @media (max-width: 850px) { .admin-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="card">
        <h2 id="form-title">Nowa Publikacja</h2>
        
        <input type="hidden" id="edit-index" value="-1">
        
        <label>Tytuł</label>
        <input type="text" id="postTitle" placeholder="Tytuł artykułu...">

        <label>Data Publikacji</label>
        <input type="date" id="postDate">

        <label>Link do zdjęcia</label>
        <input type="text" id="postImage" placeholder="Adres URL zdjęcia...">

        <label>Treść</label>
        <div class="toolbar">
            <button class="tool-btn" onclick="format('bold')"><b>B</b></button>
            <button class="tool-btn" onclick="format('italic')"><i>I</i></button>
            <button class="tool-btn" onclick="format('insertUnorderedList')"><i class="fas fa-list"></i></button>
        </div>
        <div id="editor" class="editor" contenteditable="true"></div>

        <button class="btn-save" onclick="savePost()">Zapisz Artykuł</button>
        <center><a href="aktualnosci.html" style="color: #666; font-size: 12px; text-decoration: none; margin-top: 20px; display: block;">Wróć do strony głównej</a></center>
    </div>

    <div>
        <h2>Zarządzaj Artykułami</h2>
        <div id="post-manager-list" class="post-list">
            </div>
    </div>
</div>

<script>
    // Ustawienie dzisiejszej daty na start
    document.getElementById('postDate').valueAsDate = new Date();

    function format(cmd) {
        document.execCommand(cmd, false, null);
    }

    function savePost() {
        const title = document.getElementById('postTitle').value;
        const date = document.getElementById('postDate').value;
        const img = document.getElementById('postImage').value;
        const content = document.getElementById('editor').innerHTML;
        const editIndex = parseInt(document.getElementById('edit-index').value);

        if (!title || !content) { alert("Tytuł i treść są wymagane!"); return; }

        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];

        const postData = {
            title: title,
            date: date,
            image: img || 'https://via.placeholder.com/800x450',
            content: content
        };

        if (editIndex === -1) {
            posts.unshift(postData); // Nowy post
        } else {
            posts[editIndex] = postData; // Edycja istniejącego
        }

        localStorage.setItem('dynamo_posts', JSON.stringify(posts));
        resetForm();
        renderManagerList();
        alert("Zapisano pomyślnie!");
    }

    function renderManagerList() {
        const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        const container = document.getElementById('post-manager-list');

        container.innerHTML = posts.map((p, i) => `
            <div class="post-item">
                <div class="post-item-info">
                    <h4>${p.title}</h4>
                    <span>${p.date}</span>
                </div>
                <div class="action-btns">
                    <button class="btn-edit" onclick="editPost(${i})"><i class="fas fa-edit"></i></button>
                    <button class="btn-delete" onclick="deletePost(${i})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    function editPost(i) {
        const posts = JSON.parse(localStorage.getItem('dynamo_posts'));
        const p = posts[i];

        document.getElementById('postTitle').value = p.title;
        document.getElementById('postDate').value = p.date;
        document.getElementById('postImage').value = p.image;
        document.getElementById('editor').innerHTML = p.content;
        document.getElementById('edit-index').value = i;
        document.getElementById('form-title').innerText = "Edytujesz Artykuł";
        window.scrollTo(0,0);
    }

    function deletePost(i) {
        if(confirm("Usunąć ten artykuł na stałe?")) {
            let posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            posts.splice(i, 1);
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            renderManagerList();
        }
    }

    function resetForm() {
        document.getElementById('postTitle').value = "";
        document.getElementById('postDate').valueAsDate = new Date();
        document.getElementById('postImage').value = "";
        document.getElementById('editor').innerHTML = "";
        document.getElementById('edit-index').value = "-1";
        document.getElementById('form-title').innerText = "Nowa Publikacja";
    }

    window.onload = renderManagerList;
</script>

</body>
</html>
