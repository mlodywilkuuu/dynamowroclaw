<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

        /* --- NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000;
        }
        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }

        /* --- PASEK FORMATOWANIA --- */
        .toolbar {
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px 8px 0 0;
            display: flex; gap: 10px; border: 1px solid #444; border-bottom: none;
        }
        .tool-btn {
            background: none; border: none; color: white; cursor: pointer; padding: 5px 10px;
            border-radius: 4px; transition: 0.2s; font-weight: bold;
        }
        .tool-btn:hover { background: #00a2ff; }

        /* --- ADMIN PANEL --- */
        #admin-panel { 
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); margin: 120px auto 40px; 
            max-width: 800px; display: none; 
        }
        .admin-input { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; 
        }
        #post-content { border-radius: 0 0 8px 8px; min-height: 200px; }

        /* --- ARTYKUŁ --- */
        #article-view { display: none; width: 100%; min-height: 100vh; padding-top: 80px; }
        .hero-banner { 
            width: 100%; height: 500px; background-size: cover; background-position: center; 
            position: relative; display: flex; align-items: flex-end; padding: 60px 10%; 
        }
        .hero-banner::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to top, #050b14, transparent); 
        }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .article-title-main { font-size: 60px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 20px; }
        
        /* Styl Epic/Fortnite dla tagów */
        .badge-row { display: flex; gap: 10px; margin-top: 15px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-staff { background: #b084ff; color: #fff; }
        .badge-dev { background: #d4ff84; color: #000; }

        .content-body { padding: 40px 10%; font-size: 18px; line-height: 1.6; max-width: 1100px; }
        .back-nav { padding: 20px 10%; cursor: pointer; color: #00a2ff; font-weight: 800; }

        /* JĘZYKI */
        .lang-menu { 
            display: none; position: absolute; right: 40px; top: 70px; 
            background: #0a1525; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
        }
        .lang-menu.active { display: block; }
        .lang-option { padding: 10px 20px; cursor: pointer; font-size: 12px; }
        .lang-option:hover { color: #00a2ff; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="aktualnosci.html" class="nav-btn" id="nav-news">Aktualności</a>
                <a href="zespol.html" class="nav-btn" id="nav-team">I Zespół</a>
            </div>
        </div>
        <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe"></i> <span id="current-lang">PL</span></div>
    </nav>

    <div id="lang-menu" class="lang-menu">
        <div class="lang-option" onclick="selectLang('PL')">PL</div>
        <div class="lang-option" onclick="selectLang('EN')">EN</div>
        <div class="lang-option" onclick="selectLang('UA')">UA</div>
    </div>

    <div id="admin-panel">
        <input type="text" id="post-title" class="admin-input" placeholder="Tytuł artykułu">
        <input type="text" id="post-image" class="admin-input" placeholder="Link do zdjęcia (URL)">
        <div class="toolbar">
            <button class="tool-btn" onclick="format('bold')">B</button>
            <button class="tool-btn" onclick="format('italic')">I</button>
            <button class="tool-btn" onclick="format('h1')">H1</button>
            <button class="tool-btn" onclick="format('link')"><i class="fas fa-link"></i></button>
        </div>
        <textarea id="post-content" class="admin-input" placeholder="Treść..."></textarea>
        <button class="nav-btn" style="background:#00a2ff; opacity:1; border-radius:8px;" onclick="savePost()">Opublikuj</button>
    </div>

    <div id="list-view" class="container" style="margin-top:120px; padding: 0 10%;">
        <button class="nav-btn" onclick="checkPass()">➕ Dodaj wpis</button>
        <div id="news-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top:30px;"></div>
    </div>

    <div id="article-view">
        <div class="back-nav" id="back-txt" onclick="showList()">← WRÓĆ</div>
        <div id="dynamic-article"></div>
    </div>

    <script>
        const PASS = "admin123";
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        // Usuwanie "test" przy ładowaniu
        posts = posts.filter(p => p.title.toLowerCase() !== 'test');
        localStorage.setItem('dynamo_posts', JSON.stringify(posts));

        let currentLang = 'PL';
        const translations = {
            'PL': { news: 'Aktualności', team: 'Zespół', back: '← WRÓĆ DO LISTY', pub: 'OPUBLIKOWANO W', cat: 'AKTUALNOŚCI' },
            'EN': { news: 'News', team: 'Team', back: '← BACK TO LIST', pub: 'PUBLISHED IN', cat: 'NEWS' },
            'UA': { news: 'Новини', team: 'Команда', back: '← НАЗАД', pub: 'ОПУБЛІКОВАНО В', cat: 'НОВИНИ' }
        };

        function format(type) {
            const area = document.getElementById('post-content');
            const start = area.selectionStart;
            const end = area.selectionEnd;
            const text = area.value.substring(start, end);
            let inserted = "";
            if(type === 'bold') inserted = `**${text}**`;
            if(type === 'italic') inserted = `*${text}*`;
            if(type === 'h1') inserted = `# ${text}`;
            if(type === 'link') inserted = `[${text}](url)`;
            area.value = area.value.substring(0, start) + inserted + area.value.substring(end);
        }

        function selectLang(l) {
            currentLang = l;
            document.getElementById('current-lang').innerText = l;
            document.getElementById('lang-menu').classList.remove('active');
            updateTranslations();
        }

        function updateTranslations() {
            const t = translations[currentLang];
            document.getElementById('nav-news').innerText = t.news;
            document.getElementById('nav-team').innerText = t.team;
            
            // Dynamiczne elementy wewnątrz artykułu
            const backBtn = document.getElementById('back-txt');
            if(backBtn) backBtn.innerText = t.back;

            const pubLabel = document.getElementById('pub-label');
            if(pubLabel) pubLabel.innerText = t.pub;

            const catLabel = document.getElementById('cat-label');
            if(catLabel) catLabel.innerText = t.cat;
        }

        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }

        function checkPass() { if(prompt("Hasło:") === PASS) document.getElementById('admin-panel').style.display = 'block'; }

        function savePost() {
            const post = {
                id: Date.now(),
                title: document.getElementById('post-title').value,
                image: document.getElementById('post-image').value,
                content: document.getElementById('post-content').value,
                date: new Date().toLocaleDateString()
            };
            posts.unshift(post);
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            location.reload();
        }

        function openArticle(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            
            document.getElementById('dynamic-article').innerHTML = `
                <div class="hero-banner" style="background-image: url('${p.image}')">
                    <div class="hero-content">
                        <h1 class="article-title-main">${p.title}</h1>
                        <p style="font-size:12px; font-weight:800; opacity:0.8">
                            <span id="pub-label"></span> <span id="cat-label" style="color:#00a2ff"></span>
                        </p>
                        <div class="badge-row">
                            <div class="badge badge-staff">STAFF</div>
                            <div class="badge badge-dev">ADMIN</div>
                        </div>
                    </div>
                </div>
                <div class="content-body">
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px; opacity:0.6">
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" style="height:40px">
                        <div><strong>Dynamo Wrocław</strong><br><small>${p.date}</small></div>
                    </div>
                    ${p.content.replace(/\n/g, '<br>')}
                </div>
            `;
            updateTranslations();
            window.scrollTo(0,0);
        }

        function renderGrid() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = posts.map(p => `
                <div onclick="openArticle(${p.id})" style="cursor:pointer; background:rgba(255,255,255,0.03); border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.05)">
                    <div style="height:180px; background:url('${p.image}') center/cover"></div>
                    <div style="padding:20px">
                        <small style="color:#00a2ff; font-weight:800">${p.date}</small>
                        <h3 style="margin-top:10px; text-transform:uppercase">${p.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function showList() { location.reload(); }

        renderGrid();
        updateTranslations();
    </script>
</body>
</html>
