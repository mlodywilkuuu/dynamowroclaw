<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STYLE Z INDEX.HTML --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000;
        }
        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; }
        .dropdown:hover .dropdown-menu { display: block; }

        .nav-right-container { display: flex; align-items: center; gap: 25px; }
        .lang-dropdown { position: relative; }
        .lang-menu { display: none; position: absolute; right: 0; top: 100%; background: rgba(10, 21, 37, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; min-width: 80px; }
        .lang-menu.active { display: block; }
        .lang-option { padding: 10px; cursor: pointer; font-size: 12px; }
        .lang-option:hover { color: #00a2ff; }

        /* --- KONTENER TREŚCI --- */
        .main-content { margin-top: 100px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 1100px; }

        /* --- MAŁY PRZYCISK DODAWANIA --- */
        .admin-controls { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-add-small { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-add-small:hover { background: #00a2ff; border-color: #00a2ff; }

        /* --- PANEL FORMULARZA --- */
        #admin-panel { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 16px; border: 1px solid #444; margin-bottom: 30px; display: none; }
        .admin-input, .admin-textarea { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; font-family: inherit; }

        /* --- LISTA KART --- */
        .news-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 16px; margin-bottom: 20px; cursor: pointer; position: relative; transition: 0.3s; }
        .news-card:hover { border-color: #00a2ff; transform: translateY(-3px); }
        .btn-delete { position: absolute; top: 20px; right: 20px; color: #ff4444; opacity: 0.5; border: none; background: none; cursor: pointer; padding: 10px; }
        .btn-delete:hover { opacity: 1; }

        /* --- WYGLĄD ARTYKUŁU EPIC GAMES --- */
        #article-view { display: none; width: 100%; }
        .article-hero { background: rgba(0,0,0,0.5); padding: 80px 40px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .article-hero h1 { font-size: 55px; font-weight: 900; text-transform: uppercase; line-height: 1; letter-spacing: -2px; margin-bottom: 25px; }
        .article-tag { color: rgba(255,255,255,0.6); font-size: 14px; }
        .article-tag span { background: rgba(255,255,255,0.1); color: #fff; padding: 5px 12px; border-radius: 4px; font-weight: bold; margin-left: 10px; border: 1px solid rgba(255,255,255,0.1); }
        
        .article-body-container { background: rgba(255,255,255,0.02); padding: 50px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .article-author-row { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .author-name { font-size: 20px; font-weight: bold; }
        .article-text { font-size: 19px; line-height: 1.8; color: #ccc; white-space: pre-wrap; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="nav-btn">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html" class="nav-btn">I Zespół</a>
                        <a href="historia.html" class="nav-btn">Historia</a>
                    </div>
                </div>
                <a href="aktualnosci.html" class="nav-btn" style="color:#00a2ff; opacity:1;">Aktualności</a>
                <a href="#" class="nav-btn">Kontakt</a>
            </div>
        </div>
        <div class="nav-right-container">
            <div class="partner-section">
                <img src="657223629_1253635633558394_588577037858878449_n-removebg-preview.png" style="height:35px;">
            </div>
            <a href="https://www.instagram.com/ks_dinamo_wroclaw_/" target="_blank" class="nav-btn"><i class="fab fa-instagram"></i></a>
            <div class="lang-dropdown">
                <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe" style="color:#00a2ff"></i> <span id="current-lang">PL</span></div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="selectLang('PL')">PL</div>
                    <div class="lang-option" onclick="selectLang('UA')">UA</div>
                    <div class="lang-option" onclick="selectLang('EN')">EN</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            
            <div id="list-view">
                <div class="admin-controls">
                    <button class="btn-add-small" onclick="checkPassAndToggle()">+ Dodaj artykuł</button>
                </div>

                <div id="admin-panel">
                    <input type="text" id="post-title" class="admin-input" placeholder="Tytuł artykułu">
                    <textarea id="post-content" class="admin-textarea" rows="8" placeholder="Treść..."></textarea>
                    <button class="btn-add-small" style="background:#00a2ff" onclick="savePost()">Opublikuj</button>
                </div>

                <div id="news-list"></div>
            </div>

            <div id="article-view">
                <div class="nav-btn" onclick="showList()" style="margin-bottom:20px; display:inline-block;"><i class="fas fa-arrow-left"></i> Powrót</div>
                <div id="article-content"></div>
            </div>

        </div>
    </div>

    <script>
        const PASS = "admin123";
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];

        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }
        function selectLang(l) { document.getElementById('current-lang').innerText = l; toggleLang(); }

        function checkPassAndToggle() {
            if(prompt("Podaj hasło administratora:") === PASS) {
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("Błędne hasło!"); }
        }

        function savePost() {
            const t = document.getElementById('post-title').value;
            const c = document.getElementById('post-content').value;
            if(!t || !c) return;
            posts.unshift({ id: Date.now(), title: t, content: c, date: new Date().toLocaleDateString() });
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            location.reload();
        }

        function deletePost(id, e) {
            e.stopPropagation();
            if(prompt("Podaj hasło, aby usunąć:") === PASS) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('dynamo_posts', JSON.stringify(posts));
                renderList();
            } else { alert("Błąd!"); }
        }

        function renderList() {
            const list = document.getElementById('news-list');
            list.innerHTML = posts.map(p => `
                <div class="news-card" onclick="openArticle(${p.id})">
                    <div style="color:#00a2ff; font-size:12px; font-weight:bold; margin-bottom:5px;">${p.date}</div>
                    <h2 style="text-transform:uppercase;">${p.title}</h2>
                    <button class="btn-delete" onclick="deletePost(${p.id}, event)"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            document.getElementById('article-content').innerHTML = `
                <div class="article-hero">
                    <div class="article-tag">Opublikowano w <span>AKTUALNOŚCI</span></div>
                    <h1>${p.title}</h1>
                </div>
                <div class="article-body-container">
                    <div class="article-author-row">
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" style="height:50px;">
                        <div>
                            <div class="author-name">Dynamo Wrocław</div>
                            <div style="font-size:12px; opacity:0.5;">${p.date}</div>
                        </div>
                    </div>
                    <div class="article-text">${p.content}</div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
        }

        renderList();
    </script>
</body>
</html>
