<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050b14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000;
        }
        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; }
        .dropdown:hover .dropdown-menu { display: block; }

        .nav-right-container { display: flex; align-items: center; gap: 25px; }
        .lang-dropdown { position: relative; }
        .lang-menu { display: none; position: absolute; right: 0; top: 100%; background: rgba(10, 21, 37, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; min-width: 80px; z-index: 3000; }
        .lang-menu.active { display: block; }
        .lang-option { padding: 10px; cursor: pointer; font-size: 12px; }
        .lang-option:hover { color: #00a2ff; }

        /* --- UKŁAD TREŚCI --- */
        .main-content { margin-top: 85px; width: 100%; }
        .list-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* --- ADMIN PANEL --- */
        .admin-controls { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-add-small { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        #admin-panel { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; display: none; backdrop-filter: blur(20px); }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; font-family: inherit; }

        /* --- WIDOK ARTYKUŁU (EPIC STYLE) --- */
        #article-view { display: none; width: 100%; min-height: 100vh; background: #050b14; }
        
        .hero-banner {
            width: 100%;
            height: 550px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #050b14 0%, rgba(5,11,20,0.3) 100%);
            z-index: 1;
        }

        .hero-content { position: relative; z-index: 2; width: 100%; max-width: 1200px; }

        .article-title { 
            font-size: clamp(40px, 6vw, 85px); font-weight: 900; text-transform: uppercase; line-height: 0.9; 
            letter-spacing: -3px; margin-bottom: 20px; color: #fff; font-style: italic;
        }

        .meta-container { margin-top: 10px; }
        
        .meta-glass-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
        }
        .meta-glass-tag span { color: #00a2ff; margin-left: 5px; }

        /* Info o autorze pod tagiem (zgodnie ze screenem nr 2) */
        .author-info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 25px;
        }
        .author-logo-small { 
            height: 50px; width: 50px; 
            border-radius: 50%; 
            border: 2px solid #00a2ff; 
            padding: 5px;
            background: #000;
        }
        .author-text-data { display: flex; flex-direction: column; }
        .author-name-main { font-size: 18px; font-weight: 800; color: #fff; }
        .author-date-sub { font-size: 13px; opacity: 0.5; }

        .content-body { padding: 60px 10%; font-size: 20px; line-height: 1.8; color: rgba(255,255,255,0.8); white-space: pre-wrap; max-width: 1000px; }
        .back-nav { padding: 20px 10%; cursor: pointer; color: #00a2ff; font-weight: 800; text-transform: uppercase; font-size: 12px; }

        .news-card { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 25px 0; cursor: pointer; transition: 0.3s; }
        .news-card:hover { padding-left: 10px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="nav-btn" id="nav-club">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html" class="nav-btn" id="nav-team">I Zespół</a>
                        <a href="historia.html" class="nav-btn" id="nav-history">Historia</a>
                    </div>
                </div>
                <a href="aktualnosci.html" class="nav-btn" id="nav-news" style="color:#00a2ff; opacity:1;">Aktualności</a>
                <a href="#" class="nav-btn" id="nav-contact">Kontakt</a>
            </div>
        </div>
        <div class="nav-right-container">
            <a href="https://www.instagram.com/ks_dinamo_wroclaw_/" target="_blank" class="nav-btn"><i class="fab fa-instagram"></i></a>
            <div class="lang-dropdown">
                <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe" style="color:#00a2ff"></i> <span id="current-lang">PL</span></div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="selectLang('PL')">PL</div>
                    <div class="lang-option" onclick="selectLang('UA')">UA</div>
                    <div class="lang-option" onclick="selectLang('EN')">EN</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        
        <div id="list-view" class="list-container">
            <div class="admin-controls">
                <button class="btn-add-small" onclick="checkPass()">+ Nowy Artykuł</button>
            </div>

            <div id="admin-panel">
                <input type="text" id="post-title" class="admin-input" placeholder="Tytuł artykułu">
                <input type="text" id="post-image" class="admin-input" placeholder="Link do zdjęcia tła (URL)">
                <textarea id="post-content" class="admin-input" rows="8" placeholder="Treść artykułu..."></textarea>
                <button class="btn-add-small" style="background:#00a2ff; border:none" onclick="savePost()">Opublikuj</button>
            </div>

            <div id="news-list"></div>
        </div>

        <div id="article-view">
            <div class="back-nav" onclick="showList()"><i class="fas fa-chevron-left"></i> WRÓĆ DO LISTY</div>
            <div id="dynamic-content"></div>
        </div>

    </div>

    <script>
        const PASS = "admin123";
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];

        // --- TŁUMACZENIE MENU ---
        const translations = {
            'PL': { club: 'Klub', team: 'I Zespół', history: 'Historia', news: 'Aktualności', contact: 'Kontakt' },
            'UA': { club: 'Клуб', team: 'I Команда', history: 'Історія', news: 'Новини', contact: 'Контакт' },
            'EN': { club: 'Club', team: 'First Team', history: 'History', news: 'News', contact: 'Contact' }
        };

        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }

        function selectLang(l) { 
            document.getElementById('current-lang').innerText = l;
            document.getElementById('lang-menu').classList.remove('active');
            
            // Zmiana tekstów menu
            const t = translations[l];
            document.getElementById('nav-club').innerHTML = `${t.club} <i class="fas fa-chevron-down" style="font-size: 8px;"></i>`;
            document.getElementById('nav-team').innerText = t.team;
            document.getElementById('nav-history').innerText = t.history;
            document.getElementById('nav-news').innerText = t.news;
            document.getElementById('nav-contact').innerText = t.contact;
        }

        function checkPass() {
            if(prompt("Hasło:") === PASS) document.getElementById('admin-panel').style.display = 'block';
        }

        function savePost() {
            const t = document.getElementById('post-title').value;
            const img = document.getElementById('post-image').value || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000';
            const c = document.getElementById('post-content').value;
            if(!t || !c) return;

            posts.unshift({ id: Date.now(), title: t, content: c, image: img, date: new Date().toLocaleDateString('pl-PL') });
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            location.reload();
        }

        function renderList() {
            const list = document.getElementById('news-list');
            list.innerHTML = posts.map(p => `
                <div class="news-card" onclick="openArticle(${p.id})">
                    <div style="font-size:11px; font-weight:bold; color:#00a2ff; margin-bottom:5px;">${p.date}</div>
                    <h2 style="text-transform:uppercase; font-size:28px; font-weight:900;">${p.title}</h2>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            
            document.getElementById('dynamic-content').innerHTML = `
                <div class="hero-banner" style="background-image: url('${p.image}')">
                    <div class="hero-content">
                        <h1 class="article-title">${p.title}</h1>
                        <div class="meta-glass-tag">OPUBLIKOWANO W <span>AKTUALNOŚCI</span></div>
                        
                        <div class="author-info-row">
                            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="author-logo-small">
                            <div class="author-text-data">
                                <div class="author-name-main">Dynamo Wrocław</div>
                                <div class="author-date-sub">${p.date}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="content-body">${p.content}</div>
            `;
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
        }

        renderList();
    </script>
</body>
</html>
