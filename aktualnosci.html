<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 21, 37, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 9999;
        }
        .logo-img { height: 60px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 10px; }

        .header-section { padding: 150px 10% 40px; background: linear-gradient(to bottom, #0a1525, #050b14); }
        .admin-trigger { background: #00a2ff; color: #fff; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: 800; font-size: 12px; display: inline-block; margin-top: 20px; }

        .container { padding: 40px 10%; min-height: 60vh; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .card { background: #0a1525; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #00a2ff; }
        .card-img { width: 100%; height: 200px; background-size: cover; background-position: center; background-color: #111; }
        .card-body { padding: 25px; }
        .card-date { color: #00a2ff; font-size: 11px; font-weight: 800; }
        .card-title { font-size: 20px; margin: 10px 0; font-style: italic; text-transform: uppercase; }
        .card-text { opacity: 0.7; font-size: 14px; line-height: 1.6; margin-bottom: 15px; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(5,11,20,0.98); z-index: 10000; overflow-y: auto; padding: 60px 20px; }
        .modal-content { max-width: 800px; margin: 0 auto; line-height: 1.8; }
        .close { position: fixed; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: #00a2ff; }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
    <a href="index.html" class="nav-btn">Powrót</a>
</nav>

<div class="header-section">
    <h1 style="font-size: 40px; font-style: italic;">AKTUALNOŚCI</h1>
    <a href="admin-panel.html" class="admin-trigger"><i class="fas fa-plus"></i> DODAJ ARTYKUŁ</a>
</div>

<div class="container">
    <div id="news-list" class="news-grid"></div>
</div>

<div id="modal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="modal-body" class="modal-content"></div>
</div>

<script>
    function load() {
        const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        const list = document.getElementById('news-list');
        list.innerHTML = posts.map((p, i) => `
            <div class="card">
                <div class="card-img" style="background-image: url('${p.image}')"></div>
                <div class="card-body">
                    <p class="card-date">${p.date}</p>
                    <h2 class="card-title">${p.title}</h2>
                    <div class="card-text">${p.content.substring(0, 150)}...</div>
                    <button onclick="openPost(${i})" style="background:none; border:none; color:#00a2ff; font-weight:800; cursor:pointer; text-transform:uppercase; font-size:12px;">Czytaj więcej +</button>
                    <button onclick="deletePost(${i})" style="margin-left:15px; background:none; border:none; color:red; opacity:0.5; cursor:pointer; font-size:10px;">Usuń</button>
                </div>
            </div>
        `).join('');
    }

    function openPost(i) {
        const posts = JSON.parse(localStorage.getItem('dynamo_posts'));
        const p = posts[i];
        document.getElementById('modal-body').innerHTML = `
            <img src="${p.image}" style="width:100%; border-radius:15px; margin-bottom:30px;">
            <h1 style="font-size:35px; color:#00a2ff; font-style:italic;">${p.title}</h1>
            <p style="margin-bottom:30px; opacity:0.5;">${p.date}</p>
            <div style="font-size:18px;">${p.content}</div>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function deletePost(i) {
        if(confirm("Usunąć ten artykuł?")) {
            let posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            posts.splice(i, 1);
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            load();
        }
    }

    window.onload = load;
</script>
</body>
</html>
