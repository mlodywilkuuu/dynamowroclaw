<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050b14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000;
        }
        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; }
        .dropdown:hover .dropdown-menu { display: block; }

        .nav-right-container { display: flex; align-items: center; gap: 25px; }
        .lang-dropdown { position: relative; }
        .lang-menu { display: none; position: absolute; right: 0; top: 100%; background: rgba(10, 21, 37, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; min-width: 80px; z-index: 3000; }
        .lang-menu.active { display: block; }
        .lang-option { padding: 10px; cursor: pointer; font-size: 12px; }
        .lang-option:hover { color: #00a2ff; }

        /* --- UKŁAD TREŚCI --- */
        .main-content { margin-top: 100px; width: 100%; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 40px; }

        /* --- ADMIN PANEL --- */
        .admin-controls { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .btn-add-emoji { font-size: 28px; cursor: pointer; background: none; border: none; opacity: 0.4; transition: 0.3s; padding: 10px; }
        .btn-add-emoji:hover { opacity: 1; transform: scale(1.1); }

        #admin-panel { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; display: none; backdrop-filter: blur(20px); }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; font-family: inherit; }

        /* --- SIATKA KAFELKOWA (GRID) --- */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; 
            margin-bottom: 60px;
        }

        .news-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .news-card:hover { 
            transform: translateY(-10px); 
            border-color: #00a2ff;
            background: rgba(255,255,255,0.06);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .card-content { padding: 25px; flex-grow: 1; }
        .card-date { font-size: 11px; font-weight: 800; color: #00a2ff; margin-bottom: 10px; text-transform: uppercase; }
        .card-title { font-size: 22px; font-weight: 900; text-transform: uppercase; line-height: 1.1; color: #fff; }

        /* --- WIDOK ARTYKUŁU --- */
        #article-view { display: none; width: 100%; min-height: 100vh; background: #050b14; }
        .hero-banner { width: 100%; height: 550px; background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; }
        .hero-banner::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, #050b14 0%, rgba(5,11,20,0.3) 100%); z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .article-title-main { font-size: clamp(35px, 5vw, 75px); font-weight: 900; text-transform: uppercase; line-height: 0.9; letter-spacing: -2px; margin-bottom: 20px; color: #fff; }

        .meta-glass-tag { display: inline-block; padding: 4px 12px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .meta-glass-tag span { color: #00a2ff; margin-left: 5px; }

        .author-info-row { display: flex; align-items: center; gap: 12px; margin-top: 25px; }
        .author-logo-small { height: 50px; width: 50px; border-radius: 50%; border: 2px solid #00a2ff; padding: 5px; background: #000; }
        .author-name-main { font-size: 18px; font-weight: 800; color: #fff; }
        .author-date-sub { font-size: 13px; opacity: 0.5; }

        .content-body { padding: 60px 10%; font-size: 20px; line-height: 1.8; color: rgba(255,255,255,0.8); white-space: pre-wrap; max-width: 1000px; }
        .back-nav { padding: 20px 10%; cursor: pointer; color: #00a2ff; font-weight: 800; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="nav-btn" id="nav-club">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html" class="nav-btn" id="nav-team">I Zespół</a>
                        <a href="history.html" class="nav-btn" id="nav-history">Historia</a>
                    </div>
                </div>
                <a href="aktualnosci.html" class="nav-btn" id="nav-news" style="color:#00a2ff; opacity:1;">Aktualności</a>
                <a href="#" class="nav-btn" id="nav-contact">Kontakt</a>
            </div>
        </div>
        <div class="nav-right-container">
            <a href="https://www.instagram.com/ks_dinamo_wroclaw_/" target="_blank" class="nav-btn"><i class="fab fa-instagram"></i></a>
            <div class="lang-dropdown">
                <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe" style="color:#00a2ff"></i> <span id="current-lang">PL</span></div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="selectLang('PL')">PL</div>
                    <div class="lang-option" onclick="selectLang('UA')">UA</div>
                    <div class="lang-option" onclick="selectLang('EN')">EN</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div id="list-view" class="container">
            <div class="admin-controls">
                <button class="btn-add-emoji" onclick="checkPass()">➕</button>
            </div>

            <div id="admin-panel">
                <input type="text" id="post-title" class="admin-input" placeholder="Tytuł artykułu">
                <input type="text" id="post-image" class="admin-input" placeholder="Link do zdjęcia tła (URL)">
                <textarea id="post-content" class="admin-input" rows="8" placeholder="Treść artykułu..."></textarea>
                <button class="nav-btn" style="background:#00a2ff; border:none; border-radius: 6px; padding: 12px 25px;" onclick="savePost()">Opublikuj</button>
            </div>

            <div id="news-grid" class="news-grid"></div>
        </div>

        <div id="article-view">
            <div class="back-nav" id="back-txt" onclick="showList()"><i class="fas fa-chevron-left"></i> WRÓĆ DO LISTY</div>
            <div id="dynamic-content"></div>
        </div>
    </div>

    <script>
        const PASS = "admin123";
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
        let currentL = 'PL';

        const translations = {
            'PL': { club: 'Klub', team: 'I Zespół', history: 'Historia', news: 'Aktualności', contact: 'Kontakt', back: 'WRÓĆ DO LISTY', pub: 'OPUBLIKOWANO W', cat: 'AKTUALNOŚCI' },
            'UA': { club: 'Клуб', team: 'I Команда', history: 'Історія', news: 'Новини', contact: 'Контакт', back: 'НАЗАД ДО СПИСКУ', pub: 'ОПУБЛІКОВАНО В', cat: 'НОВИНИ' },
            'EN': { club: 'Club', team: 'First Team', history: 'History', news: 'News', contact: 'Contact', back: 'BACK TO LIST', pub: 'PUBLISHED IN', cat: 'NEWS' }
        };

        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }

        function selectLang(l) { 
            currentL = l;
            document.getElementById('current-lang').innerText = l;
            document.getElementById('lang-menu').classList.remove('active');
            updatePageTexts();
        }

        function updatePageTexts() {
            const t = translations[currentL];
            document.getElementById('nav-club').innerHTML = `${t.club} <i class="fas fa-chevron-down" style="font-size: 8px;"></i>`;
            document.getElementById('nav-team').innerText = t.team;
            document.getElementById('nav-history').innerText = t.history;
            document.getElementById('nav-news').innerText = t.news;
            document.getElementById('nav-contact').innerText = t.contact;
            if (document.getElementById('back-txt')) document.getElementById('back-txt').innerHTML = `<i class="fas fa-chevron-left"></i> ${t.back}`;
        }

        function checkPass() {
            if(prompt("Hasło:") === PASS) document.getElementById('admin-panel').style.display = 'block';
        }

        function savePost() {
            const t = document.getElementById('post-title').value;
            const img = document.getElementById('post-image').value || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000';
            const c = document.getElementById('post-content').value;
            if(!t || !c) return;
            posts.unshift({ id: Date.now(), title: t, content: c, image: img, date: new Date().toLocaleDateString('pl-PL') });
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            location.reload();
        }

        function renderList() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = posts.map(p => `
                <div class="news-card" onclick="openArticle(${p.id})">
                    <div class="card-image" style="background-image: url('${p.image}')"></div>
                    <div class="card-content">
                        <div class="card-date">${p.date}</div>
                        <div class="card-title">${p.title}</div>
                    </div>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const p = posts.find(x => x.id === id);
            const t = translations[currentL];
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            
            document.getElementById('dynamic-content').innerHTML = `
                <div class="hero-banner" style="background-image: url('${p.image}')">
                    <div class="hero-content">
                        <h1 class="article-title-main">${p.title}</h1>
                        <div class="meta-glass-tag">${t.pub} <span>${t.cat}</span></div>
                        <div class="author-info-row">
                            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="author-logo-small">
                            <div class="author-text-data">
                                <div class="author-name-main">Dynamo Wrocław</div>
                                <div class="author-date-sub">${p.date}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="content-body">${p.content}</div>
            `;
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
        }

        renderList();
    </script>
</body>
</html>
