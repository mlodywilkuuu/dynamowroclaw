<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STYLE BAZOWE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000;
        }
        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: rgba(10, 21, 37, 0.98); min-width: 180px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; margin-top: 5px; }
        .dropdown:hover .dropdown-menu { display: block; }

        .nav-right-container { display: flex; align-items: center; gap: 25px; }
        .lang-dropdown { position: relative; }
        .lang-menu { display: none; position: absolute; right: 0; top: 100%; background: rgba(10, 21, 37, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; min-width: 80px; }
        .lang-menu.active { display: block; }
        .lang-option { padding: 10px; cursor: pointer; font-size: 12px; }
        .lang-option:hover { color: #00a2ff; }

        /* --- UKŁAD TREŚCI --- */
        .main-content { margin-top: 85px; width: 100%; }

        /* --- LISTA KART --- */
        .list-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .admin-controls { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-add-small { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; backdrop-filter: blur(10px); }
        
        #admin-panel { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; display: none; backdrop-filter: blur(20px); }
        .admin-input, .admin-textarea { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; font-family: inherit; }

        .news-card { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 30px 0; cursor: pointer; position: relative; transition: 0.3s; }
        .news-card:hover { background: rgba(255,255,255,0.02); padding-left: 20px; }
        .btn-delete { position: absolute; right: 0; top: 35px; color: #ff4444; opacity: 0.3; border: none; background: none; cursor: pointer; font-size: 18px; }
        .btn-delete:hover { opacity: 1; }

        /* --- WIDOK ARTYKUŁU (BEZ RAMEK, PEŁNA SZEROKOŚĆ) --- */
        #article-view { display: none; width: 100%; animation: fadeIn 0.5s ease; }
        
        /* Sekcja Nagłówka */
        .hero-section { 
            width: 100%; 
            padding: 100px 10% 60px 10%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
        }

        .article-title { 
            font-size: clamp(40px, 8vw, 90px); 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 0.9; 
            letter-spacing: -4px; 
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .meta-glass-box {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-accent { color: #00a2ff; margin-right: 5px; }

        /* Sekcja Treści */
        .content-section { 
            width: 100%; 
            padding: 60px 10%; 
            display: flex; 
            flex-direction: column;
            gap: 40px;
        }

        .author-glass-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .author-logo { height: 60px; width: auto; filter: drop-shadow(0 0 10px rgba(0,162,255,0.3)); }
        .author-name-big { font-size: 24px; font-weight: 800; color: #fff; }
        .publish-date { font-size: 13px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        .article-body-text {
            font-size: 20px;
            line-height: 1.8;
            color: rgba(224, 224, 224, 0.85);
            max-width: 900px; /* Dla lepszej czytelności tekstu */
            white-space: pre-wrap;
        }

        .back-nav {
            padding: 20px 10%;
            cursor: pointer;
            color: #00a2ff;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
        }
        .back-nav:hover { color: #fff; letter-spacing: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <nav>
        <div class="nav-content-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <div class="dropdown">
                    <span class="nav-btn">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                    <div class="dropdown-menu">
                        <a href="zespol.html" class="nav-btn">I Zespół</a>
                        <a href="historia.html" class="nav-btn">Historia</a>
                    </div>
                </div>
                <a href="aktualnosci.html" class="nav-btn" style="color:#00a2ff; opacity:1;">Aktualności</a>
                <a href="#" class="nav-btn">Kontakt</a>
            </div>
        </div>
        <div class="nav-right-container">
            <div class="partner-section">
                <img src="657223629_1253635633558394_588577037858878449_n-removebg-preview.png" style="height:35px;">
            </div>
            <a href="https://www.instagram.com/ks_dinamo_wroclaw_/" target="_blank" class="nav-btn"><i class="fab fa-instagram"></i></a>
            <div class="lang-dropdown">
                <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-globe" style="color:#00a2ff"></i> <span id="current-lang">PL</span></div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="selectLang('PL')">PL</div>
                    <div class="lang-option" onclick="selectLang('UA')">UA</div>
                    <div class="lang-option" onclick="selectLang('EN')">EN</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        
        <div id="list-view" class="list-container">
            <div class="admin-controls">
                <button class="btn-add-small" onclick="checkPassAndToggle()">+ Dodaj wpis</button>
            </div>

            <div id="admin-panel">
                <input type="text" id="post-title" class="admin-input" placeholder="Wielki Tytuł">
                <textarea id="post-content" class="admin-textarea" rows="8" placeholder="Treść artykułu..."></textarea>
                <button class="btn-add-small" style="background:#00a2ff; border:none" onclick="savePost()">Opublikuj teraz</button>
            </div>

            <div id="news-list"></div>
        </div>

        <div id="article-view">
            <div class="back-nav" onclick="showList()"><i class="fas fa-chevron-left"></i> Wróć do listy</div>
            
            <div id="dynamic-article-content">
                </div>
        </div>

    </div>

    <script>
        const PASS = "admin123";
        let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];

        function toggleLang() { document.getElementById('lang-menu').classList.toggle('active'); }
        function selectLang(l) { document.getElementById('current-lang').innerText = l; toggleLang(); }

        function checkPassAndToggle() {
            if(prompt("Hasło admina:") === PASS) {
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("Błędne hasło!"); }
        }

        function savePost() {
            const t = document.getElementById('post-title').value;
            const c = document.getElementById('post-content').value;
            if(!t || !c) return;
            posts.unshift({ id: Date.now(), title: t, content: c, date: new Date().toLocaleDateString('pl-PL') });
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            location.reload();
        }

        function deletePost(id, e) {
            e.stopPropagation();
            if(prompt("Podaj hasło do usunięcia:") === PASS) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('dynamo_posts', JSON.stringify(posts));
                renderList();
            }
        }

        function renderList() {
            const list = document.getElementById('news-list');
            list.innerHTML = posts.map(p => `
                <div class="news-card" onclick="openArticle(${p.id})">
                    <div style="color:#00a2ff; font-size:12px; font-weight:bold;">${p.date}</div>
                    <h2 style="font-size:32px; text-transform:uppercase; font-weight:900;">${p.title}</h2>
                    <button class="btn-delete" onclick="deletePost(${p.id}, event)"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            
            document.getElementById('dynamic-article-content').innerHTML = `
                <div class="hero-section">
                    <h1 class="article-title">${p.title}</h1>
                    <div class="meta-glass-box">
                        Opublikowano w <span class="tag-accent"> Aktualności</span>
                    </div>
                </div>

                <div class="content-section">
                    <div class="author-glass-row">
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="author-logo">
                        <div>
                            <div class="author-name-big">Dynamo Wrocław</div>
                            <div class="publish-date">${p.date}</div>
                        </div>
                    </div>
                    <div class="article-body-text">${p.content}</div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
        }

        renderList();
    </script>
</body>
</html>
