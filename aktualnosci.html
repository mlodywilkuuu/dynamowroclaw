<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top right, #003366, #050b14);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-top: 100px; 
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000;
        }
        .nav-content { display: flex; align-items: center; gap: 20px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; opacity: 0.7; transition: 0.3s; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }

        .main-container { max-width: 1100px; margin: 0 auto; padding: 20px; position: relative; }
        
        /* --- PRZYCISK DODAWANIA --- */
        .add-news-trigger {
            width: 100%; background: rgba(0, 162, 255, 0.1); border: 2px dashed rgba(0, 162, 255, 0.4);
            color: #00a2ff; padding: 20px; border-radius: 12px; cursor: pointer;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 30px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .add-news-trigger:hover { background: rgba(0, 162, 255, 0.2); border-color: #00a2ff; transform: scale(1.01); }

        /* --- PANEL ADMINISTRATORA --- */
        #admin-panel { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #444; display: none; }
        .admin-input, .admin-textarea { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; font-family: inherit; }
        .btn-publish { background: #00a2ff; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* --- LISTA KART --- */
        .news-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 16px; margin-bottom: 25px; cursor: pointer; transition: 0.3s ease; }
        .news-card:hover { border-color: #00a2ff; background: rgba(255,255,255,0.06); }
        .news-card-date { color: #00a2ff; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .news-card-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }

        /* --- WIDOK EPIC GAMES --- */
        #article-view { display: none; }
        .back-btn { cursor: pointer; color: #00a2ff; margin-bottom: 30px; display: inline-flex; align-items: center; gap: 10px; font-weight: bold; }
        .article-hero-header { background: rgba(0,0,0,0.6); padding: 60px 40px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .article-main-title { font-size: 60px; font-weight: 900; text-transform: uppercase; line-height: 1; color: #fff; margin-bottom: 20px; }
        .tag-aktualnosci { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 14px; border: 1px solid rgba(255,255,255,0.15); }
        .article-content-wrapper { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .article-author-block { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .author-logo-img { height: 50px; width: auto; }
        .author-name { font-size: 18px; font-weight: bold; color: #fff; }
        .article-body-text { font-size: 18px; line-height: 1.8; color: rgba(255,255,255,0.9); white-space: pre-wrap; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" style="height:60px;"></a>
            <a href="index.html" class="nav-btn">Strona Główna</a>
            <a href="aktualnosci.html" class="nav-btn" style="color:#00a2ff; opacity:1;">Aktualności</a>
        </div>
    </nav>

    <div class="main-container">

        <div id="list-controls">
            <div class="add-news-trigger" onclick="toggleAdmin()">
                <i class="fas fa-plus-circle"></i> Dodaj nowy artykuł
            </div>
        </div>

        <div id="admin-panel">
            <h3>Nowy Wpis</h3>
            <input type="text" id="admin-title" class="admin-input" placeholder="Wielki Tytuł Artykułu">
            <textarea id="admin-content" class="admin-textarea" rows="10" placeholder="Treść aktualności..."></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn-publish" onclick="saveArticle()">Opublikuj</button>
                <button onclick="toggleAdmin()" style="background:none; border:none; color:#777; cursor:pointer;">Anuluj</button>
            </div>
        </div>

        <div id="news-list"></div>

        <div id="article-view">
            <div class="back-btn" onclick="showList()"><i class="fas fa-arrow-left"></i> Wróć</div>
            <div id="full-article-content"></div>
        </div>

    </div>

    <script>
        let articles = JSON.parse(localStorage.getItem('dynamo_news')) || [];

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function timeAgo(ts) {
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return 'przed chwilą';
            if (diff < 3600) return Math.floor(diff/60) + ' min. temu';
            if (diff < 86400) return Math.floor(diff/3600) + ' godz. temu';
            return Math.floor(diff/86400) + ' dni temu';
        }

        function saveArticle() {
            const t = document.getElementById('admin-title').value;
            const c = document.getElementById('admin-content').value;
            if(!t || !c) return alert("Wypełnij pola!");

            articles.unshift({ id: Date.now(), timestamp: Date.now(), title: t, content: c });
            localStorage.setItem('dynamo_news', JSON.stringify(articles));
            
            document.getElementById('admin-title').value = '';
            document.getElementById('admin-content').value = '';
            toggleAdmin();
            renderList();
        }

        function renderList() {
            document.getElementById('list-controls').style.display = 'block';
            const listDiv = document.getElementById('news-list');
            listDiv.innerHTML = articles.map(art => `
                <div class="news-card" onclick="openArticle(${art.id})">
                    <div class="news-card-date">${timeAgo(art.timestamp)}</div>
                    <div class="news-card-title">${art.title}</div>
                    <p style="opacity:0.6">${art.content.substring(0, 120)}...</p>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const art = articles.find(a => a.id === id);
            document.getElementById('list-controls').style.display = 'none';
            document.getElementById('news-list').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            window.scrollTo(0,0);

            document.getElementById('full-article-content').innerHTML = `
                <div class="article-hero-header">
                    <h1 class="article-main-title">${art.title}</h1>
                    <div class="tag-aktualnosci">Opublikowano w AKTUALNOŚCI</div>
                </div>
                <div class="article-content-wrapper">
                    <div class="article-author-block">
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="author-logo-img">
                        <div>
                            <div class="author-name">Dynamo Wrocław</div>
                            <div style="font-size:12px; opacity:0.5;">${timeAgo(art.timestamp)}</div>
                        </div>
                    </div>
                    <div class="article-body-text">${art.content}</div>
                </div>
            `;
        }

        function showList() {
            document.getElementById('article-view').style.display = 'none';
            renderList();
            document.getElementById('news-list').style.display = 'block';
        }

        renderList();
    </script>
</body>
</html>
