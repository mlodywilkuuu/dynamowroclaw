<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* --- NAPRAWIONY NAVBAR --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #0a1525; border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            position: fixed; top: 0; left: 0; z-index: 99999;
        }
        .nav-left { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 60px; width: auto; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-link:hover { color: #00a2ff; }
        .admin-btn { color: #00a2ff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; border: 1px solid #00a2ff; padding: 8px 15px; border-radius: 4px; transition: 0.3s; }
        .admin-btn:hover { background: #00a2ff; color: #fff; }

        /* --- NAGŁÓWEK --- */
        .header-section { padding: 150px 10% 50px; background: linear-gradient(to bottom, #0a1525, #050b14); }
        .header-section h1 { font-size: 42px; text-transform: uppercase; font-style: italic; font-weight: 900; }
        .header-section span { color: #00a2ff; }

        /* --- GRID ARTYKUŁÓW --- */
        .container { padding: 40px 10%; min-height: 70vh; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .article-card { background: #0a1525; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; display: flex; flex-direction: column; }
        .article-card:hover { transform: translateY(-5px); border-color: #00a2ff; }
        
        .article-img { width: 100%; height: 220px; background-size: cover; background-position: center; background-color: #1a2635; }
        .article-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .article-date { color: #00a2ff; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .article-title { font-size: 22px; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; font-style: italic; line-height: 1.2; }
        .article-excerpt { font-size: 14px; opacity: 0.6; line-height: 1.6; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .btn-more { background: none; border: none; color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; display: flex; align-items: center; gap: 8px; margin-top: auto; }
        .btn-more:hover { color: #00a2ff; }

        /* --- MODAL (Pełna treść) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,11,20,0.98); z-index: 100000; overflow-y: auto; padding: 80px 20px; }
        .modal-content { max-width: 800px; margin: 0 auto; line-height: 1.8; }
        .modal-close { position: fixed; top: 25px; right: 35px; font-size: 40px; color: #00a2ff; cursor: pointer; z-index: 100001; }
        
        footer { padding: 60px 10%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); opacity: 0.3; font-size: 12px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Główna</a>
                <a href="zespol.html" class="nav-link">Zespół</a>
            </div>
        </div>
        <div>
            <a href="admin-panel.html" class="admin-btn"><i class="fas fa-plus"></i> Nowy Post</a>
        </div>
    </nav>

    <div class="header-section">
        <p style="color:#00a2ff; font-weight:800; text-transform:uppercase; letter-spacing:2px; font-size:12px; margin-bottom:10px;">FC Dynamo Wrocław</p>
        <h1>Aktualności <span>Klubowe</span></h1>
    </div>

    <div class="container">
        <div id="news-grid" class="news-grid">
            </div>
    </div>

    <div id="articleModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="modalBody" class="modal-content"></div>
    </div>

    <footer>&copy; 2026 FC Dynamo Wrocław.</footer>

    <script>
        function loadArticles() {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const grid = document.getElementById('news-grid');

            if (posts.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; opacity:0.3; padding:50px;">Brak artykułów do wyświetlenia.</p>';
                return;
            }

            grid.innerHTML = posts.map((post, index) => `
                <div class="article-card">
                    <div class="article-img" style="background-image: url('${post.image}')"></div>
                    <div class="article-body">
                        <span class="article-date">${post.date}</span>
                        <h2 class="article-title">${post.title}</h2>
                        <div class="article-excerpt">${post.content}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                            <button class="btn-more" onclick="openModal(${index})">Czytaj więcej <i class="fas fa-arrow-right"></i></button>
                            <button onclick="deletePost(${index})" style="background:none; border:none; color:red; opacity:0.3; cursor:pointer;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            const post = posts[index];
            const body = document.getElementById('modalBody');
            
            body.innerHTML = `
                <img src="${post.image}" style="width:100%; border-radius:15px; margin-bottom:30px; max-height:450px; object-fit:cover;">
                <p style="color:#00a2ff; font-weight:800; text-transform:uppercase; margin-bottom:10px;">${post.date}</p>
                <h1 style="font-size:36px; text-transform:uppercase; font-style:italic; margin-bottom:25px;">${post.title}</h1>
                <div style="font-size:18px; color:rgba(255,255,255,0.8);">${post.content}</div>
            `;
            
            document.getElementById('articleModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function deletePost(index) {
            if(confirm("Czy na pewno usunąć ten artykuł?")) {
                let posts = JSON.parse(localStorage.getItem('dynamo_posts'));
                posts.splice(index, 1);
                localStorage.setItem('dynamo_posts', JSON.stringify(posts));
                loadArticles();
            }
        }

        window.onload = loadArticles;
        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
