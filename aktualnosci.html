<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050b14;
            --epic-dark: #121212;
            --epic-card: #1c1c1c;
            --accent-blue: #007bff;
            --text-secondary: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-color); color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        /* --- NAPRAWIONE BIAŁE MENU --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #0a1525; border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            position: fixed; top: 0; left: 0; z-index: 999999;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo-img { height: 55px; width: auto; }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { 
            color: #ffffff; text-decoration: none; font-size: 13px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; 
        }
        .nav-item:hover { color: var(--accent-blue); }
        
        .btn-admin { 
            background: #ffffff; color: #0a1525; text-decoration: none; font-size: 11px; 
            font-weight: 900; text-transform: uppercase; padding: 10px 20px; border-radius: 4px; 
            transition: 0.3s; border: 1px solid #fff;
        }
        .btn-admin:hover { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

        /* --- NAGŁÓWEK --- */
        .header-section { padding: 150px 10% 50px; background: linear-gradient(to bottom, #0a1525, #050b14); }
        .header-section h1 { font-size: 42px; text-transform: uppercase; font-style: italic; font-weight: 900; }

        /* --- LISTA ARTYKUŁÓW (KAFELKI EPIC) --- */
        .container { padding: 40px 10%; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .article-card { background: var(--epic-card); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .article-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
        .article-img { width: 100%; height: 200px; background-size: cover; background-position: center; background-color: #111; }
        .article-info { padding: 20px; }
        .article-tag { color: var(--accent-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .article-title-small { font-size: 18px; font-weight: 700; line-height: 1.3; }

        /* --- MODAL W STYLU EPIC GAMES --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000000; overflow-y: auto; padding: 40px 10px; }
        .modal-close { position: fixed; top: 25px; right: 25px; font-size: 35px; color: #fff; cursor: pointer; z-index: 1000001; }

        .epic-article { background: #141b2a; max-width: 960px; margin: 0 auto; border-radius: 4px; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .epic-hero { position: relative; height: 400px; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px; }
        .epic-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(20,27,42,1)); }
        .epic-hero-title { position: relative; z-index: 2; font-size: 48px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; }

        .epic-meta { background: #1a2335; padding: 15px 40px; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid #2a354a; display: flex; align-items: center; gap: 10px; }
        .epic-meta img { height: 16px; }

        .epic-body { padding: 40px; }
        .epic-author { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .author-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-blue); background: #fff; padding: 2px; }
        .author-name { font-weight: bold; font-size: 18px; }
        .badge-staff { font-size: 10px; font-weight: 900; background: #7e57c2; color: #fff; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; margin-right: 5px; }

        .epic-content { font-size: 16px; line-height: 1.8; color: rgba(255,255,255,0.9); }
        .epic-content p { margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="index.html" class="nav-item">Główna</a>
                <a href="zespol.html" class="nav-item">Zespół</a>
                <a href="aktualnosci.html" class="nav-item" style="color:var(--accent-blue)">Aktualności</a>
            </div>
        </div>
        <a href="admin-panel.html" class="btn-admin"><i class="fas fa-plus-circle"></i> Nowy Post</a>
    </nav>

    <div class="header-section">
        <p style="color:var(--accent-blue); font-weight:800; text-transform:uppercase; font-size:11px; margin-bottom:10px; letter-spacing:1px;">Dynamo Wrocław Feed</p>
        <h1>Aktualności <span>Klubowe</span></h1>
    </div>

    <div class="container">
        <div id="news-grid" class="news-grid">
            </div>
    </div>

    <div id="epicModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>

    <script>
        function loadNews() {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const grid = document.getElementById('news-grid');
            
            if (posts.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; opacity:0.3; padding:100px;">Czekamy na pierwsze wiadomości...</p>';
                return;
            }

            grid.innerHTML = posts.map((p, i) => `
                <div class="article-card" onclick="openModal(${i})">
                    <div class="article-img" style="background-image: url('${p.image}')"></div>
                    <div class="article-info">
                        <span class="article-tag">News</span>
                        <h2 class="article-title-small">${p.title}</h2>
                        <p style="font-size:11px; opacity:0.4; margin-top:12px; font-weight:700;">${p.date}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(i) {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            const p = posts[i];
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <div class="epic-article">
                    <div class="epic-hero" style="background-image: url('${p.image}')">
                        <h1 class="epic-hero-title">${p.title}</h1>
                    </div>
                    <div class="epic-meta">
                        <span>Opublikowano w</span>
                        <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
                        <span style="color:#fff">Dynamo Wrocław</span>
                        <span>•</span>
                        <span style="color:var(--accent-blue); cursor:pointer;">Społeczność</span>
                    </div>
                    <div class="epic-body">
                        <div class="epic-author">
                            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="author-avatar">
                            <div>
                                <div class="author-name">Dynamo Wrocław</div>
                                <div style="font-size:12px; opacity:0.5; margin-bottom:8px;">${p.date}</div>
                                <span class="badge-staff">Staff</span>
                                <span class="badge-staff" style="background:#fdd835; color:#000">Zarząd</span>
                            </div>
                        </div>
                        <div class="epic-content">
                            ${p.content}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('epicModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('epicModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = loadNews;
        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
