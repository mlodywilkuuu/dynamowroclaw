<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #050b14; --epic-card: #1c1c1c; --accent-blue: #007bff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-color); color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        /* MENU STYL GŁÓWNA */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #0a1525; border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            position: fixed; top: 0; left: 0; z-index: 999999;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo-img { height: 55px; width: auto; }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { color: #ffffff; text-decoration: none; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item:hover { color: var(--accent-blue); }
        .btn-new-post { background: transparent; color: #fff; text-decoration: none; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .btn-new-post:hover { background: #fff; color: #0a1525; }

        .header-section { padding: 150px 10% 50px; background: linear-gradient(to bottom, #0a1525, #050b14); }
        .header-section h1 { font-size: 42px; text-transform: uppercase; font-style: italic; font-weight: 900; }

        .container { padding: 40px 10%; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .article-card { background: var(--epic-card); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .article-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
        .article-img { width: 100%; height: 220px; background-size: cover; background-position: center; }
        .article-info { padding: 20px; }
        .article-title-small { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000000; overflow-y: auto; padding: 40px 10px; }
        .modal-close { position: fixed; top: 25px; right: 25px; font-size: 35px; color: #fff; cursor: pointer; }
        .epic-article { background: #141b2a; max-width: 900px; margin: 0 auto; border-radius: 4px; overflow: hidden; }
        .epic-hero { position: relative; height: 450px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }
        .epic-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(20,27,42,1)); }
        .hero-content { position: relative; z-index: 2; }
        .epic-hero-title { font-size: 48px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; }
        .epic-body { padding: 40px; }
        .epic-author { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .author-avatar { width: 50px; height: 50px; object-fit: contain; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="index.html" class="nav-item">Główna</a>
                <a href="zespol.html" class="nav-item">Zespół</a>
                <a href="aktualnosci.html" class="nav-item" style="color:var(--accent-blue)">Aktualności</a>
            </div>
        </div>
        <a href="#" onclick="protectedAccess()" class="btn-new-post">Nowy Post</a>
    </nav>

    <div class="header-section">
        <h1>Aktualności <span>Klubowe</span></h1>
    </div>

    <div class="container">
        <div id="news-grid" class="news-grid"></div>
    </div>

    <div id="epicModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>

    <script>
        function protectedAccess() {
            const pass = prompt("Hasło:");
            if(pass === "admin123") window.location.href = "admin-panel.html";
            else if(pass) alert("Błędne hasło!");
        }

        // FUNKCJA POBIERAJĄCA TYLKO AKTUALNE POSTY (POSORTOWANE)
        function getVisiblePosts() {
            let posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const now = new Date().getTime();

            // 1. Filtrujemy (usuwamy te z przyszłości)
            let filtered = posts.filter(p => new Date(p.date).getTime() <= now);

            // 2. Sortujemy od najnowszego
            return filtered.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
        }

        function loadNews() {
            const posts = getVisiblePosts();
            const grid = document.getElementById('news-grid');
            
            grid.innerHTML = posts.map((p, i) => `
                <div class="article-card" onclick="openModal(${i})">
                    <div class="article-img" style="background-image: url('${p.image}')"></div>
                    <div class="article-info">
                        <h2 class="article-title-small">${p.title}</h2>
                        <p style="font-size:11px; opacity:0.4;">${p.date.replace('T', ' ')}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(i) {
            const posts = getVisiblePosts();
            const p = posts[i];
            
            document.getElementById('modalBody').innerHTML = `
                <div class="epic-article">
                    <div class="epic-hero" style="background-image: url('${p.image}')">
                        <div class="hero-content">
                            <p style="font-size:12px; font-weight:bold; margin-bottom:10px; opacity:0.8;">Opublikowano w Społeczność</p>
                            <h1 class="epic-hero-title">${p.title}</h1>
                        </div>
                    </div>
                    <div class="epic-body">
                        <div class="epic-author">
                            <img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="author-avatar">
                            <div>
                                <div style="font-weight:bold; font-size:18px;">Dynamo Wrocław</div>
                                <div style="font-size:12px; opacity:0.5;">${p.date.replace('T', ' ')}</div>
                            </div>
                        </div>
                        <div style="font-size:16px; line-height:1.8; color:rgba(255,255,255,0.9);">${p.content}</div>
                    </div>
                </div>`;
            document.getElementById('epicModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('epicModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onload = loadNews;
    </script>
</body>
</html>
