<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności | Dynamo Wrocław</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* --- NAVBAR (Spójny z resztą strony) --- */
        nav {
            width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 21, 37, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 9999;
        }
        .nav-left { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 60px; width: auto; }
        .nav-links { display: flex; gap: 5px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 10px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { color: #00a2ff; }

        /* --- NAGŁÓWEK SEKBCJI --- */
        .news-header { 
            padding: 150px 10% 50px; 
            background: linear-gradient(to bottom, #0a1525, #050b14);
            text-align: left;
        }
        .news-header h1 { font-size: 42px; text-transform: uppercase; font-style: italic; font-weight: 900; }
        .news-header p { color: #00a2ff; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }

        /* --- LISTA ARTYKUŁÓW --- */
        .container { padding: 40px 10%; min-height: 60vh; }
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; 
        }

        .article-card { 
            background: #0a1525; border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; overflow: hidden; transition: 0.3s; 
            display: flex; flex-direction: column;
        }
        .article-card:hover { transform: translateY(-10px); border-color: #00a2ff; }

        .article-img { width: 100%; height: 220px; background-size: cover; background-position: center; }
        
        .article-content { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
        .article-date { font-size: 11px; color: #00a2ff; font-weight: 800; margin-bottom: 10px; }
        .article-title { font-size: 20px; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 15px; line-height: 1.2; }
        .article-text { font-size: 14px; opacity: 0.7; line-height: 1.6; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .read-more { 
            margin-top: auto; color: #fff; text-decoration: none; font-size: 12px; 
            font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; 
        }
        .read-more i { transition: 0.3s; }
        .read-more:hover i { transform: translateX(5px); color: #00a2ff; }

        footer { padding: 60px 10%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); opacity: 0.5; font-size: 12px; }

        /* MODAL DLA PEŁNEJ TREŚCI */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5, 11, 20, 0.98); z-index: 10000; overflow-y: auto; padding: 50px 20px;
        }
        .modal-content { max-width: 800px; margin: 0 auto; }
        .close-modal { position: fixed; top: 30px; right: 30px; font-size: 30px; cursor: pointer; color: #00a2ff; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
            <div class="nav-links">
                <a href="aktualnosci.html" class="nav-btn active">Aktualności</a>
                <a href="zespol.html" class="nav-btn">Zespół</a>
            </div>
        </div>
    </nav>

    <header class="news-header">
        <p>Centrum wiadomości</p>
        <h1>Aktualności <span style="color:#00a2ff;">Klubowe</span></h1>
    </header>

    <div class="container">
        <div id="news-list" class="news-grid">
            </div>
    </div>

    <div id="news-modal" class="modal">
        <span class="close-modal" onclick="closeArticle()">&times;</span>
        <div id="modal-body" class="modal-content"></div>
    </div>

    <footer>
        &copy; 2026 FC Dynamo Wrocław. Wszystkie prawa zastrzeżone.
    </footer>

    <script>
        function loadArticles() {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const container = document.getElementById('news-list');

            if (posts.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 50px;">Brak opublikowanych artykułów.</p>';
                return;
            }

            // Sortowanie od najnowszych
            posts.sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = posts.map((post, index) => `
                <article class="article-card">
                    <div class="article-img" style="background-image: url('${post.image}')"></div>
                    <div class="article-content">
                        <span class="article-date">${post.date}</span>
                        <h2 class="article-title">${post.title}</h2>
                        <p class="article-text">${post.content}</p>
                        <a href="#" class="read-more" onclick="openArticle(${index})">
                            Czytaj więcej <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </article>
            `).join('');
        }

        function openArticle(index) {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const post = posts[index];
            const modal = document.getElementById('news-modal');
            const body = document.getElementById('modal-body');

            body.innerHTML = `
                <img src="${post.image}" style="width:100%; border-radius:15px; margin-bottom:30px;">
                <span style="color:#00a2ff; font-weight:800;">${post.date}</span>
                <h1 style="font-size:36px; margin: 15px 0 30px; font-style:italic; text-transform:uppercase;">${post.title}</h1>
                <div style="line-height:1.8; opacity:0.8; font-size:18px; white-space: pre-wrap;">${post.content}</div>
            `;
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Blokada przewijania tła
        }

        function closeArticle() {
            document.getElementById('news-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Zamknij modal po kliknięciu poza treścią
        window.onclick = function(event) {
            const modal = document.getElementById('news-modal');
            if (event.target == modal) closeArticle();
        }

        window.onload = loadArticles;
    </script>
</body>
</html>
