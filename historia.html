<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia | Dynamo Wrocław</title>
    <link rel="icon" type="image/png" href="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top right, #003366, #050b14); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding-top: 100px; }

        /* --- NAVBAR (Zgodny z Zespołem) --- */
        nav { width: 100%; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; z-index: 2000; }
        .nav-content-left { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 65px; width: auto; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; cursor: pointer; padding: 10px; }
        .nav-btn:hover { opacity: 1; color: #00a2ff; }

        .dropdown { position: relative; display: inline-block; }
        .dropdown::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 20px; }
        .dropdown-menu { display: block; visibility: hidden; opacity: 0; position: absolute; top: 100%; background: rgba(10, 21, 37, 0.98); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 10px 0; transition: all 0.3s ease; transform: translateY(10px); z-index: 3000; }
        .dropdown:hover .dropdown-menu { visibility: visible; opacity: 1; transform: translateY(0); transition-delay: 0s; }
        .dropdown-menu a { color: white; padding: 12px 20px; text-decoration: none; display: flex; align-items: center; font-size: 11px; font-weight: 600; text-transform: uppercase; cursor: pointer; }
        .dropdown-menu a:hover { background: rgba(0, 162, 255, 0.2); color: #00a2ff; }
        .lang-dropdown .dropdown-menu { right: 0; left: auto; min-width: 150px; }
        .flag-icon { width: 18px; margin-right: 12px; border-radius: 2px; }

        /* --- TIMELINE --- */
        .history-container { width: 90%; max-width: 1000px; margin: 60px auto; position: relative; }
        .history-header { text-align: center; margin-bottom: 80px; }
        .history-header h1 { font-size: 36px; text-transform: uppercase; letter-spacing: 3px; }

        .timeline { position: relative; padding: 20px 0; }
        /* Pionowa kreska */
        .timeline::before {
            content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%;
            background: linear-gradient(to bottom, transparent, #00a2ff, #00a2ff, transparent);
            transform: translateX(-50%);
        }

        .timeline-item { width: 100%; margin-bottom: 60px; position: relative; display: flex; justify-content: flex-end; padding-right: 50%; }
        .timeline-item:nth-child(even) { justify-content: flex-start; padding-right: 0; padding-left: 50%; }

        .timeline-content {
            width: 85%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px; border-radius: 15px; position: relative; transition: 0.3s;
        }
        .timeline-item:hover .timeline-content { border-color: #00a2ff; background: rgba(0, 162, 255, 0.05); transform: translateY(-5px); }

        /* Kropka na środku */
        .timeline-dot {
            position: absolute; top: 20px; left: 50%; width: 16px; height: 16px;
            background: #00a2ff; border: 4px solid #050b14; border-radius: 50%;
            transform: translateX(-50%); z-index: 10;
        }

        .date { color: #00a2ff; font-weight: 900; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .event-title { font-size: 20px; font-weight: 700; color: #fff; text-transform: uppercase; }

        @media (max-width: 768px) {
            .timeline::before { left: 20px; }
            .timeline-item, .timeline-item:nth-child(even) { justify-content: flex-start; padding-left: 50px; padding-right: 0; }
            .timeline-dot { left: 20px; }
            .timeline-content { width: 100%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-content-left">
        <a href="index.html"><img src="99bf7218-0759-45fb-820f-d026f07d5ee3-removebg-preview.png" class="logo-img"></a>
        <div class="nav-links">
            <div class="dropdown">
                <span class="nav-btn" data-t="nav-club">Klub <i class="fas fa-chevron-down" style="font-size: 8px;"></i></span>
                <div class="dropdown-menu">
                    <a href="zespol.html" data-t="nav-team">I Zespół</a>
                    <a href="historia.html" data-t="nav-history">Historia</a>
                </div>
            </div>
            <a href="#" class="nav-btn" data-t="nav-tickets">Bilety</a>
            <a href="#" class="nav-btn" data-t="nav-shop">Sklep</a>
        </div>
    </div>

    <div class="dropdown lang-dropdown" style="margin-right: 40px;">
        <div class="nav-btn" style="display: flex; align-items: center; gap: 8px; opacity: 1;">
            <i class="fas fa-globe" style="color:#00a2ff"></i> 
            <img id="cur-flag" src="https://flagcdn.com/w40/pl.png" width="16" style="border-radius:2px;">
            <span id="cur-lang">PL</span>
        </div>
        <div class="dropdown-menu">
            <a onclick="doTrans('PL', 'pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-icon"> PL</a>
            <a onclick="doTrans('UA', 'ua')"><img src="https://flagcdn.com/w40/ua.png" class="flag-icon"> UA</a>
            <a onclick="doTrans('EN', 'gb')"><img src="https://flagcdn.com/w40/gb.png" class="flag-icon"> EN</a>
        </div>
    </div>
</nav>

<div class="history-container">
    <header class="history-header">
        <h1 data-t="nav-history">Historia</h1>
    </header>

    <div class="timeline">
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <span class="date">02.04.2026</span>
                <div class="event-title" data-t="hist-1">Debiut w Pro Liga</div>
            </div>
        </div>

        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <span class="date">10.04.2026</span>
                <div class="event-title" data-t="hist-2">Pierwsze zwycięstwo</div>
            </div>
        </div>
    </div>
</div>

<script>
    const langData = {
        'PL': { 
            'nav-club': 'Klub', 'nav-team': 'I Zespół', 'nav-history': 'Historia', 
            'nav-tickets': 'Bilety', 'nav-shop': 'Sklep',
            'hist-1': 'Debiut w Pro Liga', 'hist-2': 'Pierwsze zwycięstwo'
        },
        'UA': { 
            'nav-club': 'Клуб', 'nav-team': 'I Команда', 'nav-history': 'Історія', 
            'nav-tickets': 'Квитки', 'nav-shop': 'Магазин',
            'hist-1': 'Дебют у Pro Liga', 'hist-2': 'Перша перемога'
        },
        'EN': { 
            'nav-club': 'Club', 'nav-team': 'First Team', 'nav-history': 'History', 
            'nav-tickets': 'Tickets', 'nav-shop': 'Shop',
            'hist-1': 'Pro Liga Debut', 'hist-2': 'First Victory'
        }
    };

    function doTrans(lang, flag) {
        document.getElementById('cur-lang').innerText = lang;
        document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flag}.png`;
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if (langData[lang][key]) {
                if (el.querySelector('i')) {
                    el.innerHTML = langData[lang][key] + ' <i class="fas fa-chevron-down" style="font-size: 8px;"></i>';
                } else {
                    el.innerText = langData[lang][key];
                }
            }
        });
    }
</script>

</body>
</html>
