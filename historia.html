<div class="history-container">
    <header class="history-header">
        <h1 data-t="nav-history">Historia</h1>
    </header>

    <div class="timeline">
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <span class="date">02.04.2026</span>
                <div class="event-title" data-t="hist-1">Debiut w Pro Liga</div>
            </div>
        </div>
    </div>
</div>

<script>
    const langData = {
        'PL': { 
            'nav-club': 'Klub', 'nav-team': 'I Zespół', 'nav-history': 'Historia', 
            'nav-tickets': 'Bilety', 'nav-shop': 'Sklep',
            'hist-1': 'Debiut w Pro Liga'
        },
        'UA': { 
            'nav-club': 'Клуб', 'nav-team': 'I Команда', 'nav-history': 'Історія', 
            'nav-tickets': 'Квитки', 'nav-shop': 'Магазин',
            'hist-1': 'Дебют у Pro Liga'
        },
        'EN': { 
            'nav-club': 'Club', 'nav-team': 'First Team', 'nav-history': 'History', 
            'nav-tickets': 'Tickets', 'nav-shop': 'Shop',
            'hist-1': 'Pro Liga Debut'
        },
        'DE': { 
            'nav-club': 'Verein', 'nav-team': 'Erste Mannschaft', 'nav-history': 'Geschichte', 
            'nav-tickets': 'Tickets', 'nav-shop': 'Geschäft',
            'hist-1': 'Pro Liga Debüt'
        }
    };

    function doTrans(lang, flag) {
        document.getElementById('cur-lang').innerText = lang;
        document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flag}.png`;
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if (langData[lang][key]) {
                if (el.querySelector('i')) {
                    el.innerHTML = langData[lang][key] + ' <i class="fas fa-chevron-down" style="font-size: 8px;"></i>';
                } else {
                    el.innerText = langData[lang][key];
                }
            }
        });
    }
</script>
