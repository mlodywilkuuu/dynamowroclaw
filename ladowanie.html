<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Dynamo - Core</title>
    <style>
        /* --- RESET I PODSTAWA --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a; /* Ciemne tło pasujące do logo */
            font-family: sans-serif;
            overflow: hidden; /* Blokujemy przewijanie podczas ładowania */
        }

        /* --- EKRAN ŁADOWANIA (LOADER) --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-logo {
            width: 100px; /* Rozmiar Twojego logo */
            height: auto;
            animation: pulse-dynamo 1.5s infinite ease-in-out;
        }

        @keyframes pulse-dynamo {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Klasa ukrywająca loader */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- RDZEŃ STRONY (DYNAMO CORE GRID) --- */
        .grid-container {
            display: grid;
            gap: 10px;
            padding: 10px;
            height: 100vh;
            grid-template-areas:
                "header header header"
                "nav main aside"
                "footer footer footer";
            grid-template-rows: 80px 1fr 60px;
            grid-template-columns: 200px 1fr 200px;
            /* Płynne pojawienie się treści po załadowaniu */
            opacity: 0;
            transition: opacity 1s ease;
        }

        .content-visible {
            opacity: 1;
        }

        .core-element {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
        }

        header { grid-area: header; }
        nav    { grid-area: nav; }
        main   { grid-area: main; background-color: #222; }
        aside  { grid-area: aside; }
        footer { grid-area: footer; }

        /* Mobile */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-areas: "header" "nav" "main" "footer";
                grid-template-columns: 1fr;
                grid-template-rows: 60px 50px 1fr 50px;
            }
            aside { display: none; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <img src="FC-Dinamo-Wroclaw-1-32x32.png" alt="FC Dynamo Logo" class="loader-logo">
    </div>

    <div class="grid-container" id="main-content">
        <header class="core-element"></header>
        <nav class="core-element"></nav>
        <main class="core-element"></main>
        <aside class="core-element"></aside>
        <footer class="core-element"></footer>
    </div>

    <script>
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            const content = document.getElementById("main-content");
            const body = document.body;

            // Małe opóźnienie dla lepszego efektu wizualnego
            setTimeout(() => {
                loader.classList.add("loader-hidden");
                content.classList.add("content-visible");
                body.style.overflow = "auto"; // Przywracamy przewijanie
            }, 1000); 
        });
    </script>

</body>
</html>
